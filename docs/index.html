ause different parties maintain different parts. Understanding this makes you better at debugging ANY AI system, identifying whether failures are in the model, the prompt, or the infrastructure.", "first_step": "Next time a Claude Code generation feels 'off,' pause and diagram the chain: your spec \u2192 Claude's interpretation \u2192 code generation \u2192 execution. Identify which link failed before asking for a regeneration.", "time_investment": "20 minutes of reflection per puzzling failure, builds diagnostic intuition", "days_on_leaderboard": 1}], "backlog_summary": {"total_pending": 8, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 6}, {"title": "Auto mode for Claude Code", "days_pending": 6}, {"title": "Package Managers Need to Cool Down", "days_pending": 6}]}, "dropped_counts": {"layer_1": 1, "layer_2": 2, "layer_3": 4}, "total_fetched": 68}, {"date": "2026-03-30", "items": [{"title": "Pretext", "url": "https://simonwillison.net/2026/Mar/29/pretext/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-29T20:08:45+00:00", "description": "Pretext Exciting new browser library from Cheng Lou, previously a React core developer and the original creator of the react-motion animation library. Pretext solves the problem of calculating the height of a paragraph of line-wrapped text without touching the DOM . The usual way of doing this is to render the text and measure its dimensions, but this is extremely expensive. Pretext uses an array of clever tricks to make this much, much faster, which enables all sorts of new text rendering effects in browser applications. Here's one demo that shows the kind of things this makes possible: The key to how this works is the way it separates calculations into a call to a prepare() function followed by multiple calls to layout() . The prepare() function splits the input text into segments (effectively words, but it can take things like soft hyphens and non-latin character sequences and emoji into account as well) and measures those using an off-screen canvas, then caches the results. This is comparatively expensive but only runs once. The layout() function can then emulate the word-wrapping logic in browsers to figure out how many wrapped lines the text will occupy at a specified width and measure the overall height. I had Claude build me this interactive artifact to help me visually understand what's going on, based on a simplified version of Pretext itself. The way this is tested is particularly impressive. The earlier tests rendered a full copy of the Great Gatsby in multiple browsers to confirm that the estimated measurements were correct against a large volume of text. This was later joined by the corpora/ folder using the same technique against lengthy public domain documents in Thai, Chinese, Korean, Japanese, Arabic, and more. Cheng Lou says : The engine\u2019s tiny (few kbs), aware of browser quirks, supports all the languages you\u2019ll need, including Korean mixed with RTL Arabic and platform-specific emojis This was achieved through showing Claude Code and Codex the browsers ground truth, and have them measure & iterate against those at every significant container width, running over weeks Via @_chenglou Tags: browsers , css , javascript , testing , react , typescript", "id": "f7f3591443c6", "content": "Pretext Exciting new browser library from Cheng Lou, previously a React core developer and the original creator of the react-motion animation library. Pretext solves the problem of calculating the height of a paragraph of line-wrapped text without touching the DOM . The usual way of doing this is to render the text and measure its dimensions, but this is extremely expensive. Pretext uses an array of clever tricks to make this much, much faster, which enables all sorts of new text rendering effects in browser applications. Here's one demo that shows the kind of things this makes possible: The key to how this works is the way it separates calculations into a call to a prepare() function followed by multiple calls to layout() . The prepare() function splits the input text into segments (effectively words, but it can take things like soft hyphens and non-latin character sequences and emoji into account as well) and measures those using an off-screen canvas, then caches the results. This is comparatively expensive but only runs once. The layout() function can then emulate the word-wrapping logic in browsers to figure out how many wrapped lines the text will occupy at a specified width and measure the overall height. I had Claude build me this interactive artifact to help me visually understand what's going on, based on a simplified version of Pretext itself. The way this is tested is particularly impressive. The earlier tests rendered a full copy of the Great Gatsby in multiple browsers to confirm that the estimated measurements were correct against a large volume of text. This was later joined by the corpora/ folder using the same technique against lengthy public domain documents in Thai, Chinese, Korean, Japanese, Arabic, and more. Cheng Lou says : The engine\u2019s tiny (few kbs), aware of browser quirks, supports all the languages you\u2019ll need, including Korean mixed with RTL Arabic and platform-specific emojis This was achieved through showing Claude Code and Codex the br", "tier": "NOTED", "what_it_is": "Pretext is a new browser library that calculates the height of line-wrapped text without rendering it to the DOM, making it orders of magnitude faster than the traditional measure-after-render approach. It works by pre-calculating word widths using an off-screen canvas, then emulating browser word-wrapping logic to estimate final dimensions.", "why_it_matters": "This is a clever optimization technique, but it solves a problem you don't currently have. Your work is primarily backend automation and AI orchestration \u2014 you're not building interactive text-heavy UIs that need real-time layout calculations. The interesting takeaway here is the general pattern: expensive operations can often be decomposed into a one-time preparation step plus fast lookups. That's worth keeping in mind for any performance bottleneck, but this specific library isn't actionable for your stack.", "expandable_implement": null, "expandable_learn": "The core pattern here is called 'amortization' \u2014 you pay a high cost once (measuring individual words), then use those measurements many times (calculating layouts at different widths) without touching the expensive operation again. Think about your own pipelines: are there operations you're repeating that could be pre-computed? For example, if you were repeatedly parsing the same HTML structure from Breezeway or Hospitable, you could measure the structure once and cache selectors. Try this: next time you see a slow operation in your code, ask yourself 'What part of this could I compute once and reuse?' That's the mental model Pretext demonstrates at scale.", "unblocks_project": null}, {"title": "Python Vulnerability Lookup", "url": "https://simonwillison.net/2026/Mar/29/python-vulnerability-lookup/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-29T18:46:16+00:00", "description": "Tool: Python Vulnerability Lookup I learned that the OSV.dev open source vulnerability database has an open CORS JSON API , so I had Claude Code build this HTML tool for pasting in a pyproject.toml or requirements.txt file (or name of a GitHub repo containing those) and seeing a list of all reported vulnerabilities from that API. Tags: tools , python , supply-chain , vibe-coding , security", "id": "bf6e76604a77", "content": "Tool: Python Vulnerability Lookup I learned that the OSV.dev open source vulnerability database has an open CORS JSON API , so I had Claude Code build this HTML tool for pasting in a pyproject.toml or requirements.txt file (or name of a GitHub repo containing those) and seeing a list of all reported vulnerabilities from that API. Tags: tools , python , supply-chain , vibe-coding , security", "tier": "WORTH_YOUR_TIME", "what_it_is": "Simon built a simple HTML tool that checks Python dependencies (from pyproject.toml, requirements.txt, or a GitHub repo) against the OSV.dev vulnerability database using their open CORS API. The key insight is that OSV.dev has an open, no-auth-required JSON API you can hit directly from the browser.", "why_it_matters": "You're managing multiple Python projects in production (STR Daily Briefing, Inspector Scheduler, this briefing tool itself), and you're building with Claude Code, which means rapid iteration without always thinking about dependency security. This gives you a pattern for adding security checks to your GitHub Actions pipelines or even building a pre-commit hook. The real value is discovering that OSV.dev's API is this accessible \u2014 you can query it without setting up credentials or running a CLI tool.", "expandable_implement": "Add a security check to your GitHub Actions workflows. In your .github/workflows directory, create a new job that runs after your tests. Install `requests` and write a short Python script that reads your requirements.txt, queries the OSV API for each package, and fails the build if vulnerabilities are found. Start simple: `import requests; response = requests.post('https://api.osv.dev/v1/query', json={'package': {'name': package_name, 'ecosystem': 'PyPI'}})`. If response.json().get('vulns'), print them and exit 1. This takes about 10 minutes to set up and runs automatically on every push. You can make it fancier later \u2014 ignore specific CVEs, set severity thresholds \u2014 but the basic version gives you visibility immediately.", "expandable_learn": null, "unblocks_project": null}, {"title": "Claude Code Changelog", "url": "https://www.claudelog.com/claude-code-changelog", "source_name": "ClaudeLog", "layer": 2, "published": "2026-03-29T15:32:46+00:00", "description": "Complete changelog for Claude Code releases with new features, improvements, and bug fixes.", "id": "aa3844b00562", "content": "Changelog 1x On this page Claude Code Changelog Complete version history of Claude Code releases, from early beta versions to the latest stable release. Each version includes feature additions, bug fixes, and links to relevant documentation. Need to downgrade? See our Revert Claude Code Version guide. Power up with parallel agents (ad) Run multiple autonomous coding agents simultaneously with Verdent 's isolated Git worktrees . Each agent tackles different components while maintaining full context awareness, eliminating manual debugging bottlenecks and accelerating feature delivery. Discover Verdent AI (Free Trial) Synopsis: Cowork Dispatch message delivery fix. v2.1.87 \u200b Fixed messages in Cowork Dispatch not getting delivered Mar 29, 2026 Synopsis: Session ID header for proxies. Jujutsu/Sapling VCS support. Resume fix for pre-2.1.85 sessions. Memory and token usage reductions. v2.1.86 \u200b Added X-Claude-Code-Session-Id header to API requests so proxies can aggregate requests by session without parsing the body Added .jj and .sl to VCS directory exclusion lists so Grep and file autocomplete don't descend into Jujutsu or Sapling metadata Fixed --resume failing with \"tool_use ids were found without tool_result blocks\" on sessions created before v2.1.85 Fixed Write/Edit/Read failing on files outside the project root (e.g., ~/.claude/CLAUDE.md ) when conditional skills or rules are configured Fixed unnecessary config disk writes on every skill invocation that could cause performance issues and config corruption on Windows Fixed potential out-of-memory crash when using /feedback on very long sessions with large transcript files Fixed --bare mode dropping MCP tools in interactive sessions and silently discarding messages enqueued mid-turn Fixed the c shortcut copying only ~20 characters of the OAuth login URL instead of the full URL Fixed masked input (e.g., OAuth code paste) leaking the start of the token when wrapping across multiple lines on narrow terminals Fixed offici", "tier": "WORTH_YOUR_TIME", "what_it_is": "Claude Code v2.1.86 and v2.1.87 shipped with several important fixes: Cowork Dispatch message delivery is fixed, API requests now include a session ID header for better proxy handling, and there's a critical fix for the --resume flag failing on older sessions. There are also memory and token usage reductions, plus support for Jujutsu and Sapling version control systems.", "why_it_matters": "Two things matter here for your workflow. First, the --resume fix directly affects how you iterate on long-running sessions \u2014 if you've been creating fresh sessions instead of resuming because resume was flaky, you can stop doing that. Second, the memory and token usage reductions mean your longer debugging or exploration sessions won't hit limits as quickly. The session ID header is useful if you ever start running Claude Code behind a proxy or want to aggregate logs, but that's not pressing for your current setup.", "expandable_implement": "Start using --resume more aggressively when debugging or iterating on a problem. When you're working through a traceback or refining a feature, instead of starting a new session every time you hit a snag, use `claude code --resume` to pick up where you left off. This preserves context and lets Claude build on what it already learned about your codebase and your specific problem. The fix means this should now be reliable even on sessions you started weeks ago. Try it next time you're debugging the inspector scheduler or working on a new briefing feature \u2014 you'll save time not re-explaining the problem and the context you've already established.", "expandable_learn": null, "unblocks_project": null}, {"title": "Why OpenAI really shut down Sora", "url": "https://techcrunch.com/2026/03/29/why-openai-really-shut-down-sora/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-30T03:09:38+00:00", "description": "OpenAI's decision last week to shut down Sora, its AI video-generation tool, just six months after releasing it to the public raised immediate suspicions. The app had invited users to upload their own faces \u2014 so was this some kind of elaborate data grab?", "id": "00313a4d5686", "content": "OpenAI's decision last week to shut down Sora, its AI video-generation tool, just six months after releasing it to the public raised immediate suspicions. The app had invited users to upload their own faces \u2014 so was this some kind of elaborate data grab?", "tier": "WORTH_YOUR_TIME", "summary": "OpenAI shut down Sora after just 6 months public availability, raising questions about the viability of consumer AI video tools. This matters because it signals that even well-funded labs are struggling to make video generation economically sustainable or legally defensible at scale. If you were building workflows around Sora, you just learned a hard lesson about platform risk with cutting-edge AI tools.", "rank": 1}, {"title": "Sora\u2019s shutdown could be a reality check moment for AI video", "url": "https://techcrunch.com/2026/03/29/soras-shutdown-could-be-a-reality-check-moment-for-ai-video/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-29T16:30:00+00:00", "description": "Is this just normal corporate strategy, or are we about to see a broader pullback on AI-generated video?", "id": "bf16d8c004a9", "content": "Is this just normal corporate strategy, or are we about to see a broader pullback on AI-generated video?", "tier": "NOTED", "summary": "Industry observers are debating whether Sora's shutdown signals a broader pullback in AI video generation. Could be normal corporate strategy or a canary in the coal mine for unsustainable economics in generative video. Worth watching if you're investing time in video automation workflows.", "rank": 2}, {"title": "Bluesky\u2019s new app is an AI for customizing your feed", "url": "https://www.theverge.com/ai-artificial-intelligence/903190/bluesky-attie-ai-custom-feeds", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-29T21:44:41+00:00", "description": "The latest app from the team behind Bluesky is Attie, an AI assistant that lets you build your own algorithm. At the Atmosphere conference, Bluesky's former CEO, Jay Graber, and CTO Paul Frazee, unveiled Attie, which is powered by Anthropic's Claude and built on top of Bluesky's underlying AT Protocol (atproto). Attie allows users to [\u2026]", "id": "9e42be92f2f3", "content": "The latest app from the team behind Bluesky is Attie, an AI assistant that lets you build your own algorithm. At the Atmosphere conference, Bluesky's former CEO, Jay Graber, and CTO Paul Frazee, unveiled Attie, which is powered by Anthropic's Claude and built on top of Bluesky's underlying AT Protocol (atproto). Attie allows users to [\u2026]", "tier": "NOTED", "summary": "Bluesky launched Attie, an AI assistant powered by Claude that lets you build custom feed algorithms on their AT Protocol. Interesting technical demonstration of AI as an interface layer for data filtering, but unless you're building social media tools or thinking about AI-driven content curation systems, this is mostly a neat demo.", "rank": 3}], "leaderboard": [{"rank": 1, "title": "Build autonomous optimization loops using scoring functions", "category": "PARADIGM_SHIFT", "rationale": "The autoresearch pattern (define a scoring function, let an agent explore overnight, review improvements) is how Anthropic trained Claude to be exceptional at structured tasks. This same pattern applies to ANY system where quality can be scored: prompt optimization, scraper tuning, route efficiency, pricing models. Mastering this unlocks compound improvements across every future system you build. The Shopify CEO example proves it works on production code, not just ML training.", "first_step": "Take the inspector scheduling scoring function (route efficiency, time windows, priority) and set up a 4-hour overnight loop that generates alternative schedules, scores them, and surfaces the top 3 by morning.", "time_investment": "2-3 sessions to internalize the pattern, then reusable forever", "days_on_leaderboard": 7}, {"rank": 2, "title": "Learn when to slow agents down and demand understanding before proceeding", "category": "PARADIGM_SHIFT", "rationale": "Zechner's warning about 'complexity monsters' addresses the Stage 4 trap: agents generate code faster than you can reason about it. Auto mode is powerful, but cognitive debt is real. The discipline of stopping when you don't understand what the agent built\u2014even if it works\u2014is what prevents production systems from becoming unmaintainable black boxes. This is the difference between shipping fast and shipping sustainably.", "first_step": "Next Claude Code session: when the agent finishes a complex multi-file change, stop before testing. Force yourself to read through each file and articulate what changed and why. If you can't, don't proceed until you can.", "time_investment": "Immediate practice\u2014adds 10-15 minutes per complex build, but prevents hours of debugging later", "days_on_leaderboard": 5}, {"rank": 3, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works (what triggers review vs auto-approval) teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature\u2014it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 6}, {"rank": 4, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 7}, {"rank": 5, "title": "Understand Matt Webb's insight: architect systems to make solutions obvious, not solvable", "category": "PARADIGM_SHIFT", "rationale": "Webb identifies the shift from writing code to designing the structure that makes the right solution obvious to agents. Agents can solve any problem with infinite tokens and time, but the skill is creating architectures where the efficient path emerges naturally. This is the mental model that prevents complexity monsters and makes autonomous systems maintainable. It's system design as constraint definition.", "first_step": "Review your inspector scheduler architecture. Identify one place where the agent had to iterate multiple times to get right. Ask: what constraint or structure could you have added to make the correct solution more obvious from the start?", "time_investment": "30 minutes of architectural reflection per project", "days_on_leaderboard": 2}], "backlog_summary": {"total_pending": 8, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 2, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 5}, {"title": "Auto mode for Claude Code", "days_pending": 5}, {"title": "Package Managers Need to Cool Down", "days_pending": 5}]}, "dropped_counts": {"layer_1": 0, "layer_2": 1, "layer_3": 1}, "total_fetched": 62}, {"date": "2026-03-29", "items": [{"title": "Quoting Matt Webb", "url": "https://simonwillison.net/2026/Mar/28/matt-webb/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-28T12:04:26+00:00", "description": "The thing about agentic coding is that agents grind problems into dust. Give an agent a problem and a while loop and - long term - it\u2019ll solve that problem even if it means burning a trillion tokens and re-writing down to the silicon. [...] But we want AI agents to solve coding problems quickly and in a way that is maintainable and adaptive and composable (benefiting from improvements elsewhere), and where every addition makes the whole stack better. So at the bottom is really great libraries that encapsulate hard problems, with great interfaces that make the \u201cright\u201d way the easy way for developers building apps with them. Architecture! While I\u2019m vibing (I call it vibing now, not coding and not vibe coding) while I\u2019m vibing, I am looking at lines of code less than ever before, and thinking about architecture more than ever before. \u2014 Matt Webb , An appreciation for (technical) architecture Tags: matt-webb , ai , llms , vibe-coding , coding-agents , ai-assisted-programming , generative-ai , agentic-engineering , definitions", "id": "388aafa484ed", "content": "The thing about agentic coding is that agents grind problems into dust. Give an agent a problem and a while loop and - long term - it\u2019ll solve that problem even if it means burning a trillion tokens and re-writing down to the silicon. [...] But we want AI agents to solve coding problems quickly and in a way that is maintainable and adaptive and composable (benefiting from improvements elsewhere), and where every addition makes the whole stack better. So at the bottom is really great libraries that encapsulate hard problems, with great interfaces that make the \u201cright\u201d way the easy way for developers building apps with them. Architecture! While I\u2019m vibing (I call it vibing now, not coding and not vibe coding) while I\u2019m vibing, I am looking at lines of code less than ever before, and thinking about architecture more than ever before. \u2014 Matt Webb , An appreciation for (technical) architecture Tags: matt-webb , ai , llms , vibe-coding , coding-agents , ai-assisted-programming , generative-ai , agentic-engineering , definitions", "tier": "WORTH_YOUR_TIME", "what_it_is": "Matt Webb observes that AI coding agents can solve any problem given enough time and tokens, but the real skill is architecting systems so agents solve problems efficiently rather than grinding through infinite iterations. He's shifting from writing code to designing the structure that makes the right solution obvious.", "why_it_matters": "You're hitting Stage 4 problems \u2014 debugging tracebacks, orchestrating multiple systems, building autonomous loops. This is the exact inflection point Matt describes. When you're wrestling with a GitHub Actions pipeline that won't fail gracefully or trying to get Claude Code to understand your project structure, the instinct is to iterate harder. But the insight here is that you need better architecture first. If your STR Daily Briefing has clean separation between data fetching, classification, and email generation, Claude can fix a broken Gmail step without touching the rest. If your Inspector Scheduler has well-defined boundaries between schedule parsing, conflict detection, and calendar updates, debugging becomes straightforward. Poor architecture makes agents grind. Good architecture makes them effective.", "expandable_implement": null, "expandable_learn": "Next time you're stuck in a debugging loop with Claude Code, step back and ask: 'What would make this problem trivial to solve?' Often the answer is structural \u2014 clearer function boundaries, better error messages, more explicit state management. Try this: Pick your most frustrating recurring bug in the Inspector Scheduler. Before asking Claude to fix it again, spend 15 minutes sketching how you'd restructure that part of the system to make the bug impossible or obvious. Then implement that structure with Claude's help. You'll likely find the bug fixes itself once the architecture is right, and future issues in that area become much easier to diagnose.", "unblocks_project": null}, {"title": "Bluesky leans into AI with Attie, an app for building custom feeds", "url": "https://techcrunch.com/2026/03/28/bluesky-leans-into-ai-with-attie-an-app-for-building-custom-feeds/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-28T23:00:00+00:00", "description": "Bluesky\u2019s new app Attie uses AI to help people build custom feeds the open social networking protocol atproto.", "id": "68e9d9bfd047", "content": "Bluesky\u2019s new app Attie uses AI to help people build custom feeds the open social networking protocol atproto.", "tier": "NOTED", "summary": "Bluesky released Attie, an app that uses AI to help people build custom feeds on their protocol. Interesting as a case study in AI-powered curation and how open protocols enable experimentation, but not immediately relevant unless you're building social tools or thinking about algorithmic content filtering in your operations.", "rank": 4}, {"title": "Stanford study outlines dangers of asking AI chatbots for personal advice", "url": "https://techcrunch.com/2026/03/28/stanford-study-outlines-dangers-of-asking-ai-chatbots-for-personal-advice/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-28T20:45:54+00:00", "description": "While there\u2019s been plenty of debate about AI sycophancy, a new study by Stanford computer scientists attempts to measure how harmful that tendency might be.", "id": "b5b58f7d4d34", "content": "While there\u2019s been plenty of debate about AI sycophancy, a new study by Stanford computer scientists attempts to measure how harmful that tendency might be.", "tier": "NOTED", "summary": "Stanford researchers measured how AI chatbot sycophancy (telling you what you want to hear) could be harmful when people ask for personal advice. Good to be aware of when you're using AI for decision support \u2014 always pressure test outputs and don't mistake agreement for accuracy. The models want to please you, not challenge you.", "rank": 5}, {"title": "Anthropic\u2019s Claude popularity with paying consumers is skyrocketing", "url": "https://techcrunch.com/2026/03/28/anthropics-claude-popularity-with-paying-consumers-is-skyrocketing/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-28T14:15:00+00:00", "description": "Estimates for total Claude consumer users are all over the map (we've seen figures ranging from 18 million to 30 million). Anthropic hasn't disclosed this data, but a spokesperson did tell TechCrunch that Claude paid subscriptions have more than doubled this year.", "id": "419dcab79745", "content": "Estimates for total Claude consumer users are all over the map (we've seen figures ranging from 18 million to 30 million). Anthropic hasn't disclosed this data, but a spokesperson did tell TechCrunch that Claude paid subscriptions have more than doubled this year.", "tier": "WORTH_YOUR_TIME", "summary": "Claude paid subscriptions have more than doubled this year, showing real consumer willingness to pay for AI that feels different. This matters because it proves there's room for multiple winners in foundation models \u2014 you're not locked into just OpenAI. Claude's emphasis on thoughtful responses and extended context windows is clearly resonating with people doing real work.", "rank": 2}, {"title": "Suno leans into customization with v5.5", "url": "https://www.theverge.com/entertainment/903056/suno-ai-music-v5-5-model", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-28T18:33:10+00:00", "description": "Suno just released one of its biggest updates yet with v5.5 of its AI music model. Where previous updates focused mostly on improving fidelity and creating more natural vocals, v5.5 is about giving users more control. It includes three new features: Voices, My Taste, and Custom Models. In the release notes, Suno says that Voices [\u2026]", "id": "4d457d93f142", "content": "Suno just released one of its biggest updates yet with v5.5 of its AI music model. Where previous updates focused mostly on improving fidelity and creating more natural vocals, v5.5 is about giving users more control. It includes three new features: Voices, My Taste, and Custom Models. In the release notes, Suno says that Voices [\u2026]", "tier": "WORTH_YOUR_TIME", "summary": "Suno's v5.5 gives you way more control over AI music generation with custom voices, taste profiles, and model tuning. This is the pattern to watch: AI tools moving from 'generate random thing' to 'generate MY thing consistently.' If you're building anything with generative AI, controllability and consistency are becoming table stakes.", "rank": 3}, {"title": "Why OpenAI killed Sora", "url": "https://www.theverge.com/ai-artificial-intelligence/902368/openai-sora-dead-ai-video-generation-competition", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-28T12:00:00+00:00", "description": "On Tuesday morning, everything was business as usual at OpenAI. By the end of the day, the company had announced that it would scrap its video-generation app, Sora, and reverse plans for video generation inside ChatGPT; it would wind down a $1 billion Disney deal; it would shuffle the role of a high-level executive; and [\u2026]", "id": "a9eeb03192e5", "content": "On Tuesday morning, everything was business as usual at OpenAI. By the end of the day, the company had announced that it would scrap its video-generation app, Sora, and reverse plans for video generation inside ChatGPT; it would wind down a $1 billion Disney deal; it would shuffle the role of a high-level executive; and [\u2026]", "tier": "GAME_CHANGER", "summary": "OpenAI shut down Sora and pulled back on video generation across ChatGPT, killing a $1B Disney deal in the process. This is a major strategic pivot from a leading lab \u2014 either they hit a wall on video economics/quality, or they're reallocating resources to something bigger. For builders, it signals video generation may not be production-ready yet and the competitive landscape just opened up.", "rank": 1}], "leaderboard": [{"rank": 1, "title": "Build autonomous optimization loops using scoring functions", "category": "PARADIGM_SHIFT", "rationale": "The autoresearch pattern (define a scoring function, let an agent explore overnight, review improvements) is how Anthropic trained Claude to be exceptional at structured tasks. This same pattern applies to ANY system where quality can be scored: prompt optimization, scraper tuning, route efficiency, pricing models. Mastering this unlocks compound improvements across every future system you build. The Shopify CEO example proves it works on production code, not just ML training.", "first_step": "Take the inspector scheduling scoring function (route efficiency, time windows, priority) and set up a 4-hour overnight loop that generates alternative schedules, scores them, and surfaces the top 3 by morning.", "time_investment": "2-3 sessions to internalize the pattern, then reusable forever", "days_on_leaderboard": 6}, {"rank": 2, "title": "Learn when to slow agents down and demand understanding before proceeding", "category": "PARADIGM_SHIFT", "rationale": "Zechner's warning about 'complexity monsters' addresses the Stage 4 trap: agents generate code faster than you can reason about it. Auto mode is powerful, but cognitive debt is real. The discipline of stopping when you don't understand what the agent built\u2014even if it works\u2014is what prevents production systems from becoming unmaintainable black boxes. This is the difference between shipping fast and shipping sustainably.", "first_step": "Next Claude Code session: when the agent finishes a complex multi-file change, stop before testing. Force yourself to read through each file and articulate what changed and why. If you can't, don't proceed until you can.", "time_investment": "Immediate practice\u2014adds 10-15 minutes per complex build, but prevents hours of debugging later", "days_on_leaderboard": 4}, {"rank": 3, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works (what triggers review vs auto-approval) teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature\u2014it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 5}, {"rank": 4, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 6}, {"rank": 5, "title": "Understand Matt Webb's insight: architect systems to make solutions obvious, not solvable", "category": "PARADIGM_SHIFT", "rationale": "Webb identifies the shift from writing code to designing the structure that makes the right solution obvious to agents. Agents can solve any problem with infinite tokens and time, but the skill is creating architectures where the efficient path emerges naturally. This is the mental model that prevents complexity monsters and makes autonomous systems maintainable. It's system design as constraint definition.", "first_step": "Review your inspector scheduler architecture. Identify one place where the agent had to iterate multiple times to get right. Ask: what constraint or structure could you have added to make the correct solution more obvious from the start?", "time_investment": "30 minutes of architectural reflection per project", "days_on_leaderboard": 1}], "backlog_summary": {"total_pending": 6, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 4}, {"title": "Auto mode for Claude Code", "days_pending": 4}, {"title": "Package Managers Need to Cool Down", "days_pending": 4}]}, "dropped_counts": {"layer_1": 1, "layer_2": 0, "layer_3": 2}, "total_fetched": 62}, {"date": "2026-03-28", "items": [{"title": "Vibe coding SwiftUI apps is a lot of fun", "url": "https://simonwillison.net/2026/Mar/27/vibe-coding-swiftui/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-27T20:59:53+00:00", "description": "I have a new laptop - a 128GB M5 MacBook Pro, which early impressions show to be very capable for running good local LLMs. I got frustrated with Activity Monitor and decided to vibe code up some alternative tools for monitoring performance and I'm very happy with the results. This is my second experiment with vibe coding macOS apps - the first was this presentation app a few weeks ago . It turns out Claude Opus 4.6 and GPT-5.4 are both very competent at SwiftUI - and a full SwiftUI app can fit in a single text file, which means I can use them to spin something up without even opening Xcode. I\u2019ve built two apps so far: Bandwidther shows me what apps are using network bandwidth and Gpuer to show me what\u2019s going on with the GPU. At Claude\u2019s suggestion both of these are now menu bar icons that open a panel full of information. Bandwidther I built this app first, because I wanted to see what Dropbox was doing. It looks like this: I\u2019ve shared the full transcript I used to build the first version of the app. My prompts were pretty minimal: Show me how much network bandwidth is in use from this machine to the internet as opposed to local LAN (My initial curiosity was to see if Dropbox was transferring files via the LAN from my old computer or was downloading from the internet.) mkdir /tmp/bandwidther and write a native Swift UI app in there that shows me these details on a live ongoing basis This got me the first version, which proved to me this was worth pursuing further. git init and git commit what you have so far Since I was about to start adding new features. Now suggest features we could add to that app, the goal is to provide as much detail as possible concerning network usage including by different apps The nice thing about having Claude suggest features is that it has a much better idea for what\u2019s possible than I do. We had a bit of back and forth fixing some bugs, then I sent a few more prompts to get to the two column layout shown above: add Per-Process Bandwidth, relaunch the app once that is done now add the reverse DNS feature but make sure original IP addresses are still visible too, albeit in smaller typeface redesign the app so that it is wider, I want two columns - the per-process one on the left and the rest on the right OK make it a task bar icon thing, when I click the icon I want the app to appear, the icon itself should be a neat minimal little thing The source code and build instructions are available in simonw/bandwidther . Gpuer While I was building Bandwidther in one session I had another session running to build a similar tool for seeing what the GPU was doing. Here\u2019s what I ended up with: Here's the transcript . This one took even less prompting because I could use the in-progress Bandwidther as an example: I want to know how much RAM and GPU this computer is using, which is hard because stuff on the GPU and RAM does not seem to show up in Activity Monitor This collected information using system_profiler and memory_pressure and gave me an answer - more importantly it showed me this was possible, so I said: Look at /tmp/bandwidther and then create a similar app in /tmp/gpuer which shows the information from above on an ongoing basis, or maybe does it better After a few more changes to the Bandwidther app I told it to catch up: Now take a look at recent changes in /tmp/bandwidther - that app now uses a sys tray icon, imitate that This remains one of my favorite tricks for using coding agents: having them recombine elements from other projects. The code for Gpuer can be found in simonw/gpuer on GitHub. You shouldn't trust these apps These two apps are classic vibe coding: I don't know Swift and I hardly glanced at the code they were writing. More importantly though, I have very little experience with macOS internals such as the values these tools are measuring. I am completely unqualified to evaluate if the numbers and charts being spat out by these tools are credible or accurate! I've added warnings to both GitHub repositories to that effect. This morning I caught Gpuer reporting that I had just 5GB of memory left when that clearly wasn't the case (according to Activity Monitor). I pasted a screenshot into Claude Code and it adjusted the calculations and the new numbers look right, but I'm still not confident that it's reporting things correctly. I only shared them on GitHub because I think they're interesting as an example of what Claude can do with SwiftUI. Despite my lack of confidence in the apps themselves, I did learn some useful things from these projects: A SwiftUI app can get a whole lot done with a single file of code - here's GpuerApp.swift (880 lines) and BandwidtherApp.swift (1063 lines). Wrapping various terminal commands in a neat UI with Swift is easily achieved. Claude has surprisingly good design taste when it comes to SwiftUI applications. Turning an app into a menu bar app is just a few lines of extra code as well. You don't need to open Xcode to build this kind of application! These two apps took very little time to build and have convinced me that building macOS apps in SwiftUI is a new capability I should consider for future projects. Tags: macos , ai , generative-ai , llms , vibe-coding , coding-agents , swift , claude-code", "id": "58ffcf300589", "content": "I have a new laptop - a 128GB M5 MacBook Pro, which early impressions show to be very capable for running good local LLMs. I got frustrated with Activity Monitor and decided to vibe code up some alternative tools for monitoring performance and I'm very happy with the results. This is my second experiment with vibe coding macOS apps - the first was this presentation app a few weeks ago . It turns out Claude Opus 4.6 and GPT-5.4 are both very competent at SwiftUI - and a full SwiftUI app can fit in a single text file, which means I can use them to spin something up without even opening Xcode. I\u2019ve built two apps so far: Bandwidther shows me what apps are using network bandwidth and Gpuer to show me what\u2019s going on with the GPU. At Claude\u2019s suggestion both of these are now menu bar icons that open a panel full of information. Bandwidther I built this app first, because I wanted to see what Dropbox was doing. It looks like this: I\u2019ve shared the full transcript I used to build the first version of the app. My prompts were pretty minimal: Show me how much network bandwidth is in use from this machine to the internet as opposed to local LAN (My initial curiosity was to see if Dropbox was transferring files via the LAN from my old computer or was downloading from the internet.) mkdir /tmp/bandwidther and write a native Swift UI app in there that shows me these details on a live ongoing basis This got me the first version, which proved to me this was worth pursuing further. git init and git commit what you have so far Since I was about to start adding new features. Now suggest features we could add to that app, the goal is to provide as much detail as possible concerning network usage including by different apps The nice thing about having Claude suggest features is that it has a much better idea for what\u2019s possible than I do. We had a bit of back and forth fixing some bugs, then I sent a few more prompts to get to the two column layout shown above: add Per-Process Bandwidth", "tier": "WORTH_YOUR_TIME", "what_it_is": "Simon Willison demonstrates a workflow he calls 'vibe coding' where he builds complete macOS apps using only LLM conversations, without opening Xcode. He created two SwiftUI menu bar apps\u2014one for monitoring network bandwidth by app, another for GPU usage\u2014by iteratively prompting Claude Opus 4.6 and GPT-5.4 with natural language descriptions of what he wanted.", "why_it_matters": "This is a practical pattern for quickly building custom monitoring or utility tools that solve immediate problems without getting bogged down in traditional development setup. You're already comfortable with Claude Code for Python work, but this shows how conversational coding extends to GUI apps on different platforms. When you hit friction with existing tools\u2014like wanting better visibility into your GitHub Actions usage or needing a custom dashboard for your STR metrics\u2014this same approach could get you a working prototype in an hour instead of spending days learning a new framework.", "expandable_implement": "Start with a single-file approach like Simon did. Create a project directory and ask Claude to write a complete SwiftUI app in one file that does one specific thing you've been wanting\u2014maybe a menu bar app that shows you today's STR occupancy across properties, or a simple window that monitors your GitHub Actions minutes usage. The key moves: (1) Ask Claude to suggest features rather than trying to spec everything upfront\u2014it knows what's possible in SwiftUI better than you do. (2) Use git from the start so you can roll back when experiments don't work. (3) Keep the scope tiny initially\u2014get something on screen that does the core thing, then iterate. You don't need to know Swift or SwiftUI; you're having a conversation about what you want to see and letting the LLM handle the implementation details. The full transcript Simon shared shows this is genuinely achievable even if you've never written a line of Swift.", "expandable_learn": "The mental model here is treating the LLM as a specialist who can work in domains you don't know, as long as you can clearly describe the outcome you want. This works because SwiftUI apps can be self-contained in a way that many other platforms can't\u2014a single file can be a complete, runnable GUI application. The breakthrough isn't the code; it's realizing that 'I don't know that platform' is no longer a blocking concern for small utility projects. Experiment: Think of one monitoring or visibility problem you have right now where the existing tools don't quite fit. Spend 20 minutes in a Claude conversation describing what you want to see on screen and why. Don't try to architect it\u2014just describe the problem like you're explaining it to a teammate. See how far you get toward a working prototype without writing any code yourself.", "unblocks_project": null}, {"title": "Memory chip giant SK hynix could help end \u2018RAMmageddon\u2019 with blockbuster US IPO", "url": "https://techcrunch.com/2026/03/27/memory-chip-giant-sk-hynix-could-help-end-rammageddon-with-blockbuster-us-ipo/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-27T19:11:28+00:00", "description": "SK hynix\u2019s potential U.S. listing could raise $10-$14 billion to help it build more capacity, encourage others to follow, and end the 'RAMmageddon' memory shortage.", "id": "4360fdd02bf5", "content": "SK hynix\u2019s potential U.S. listing could raise $10-$14 billion to help it build more capacity, encourage others to follow, and end the 'RAMmageddon' memory shortage.", "tier": "NOTED", "summary": "SK hynix might IPO in the US to raise $10-14B for memory chip production, potentially ending the 'RAMmageddon' shortage. Relevant if you're dealing with GPU/compute constraints \u2014 more memory chip capacity eventually means better availability and pricing for the hardware you need to run inference or fine-tune models locally.", "rank": 2}, {"title": "OpenAI shuts down Sora while Meta gets shut out in court", "url": "https://techcrunch.com/video/openai-shuts-down-sora-while-meta-gets-shut-out-in-court/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-27T13:30:00+00:00", "description": "When an 82-year-old Kentucky woman was\u00a0offered $26 million\u00a0from an AI company that wante k boxes. This is the difference between shipping fast and shipping sustainably.", "first_step": "Next Claude Code session: when the agent finishes a complex multi-file change, stop before testing. Force yourself to read through each file and articulate what changed and why. If you can't, don't proceed until you can.", "time_investment": "Immediate practice\u2014adds 10-15 minutes per complex build, but prevents hours of debugging later", "days_on_leaderboard": 3}, {"rank": 3, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works (what triggers review vs auto-approval) teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature\u2014it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 4}, {"rank": 4, "title": "Study 'vibe coding' as a rapid prototyping workflow for non-core tools", "category": "APPLIED_PATTERN", "rationale": "Willison's workflow\u2014building complete apps without opening an IDE, iterating purely through LLM conversations\u2014demonstrates a technique for rapid tool creation outside your primary stack. Not everything needs production-grade architecture. For one-off utilities (monitoring tools, admin dashboards, quick data processors), this pattern lets you ship in hours instead of days. The key insight: some problems deserve throwaway code, and AI makes throwaway code viable at a new scale.", "first_step": "Identify one internal tool you've been avoiding building (property performance dashboard, inspector route visualizer, maintenance cost tracker) and spend 30 minutes describing it to Claude Code. See how far you get without writing code.", "time_investment": "30 minutes to test the pattern, applicable to any quick-build utility", "days_on_leaderboard": 1}, {"rank": 5, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 5}], "backlog_summary": {"total_pending": 6, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 1, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 3}, {"title": "Auto mode for Claude Code", "days_pending": 3}, {"title": "Package Managers Need to Cool Down", "days_pending": 3}]}, "dropped_counts": {"layer_1": 1, "layer_2": 2, "layer_3": 2}, "total_fetched": 62}, {"date": "2026-03-27", "items": [{"title": "v2.1.85", "url": "https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md#2185", "source_name": "Claude Code Changelog", "layer": 1, "published": null, "description": "Added `CLAUDE_CODE_MCP_SERVER_NAME` and `CLAUDE_CODE_MCP_SERVER_URL` environment variables to MCP `headersHelper` scripts, allowing one helper to serve multiple servers Added conditional `if` field for hooks using permission rule syntax (e.g., `Bash(git *)`) to filter when they run, reducing process spawning overhead Added timestamp markers in transcripts when scheduled tasks (`/loop`, `CronCreate`) fire Added trailing space after `[Image #N]` placeholder when pasting images Deep link queries (`claude-cli://open?q=\u2026`) now support up to 5,000 characters, with a \"scroll to review\" warning for long pre-filled prompts MCP OAuth now follows RFC 9728 Protected Resource Metadata discovery to find the authorization server Plugins blocked by organization policy (`managed-settings.json`) can no longer be installed or enabled, and are hidden from marketplace views PreToolUse hooks can now satisfy `AskUserQuestion` by returning `updatedInput` alongside `permissionDecision: \"allow\"`, enabling headless integrations that collect answers via their own UI `tool_parameters` in OpenTelemetry tool_result events are now gated behind `OTEL_LOG_TOOL_DETAILS=1` Fixed `/compact` failing with \"context exceeded\" when the conversation has grown too large for the compact request itself to fit Fixed `/plugin enable` and `/plugin disable` failing when a plugin's install location differs from where it's declared in settings Fixed `--worktree` exiting with an error in non-git repositories before the `WorktreeCreate` hook could run Fixed `deniedMcpServers` setting not blocking claude.ai MCP servers Fixed `switch_display` in the computer-use tool returning \"not available in this session\" on multi-monitor setups Fixed crash when `OTEL_LOGS_EXPORTER`, `OTEL_METRICS_EXPORTER`, or `OTEL_TRACES_EXPORTER` is set to `none` Fixed diff syntax highlighting not working in non-native builds Fixed MCP step-up authorization failing when a refresh token exists \u2014 servers requesting elevated scopes via `403 insufficient_scope` now correctly trigger the re-authorization flow Fixed memory leak in remote sessions when a streaming response is interrupted Fixed persistent ECONNRESET errors during edge connection churn by using a fresh TCP connection on retry Fixed prompts getting stuck in the queue after running certain slash commands, with up-arrow unable to retrieve them Fixed Python Agent SDK: `type:'sdk'` MCP servers passed via `--mcp-config` are no longer dropped during startup Fixed raw key sequences appearing in the prompt when running over SSH or in the VS Code integrated terminal Fixed Remote Control session status staying stuck on \"Requires Action\" after a permission is resolved Fixed shift+enter and meta+enter being intercepted by typeahead suggestions instead of inserting newlines Fixed stale content bleeding through when scrolling up during streaming Fixed terminal left in enhanced keyboard mode after exit in Ghostty, Kitty, WezTerm, and other terminals supporting the Kitty keyboard protocol \u2014 Ctrl+C and Ctrl+D now work correctly after quitting Improved @-mention file autocomplete performance on large repositories Improved PowerShell dangerous command detection Improved scroll performance with large transcripts by replacing WASM yoga-layout with a pure TypeScript implementation Reduced UI stutter when compaction triggers on large sessions", "id": "a4f801cb2443", "content": "Added `CLAUDE_CODE_MCP_SERVER_NAME` and `CLAUDE_CODE_MCP_SERVER_URL` environment variables to MCP `headersHelper` scripts, allowing one helper to serve multiple servers Added conditional `if` field for hooks using permission rule syntax (e.g., `Bash(git *)`) to filter when they run, reducing process spawning overhead Added timestamp markers in transcripts when scheduled tasks (`/loop`, `CronCreate`) fire Added trailing space after `[Image #N]` placeholder when pasting images Deep link queries (`claude-cli://open?q=\u2026`) now support up to 5,000 characters, with a \"scroll to review\" warning for long pre-filled prompts MCP OAuth now follows RFC 9728 Protected Resource Metadata discovery to find the authorization server Plugins blocked by organization policy (`managed-settings.json`) can no longer be installed or enabled, and are hidden from marketplace views PreToolUse hooks can now satisfy `AskUserQuestion` by returning `updatedInput` alongside `permissionDecision: \"allow\"`, enabling headless integrations that collect answers via their own UI `tool_parameters` in OpenTelemetry tool_result events are now gated behind `OTEL_LOG_TOOL_DETAILS=1` Fixed `/compact` failing with \"context exceeded\" when the conversation has grown too large for the compact request itself to fit Fixed `/plugin enable` and `/plugin disable` failing when a plugin's install location differs from where it's declared in settings Fixed `--worktree` exiting with an error in non-git repositories before the `WorktreeCreate` hook could run Fixed `deniedMcpServers` setting not blocking claude.ai MCP servers Fixed `switch_display` in the computer-use tool returning \"not available in this session\" on multi-monitor setups Fixed crash when `OTEL_LOGS_EXPORTER`, `OTEL_METRICS_EXPORTER`, or `OTEL_TRACES_EXPORTER` is set to `none` Fixed diff syntax highlighting not working in non-native builds Fixed MCP step-up authorization failing when a refresh token exists \u2014 servers requesting elevated scopes via `403 insuffici", "tier": "NOTED", "what_it_is": "Claude Code v2.1.85 ships a collection of refinements, mostly focused on MCP (Model Context Protocol) infrastructure and workflow hooks. The most significant addition is conditional hooks \u2014 you can now filter when automation triggers run using permission rule syntax. There are also improvements to how MCP servers authenticate, how plugins are managed in enterprise environments, and several bug fixes for edge cases in computer use and OpenTelemetry logging.", "why_it_matters": "The conditional hooks feature is the only item here that might touch your workflow, and even then it's a niche optimization. You're not yet running MCP integrations or custom hooks in production, so most of this is plumbing for a system you haven't built into yet. When you do start orchestrating multiple MCP servers (say, for the Guest Comms Intelligence Layer once Breezeway unblocks), the environment variable helpers and conditional filtering will matter. For now, this is noise \u2014 incremental infrastructure work that doesn't change what you can build or how fast you can build it. Worth knowing it exists so you're not surprised when you see `if` fields in hook documentation, but not worth time today.", "expandable_implement": null, "expandable_learn": "The conditional hook syntax (`if: Bash(git *)`) is a small example of a bigger pattern you'll see more of: declarative filtering instead of procedural logic. Instead of writing code that checks \"is this a git command?\" and branches, you declare the condition upfront and the system handles the branching. This is how modern infrastructure tools (Kubernetes, Terraform, even GitHub Actions) tend to work \u2014 you describe what you want to happen and when, and the runtime handles the execution. The benefit: fewer moving parts, easier to reason about, harder to get into weird states. If you ever find yourself writing a lot of `if` statements in automation scripts to decide whether to run something, ask yourself if the tool supports declarative conditions instead. It's almost always cleaner.", "unblocks_project": null}, {"title": "We Rewrote JSONata with AI in a Day, Saved $500K/Year", "url": "https://simonwillison.net/2026/Mar/27/vine-porting-jsonata/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-27T00:35:01+00:00", "description": "We Rewrote JSONata with AI in a Day, Saved $500K/Year Bit of a hyperbolic framing but this looks like another case study of vibe porting , this time spinning up a new custom Go implementation of the JSONata JSON expression language - similar in focus to jq, and heavily associated with the Node-RED platform. As with other vibe-porting projects the key enabling factor was JSONata's existing test suite, which helped build the first working Go version in 7 hours and $400 of token spend. The Reco team then used a shadow deployment for a week to run the new and old versions in parallel to confirm the new implementation exactly matched the behavior of the old one. Tags: go , json , ai , generative-ai , llms , agentic-engineering , vibe-porting", "id": "aee0c2de60d5", "content": "We Rewrote JSONata with AI in a Day, Saved $500K/Year Bit of a hyperbolic framing but this looks like another case study of vibe porting , this time spinning up a new custom Go implementation of the JSONata JSON expression language - similar in focus to jq, and heavily associated with the Node-RED platform. As with other vibe-porting projects the key enabling factor was JSONata's existing test suite, which helped build the first working Go version in 7 hours and $400 of token spend. The Reco team then used a shadow deployment for a week to run the new and old versions in parallel to confirm the new implementation exactly matched the behavior of the old one. Tags: go , json , ai , generative-ai , llms , agentic-engineering , vibe-porting", "tier": "WORTH_YOUR_TIME", "what_it_is": "A team ported the JSONata query language from JavaScript to Go in 7 hours using AI, guided by the existing test suite. They then ran both versions in parallel for a week to confirm identical behavior before switching over. This is another example of 'vibe porting' \u2014 using AI to recreate software by describing what it does and validating against tests.", "why_it_matters": "This pattern directly applies to your work. You have Python tools that would benefit from faster execution or easier deployment (like the briefing pipeline or the inspector scheduler). The key insight is that a comprehensive test suite makes AI-assisted rewrites tractable \u2014 the AI doesn't need to understand the code perfectly, it just needs to pass the tests. The shadow deployment approach (running old and new in parallel) is also a template for safely migrating production systems without risking downtime.", "expandable_implement": "To try this pattern on a smaller scale:\n\n1. Pick a slow or clunky component in your current stack \u2014 maybe a Python script that processes data slowly, or a module that would be simpler in a different language.\n\n2. Write a comprehensive test suite first if you don't have one. Export sample inputs and outputs, edge cases, error conditions. The tests are what make this whole approach work.\n\n3. Feed the tests and the original code to Claude and ask it to rewrite in your target language (Go for speed, TypeScript for web integration, whatever fits). Let it iterate against the test failures.\n\n4. Once tests pass, run both versions in parallel on real data for a few days. Log any discrepancies. This is your safety net.\n\n5. Only after confirming identical behavior do you switch over. This de-risks the migration completely.\n\nStart small \u2014 a single utility function or data transformer. Build confidence before attempting something like the entire inspector scheduler.", "expandable_learn": "The mental model here is that AI can 'vibe port' \u2014 it doesn't need to understand every implementation detail, it just needs to produce the same outputs for the same inputs. This works because:\n\n- Tests encode the actual requirements, not the implementation\n- AI is surprisingly good at pattern matching and translation\n- You're not asking for creativity, you're asking for equivalence\n\nThis inverts the usual programming task. Normally you write code to pass tests. Here, you write tests to constrain AI.\n\nA small experiment: Take one of your existing Python functions \u2014 something like date parsing or string formatting in your briefing tool. Write 10 test cases that cover normal use and edge cases. Then ask Claude to rewrite it in JavaScript or Go, running the tests until they all pass. See how the ported version compares. This will give you a feel for where this technique shines and where it struggles (spoiler: it struggles with stateful systems and complex side effects, but excels at pure transformation logic).", "unblocks_project": null}, {"title": "My minute-by-minute response to the LiteLLM malware attack", "url": "https://simonwillison.net/2026/Mar/26/response-to-the-litellm-malware-attack/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-26T23:58:22+00:00", "description": "My minute-by-minute response to the LiteLLM malware attack Callum McMahon reported the LiteLLM malware attack to PyPI. Here he shares the Claude transcripts he used to help him confirm the vulnerability and decide what to do about it. Claude even suggested the PyPI security contact address after confirming the malicious code in a Docker container: Confirmed . Fresh download from PyPI right now in an isolated Docker container: Inspecting: litellm-1.82.8-py3-none-any.whl\nFOUND: litellm_init.pth\nSIZE: 34628 bytes\nFIRST 200 CHARS:\nimport os, subprocess, sys; subprocess.Popen([sys.executable, \"-c\", \"import base64; exec(base64.b64decode('aW1wb3J0IHN1YnByb2Nlc3MKaW1wb3J0IHRlbXBmaWxl... The malicious litellm==1.82.8 is live on PyPI right now and anyone installing or upgrading litellm will be infected. This needs to be reported to security@pypi.org immediately. I was chuffed to see Callum use my claude-code-transcripts tool to publish the transcript of the conversation. Via Hacker News Tags: pypi , security , ai , generative-ai , llms , claude , supply-chain", "id": "a8ee33b4d8f8", "content": "My minute-by-minute response to the LiteLLM malware attack Callum McMahon reported the LiteLLM malware attack to PyPI. Here he shares the Claude transcripts he used to help him confirm the vulnerability and decide what to do about it. Claude even suggested the PyPI security contact address after confirming the malicious code in a Docker container: Confirmed . Fresh download from PyPI right now in an isolated Docker container: Inspecting: litellm-1.82.8-py3-none-any.whl\nFOUND: litellm_init.pth\nSIZE: 34628 bytes\nFIRST 200 CHARS:\nimport os, subprocess, sys; subprocess.Popen([sys.executable, \"-c\", \"import base64; exec(base64.b64decode('aW1wb3J0IHN1YnByb2Nlc3MKaW1wb3J0IHRlbXBmaWxl... The malicious litellm==1.82.8 is live on PyPI right now and anyone installing or upgrading litellm will be infected. This needs to be reported to security@pypi.org immediately. I was chuffed to see Callum use my claude-code-transcripts tool to publish the transcript of the conversation. Via Hacker News Tags: pypi , security , ai , generative-ai , llms , claude , supply-chain", "tier": "NOTED", "what_it_is": "A security researcher documented their real-time response to discovering malware in a popular Python package (LiteLLM). They used Claude to analyze the malicious code in an isolated Docker container, confirm the threat, and guide their reporting process. The transcript shows how they used AI as a collaborator during a time-sensitive security incident.", "why_it_matters": "This demonstrates two useful patterns for your workflow. First, using Docker for safe inspection of suspicious code \u2014 something you might encounter when evaluating new Python packages for your pipeline. Second, using Claude as a thinking partner during incidents where you need to move fast but stay methodical. The transcript also shows how to structure AI conversations when you need both technical analysis and procedural guidance (like 'who do I report this to?').", "expandable_implement": null, "expandable_learn": "The key takeaway is using AI as a sanity-check partner during high-pressure decisions. When you're dealing with something unfamiliar (a security issue, a confusing traceback, a production incident), Claude can help you:\n\n- Confirm what you're seeing ('Is this actually malicious or am I misreading?')\n- Suggest next steps ('What should I do now?')\n- Provide context you don't have time to research ('Where do I report this?')\n\nThis is different from asking Claude to solve the problem for you. You're using it to move faster through a process where mistakes are costly.\n\nA small experiment: Next time you hit a confusing error in your briefing pipeline or inspector scheduler, don't just ask Claude to fix it. Instead, describe what you're seeing and ask it to help you understand what's happening and what your options are. Treat it like pair programming with someone who can't see your screen but can explain the concepts. Notice when this speeds you up versus when it slows you down.", "unblocks_project": null}, {"title": "Anthropic wins injunction against Trump administration over Defense Department saga", "url": "https://techcrunch.com/2026/03/26/anthropic-wins-injunction-against-trump-administration-over-defense-department-saga/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-27T01:18:38+00:00", "description": "A federal judge has ordered that the Trump administration rescind recent restrictions it placed on the AI company.", "id": "389caf951a3c", "content": "A federal judge has ordered that the Trump administration rescind recent restrictions it placed on the AI company.", "tier": "NOTED", "summary": "A judge granted Anthropic a preliminary injunction blocking Trump admin restrictions on DoD contracts. Only relevant if you're building for government customers \u2014 otherwise it's just industry drama that doesn't affect your access to Claude.", "rank": 10}, {"title": "You can now transfer your chats and personal information from other chatbots directly into Gemini", "url": "https://techcrunch.com/2026/03/26/you-can-now-transfer-your-chats-and-personal-information-from-other-chatbots-directly-into-gemini/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-26T23:47:56+00:00", "description": "Google is launching \"switching tools\" that, just as it sounds, will make it easier for users of other chatbots to switch to Gemini.", "id": "5ca70c31a95d", "content": "Google is launching \"switching tools\" that, just as it sounds, will make it easier for users of other chatbots to switch to Gemini.", "tier": "WORTH_YOUR_TIME", "summary": "Google added switching tools to Gemini that let you import chats and personal info from other chatbots. Practical if you've built up context in Claude or ChatGPT and want to test Gemini without starting from zero \u2014 removes friction from experimenting with different models.", "rank": 5}, {"title": "Wikipedia cracks down on the use of AI in article writing", "url": "https://techcrunch.com/2026/03/26/wikipedia-cracks-down-on-the-use-of-ai-in-article-writing/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-26T21:50:10+00:00", "description": "The site, whose policies are subject to change, has struggled with the issue of AI-generated writing.", "id": "fdf3e3188020", "content": "The site, whose policies are subject to change, has struggled with the issue of AI-generated writing.", "tier": "NOTED", "summary": "Wikipedia banned AI-generated articles because they consistently violate core content policies. Useful data point on where AI output quality still isn't reliable enough for high-stakes knowledge work, even with human review.", "rank": 9}, {"title": "ByteDance\u2019s new AI video generation model, Dreamina Seedance 2.0, comes to CapCut", "url": "https://techcrunch.com/2026/03/26/bytedances-new-ai-video-generation-model-dreamina-seedance-2-0-comes-to-capcut/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-26T15:25:13+00:00", "description": "The new model in CapCut will have built-in protections for making video from real faces or unauthorized intellectual property.", "id": "9139eb2f307e", "content": "The new model in CapCut will have built-in protections for making video from real faces or unauthorized intellectual property.", "tier": "WORTH_YOUR_TIME", "summary": "ByteDance's new video generation model Dreamina Seedance 2.0 is now in CapCut with built-in protections against unauthorized IP use. If you're creating video content at scale, this is a practical tool that's already integrated into an editing workflow you might already use.", "rank": 3}, {"title": "Conntour raises $7M from General Catalyst, YC to build an AI search engine for security video systems", "url": "https://techcrunch.com/2026/03/26/conntour-raises-7m-from-general-catalyst-yc-to-build-an-ai-search-engine-for-security-video-systems/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-26T13:41:00+00:00", "description": "Conntour uses AI models to let security teams query camera feeds using natural language to find any object, person, or situation.", "id": "19c6d8e547f6", "content": "Conntour uses AI models to let security teams query camera feeds using natural language to find any object, person, or situation.", "tier": "NOTED", "summary": "Conntour raised $7M to build AI search for security video systems \u2014 natural language queries across camera feeds. Interesting applied AI case study if you're thinking about how to make legacy systems searchable, though most operators won't be building security infrastructure.", "rank": 7}, {"title": "Cohere launches an open source voice model specifically for transcription", "url": "https://techcrunch.com/2026/03/26/cohere-launches-an-open-source-voice-model-specifically-for-transcription/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-26T13:30:00+00:00", "description": "Relatively light at just 2 billion parameters, the model is meant for use with consumer-grade GPUs for those who want to self-host it. It currently supports 14 languages.", "id": "596f43f4595b", "content": "Relatively light at just 2 billion parameters, the model is meant for use with consumer-grade GPUs for those who want to self-host it. It currently supports 14 languages.", "tier": "GAME_CHANGER", "summary": "Cohere released an open source transcription model at just 2 billion parameters that runs on consumer GPUs and supports 14 languages. If you're building anything with voice input, this means you can now self-host accurate transcription without monthly API bills eating your margins.", "rank": 2}, {"title": "Mistral releases a new open source model for speech generation", "url": "https://techcrunch.com/2026/03/26/mistral-releases-a-new-open-source-model-for-speech-generation/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-26T11:30:00+00:00", "description": "The model, which lets enterprises build voice agents for sales and customer engagement, puts Mistral in direct competition with the likes of ElevenLabs, Deepgram, and OpenAI.", "id": "6bf06aa3762d", "content": "The model, which lets enterprises build voice agents for sales and customer engagement, puts Mistral in direct competition with the likes of ElevenLabs, Deepgram, and OpenAI.", "tier": "GAME_CHANGER", "summary": "Mistral just dropped an open source speech generation model that lets you build voice agents for sales and customer engagement. This puts enterprise-grade voice AI in your hands without depending on ElevenLabs or OpenAI's APIs \u2014 huge for anyone building customer-facing automation or internal voice interfaces.", "rank": 1}, {"title": "Apple will reportedly allow other AI chatbots to plug into Siri", "url": "https://www.theverge.com/tech/902048/apple-siri-ai-chatbot-update-ios-27", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-26T21:31:27+00:00", "description": "Apple's iOS 27 update will allow users to choose the AI chatbot they want to link with Siri. That's according to a report from Bloomberg's Mark Gurman, who says third-party chatbots downloaded from the App Store, like Google's Gemini or Anthropic's Claude, will be able to fetch replies for Siri - similar to how the [\u2026]", "id": "c5ab5c0ace91", "content": "Apple's iOS 27 update will allow users to choose the AI chatbot they want to link with Siri. That's according to a report from Bloomberg's Mark Gurman, who says third-party chatbots downloaded from the App Store, like Google's Gemini or Anthropic's Claude, will be able to fetch replies for Siri - similar to how the [\u2026]", "tier": "WORTH_YOUR_TIME", "summary": "Apple's iOS 27 will let you plug any AI chatbot into Siri \u2014 Gemini, Claude, whatever you download. This matters because it breaks the vendor lock-in on mobile AI interfaces, meaning you can build workflows that use the best model for each job instead of being stuck with whatever Apple ships.", "rank": 4}, {"title": "Google&#8217;s &#8216;live&#8217; AI search assistant can handle conversations in dozens more languages", "url": "https://www.theverge.com/tech/901816/google-search-live-ai-assistant-expansion", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-26T18:47:51+00:00", "description": "Google is expanding access to Search Live, a feature that lets you search for information using your voice and camera. The AI search assistant is now available in more than 200 countries and territories, as well as dozens of languages, according to an announcement on Thursday. Search Live rolled out broadly in the US last [\u2026]", "id": "864d302b957e", "content": "Google is expanding access to Search Live, a feature that lets you search for information using your voice and camera. The AI search assistant is now available in more than 200 countries and territories, as well as dozens of languages, according to an announcement on Thursday. Search Live rolled out broadly in the US last [\u2026]", "tier": "WORTH_YOUR_TIME", "summary": "Google's Search Live (voice + camera AI search) is now available in 200+ countries and dozens of languages. If you're building tools for international users or exploring multimodal search interfaces, this shows how the interaction patterns are evolving
