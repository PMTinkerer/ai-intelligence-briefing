nt": "1 session to extract the pattern, ongoing recognition practice", "days_on_leaderboard": 1}, {"rank": 3, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 1}, {"rank": 4, "title": "Extract reusable Skills from working project patterns", "category": "NEW_CAPABILITY", "rationale": "You've now built multiple tools with repeating patterns: GitHub Actions orchestration, API integration, HTML email generation, structured data extraction. Each pattern is currently embedded in a specific tool. Extracting them as Skills means you can spec new tools 10x faster because the hard architectural decisions are already codified. This compounds exponentially as your library grows.", "first_step": "Extract the 'GitHub Actions + Anthropic API + HTML email delivery' pattern from the daily briefing into a reusable Skill with clear input/output specs.", "time_investment": "1-2 sessions per pattern, builds a library over time", "days_on_leaderboard": 1}, {"rank": 5, "title": "Study cross-industry AI operational case studies", "category": "STRATEGIC_MOVE", "rationale": "Your competitors are reading STR industry blogs. You should be reading how logistics companies route drivers, how insurance companies process claims, how manufacturers schedule production lines. These industries face constraint-heavy optimization problems that map directly to STR operations, but they've been solving them at scale for decades. The patterns are transferable. The mental library you build from cross-industry study makes you dangerous in any business you touch.", "first_step": "Find 2-3 detailed case studies of AI applied to field service scheduling in industries outside hospitality. Look for architectural patterns, not tool lists.", "time_investment": "30 minutes/week, compounding knowledge base", "days_on_leaderboard": 1}], "backlog_summary": {"total_pending": 0, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": []}, "dropped_counts": {}, "total_fetched": 75}, {"date": "2026-03-24", "items": [], "leaderboard": [], "backlog_summary": {"total_pending": 0, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": []}, "dropped_counts": {"layer_1": 52, "layer_2": 9, "layer_3": 14}, "total_fetched": 75}, {"date": "2026-03-24", "items": [], "leaderboard": [], "backlog_summary": {"total_pending": 0, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": []}, "dropped_counts": {}, "total_fetched": 72}, {"date": "2026-03-24", "items": [], "leaderboard": [], "backlog_summary": {"total_pending": 0, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": []}, "dropped_counts": {"layer_1": 50, "layer_2": 9, "layer_3": 13}, "total_fetched": 72}];
const backlogItems = [{"id": "38510ce5c777", "title": "v2.1.83", "source_url": "https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md#2183", "tier": "WORTH_YOUR_TIME", "layer": 1, "expandable_implement": "**To use transcript search:** Next time you're in a Claude Code session and need to find something from an earlier conversation, press `Ctrl+O` to enter transcript mode (you'll see your full conversation history). Press `/` and type your search term\u2014maybe \"haversine\" or \"GitHub Actions\" or whatever you're looking for. Use `n` to jump to the next match, `N` to go back. Press `Esc` to exit search and return to transcript view. This is especially useful when you're building on something from a few days ago and don't want to re-explain the context.\n\n**To reference pasted images:** When you're working on something that needs visual context (like generating a cleaning checklist from inspection photos), paste your images into Claude Code as usual. You'll now see `[Image #1]`, `[Image #2]`, etc. as chips in your input area. In your prompt, you can reference them directly: \"Image 1 shows the bathroom counter. Image 2 shows the expected state. Write a Breezeway task that describes the gap between them.\" This makes multi-image prompts much clearer than saying \"the first image\" or \"the one on the left.\"\n\nThe other features are either behind-the-scenes improvements or enterprise-focused (policy management, credential scrubbing). You'll benefit from them passively\u2014faster startup, fewer weird hangs\u2014but you don't need to configure anything.", "status": "pending", "date_added": "2026-03-25", "date_adopted": null, "date_archived": null, "days_pending": 15}, {"id": "8d3fcf0b18b8", "title": "Auto mode for Claude Code", "source_url": "https://simonwillison.net/2026/Mar/24/auto-mode-for-claude-code/#atom-everything", "tier": "GAME_CHANGER", "layer": 2, "expandable_implement": "To start using auto mode, update Claude Code to the latest version and run:\n\nclaude auto-mode enable\n\nThat's it \u2014 you're now using the classifier. To see exactly what rules are protecting you, run:\n\nclaude auto-mode defaults > auto-mode-rules.json\n\nOpen that file and scan through the 'allow' and 'block' sections. You'll see things like 'allow local file operations within project scope' but 'block operations in ~/ or /etc'. If you have a specific workflow that gets blocked \u2014 say, your GitHub Actions tool needs to read a config file from ~/.config \u2014 you can add custom rules to allow it. The key insight: the classifier only sees the current conversation context and the action Claude wants to take. If Claude asks to delete a file and you never mentioned deleting anything, the classifier blocks it. If you explicitly said 'delete all test files', the classifier allows it because it matches your intent. This is a middle ground between 'ask me every time' and 'trust blindly'.", "status": "pending", "date_added": "2026-03-25", "date_adopted": null, "date_archived": null, "days_pending": 15}, {"id": "73318f044426", "title": "Package Managers Need to Cool Down", "source_url": "https://simonwillison.net/2026/Mar/24/package-managers-need-to-cool-down/#atom-everything", "tier": "WORTH_YOUR_TIME", "layer": 2, "expandable_implement": "If you're using uv (which you are for at least some projects), open your pyproject.toml and add:\n\n[tool.uv]\nexclude-newer = \"72h\"\n\nThat tells uv to only consider packages that were released at least 72 hours ago. If you have a trusted package that you want to update immediately (say, anthropic's official SDK), add:\n\nexclude-newer-package = { anthropic = \"0h\" }\n\nFor pip, it's a bit more manual. You can use --uploaded-prior-to with an absolute timestamp, but that's annoying to maintain. Seth Larson's workaround (mentioned in the article) is to run a cron job that updates the timestamp in your pip.conf every day. Honestly, just switch those projects to uv \u2014 it handles relative durations natively and you're already using it elsewhere.\n\nFor GitHub Actions workflows, add this to your workflow file before any pip install step:\n\npip install uv\nuv pip install --exclude-newer 72h -r requirements.txt\n\nNow your CI pipeline has the same protection as your local environment. The key is consistency: if you protect local but not CI, an attacker just has to wait for your next deploy.", "status": "pending", "date_added": "2026-03-25", "date_adopted": null, "date_archived": null, "days_pending": 15}, {"id": "021c63d29d0d", "title": "LiteLLM Hack: Were You One of the 47,000?", "source_url": "https://simonwillison.net/2026/Mar/25/litellm-hack/#atom-everything", "tier": "WORTH_YOUR_TIME", "layer": 2, "expandable_implement": "Audit your existing projects' dependency pinning:\n\n1. For each project, check your requirements.txt or pyproject.toml. Look for entries like `litellm>=1.0.0` or `openai^1.0.0` \u2014 these would auto-upgrade.\n\n2. Switch to exact pinning for critical dependencies: `anthropic==0.18.1` instead of `anthropic>=0.18.0`. This prevents automatic upgrades to compromised versions.\n\n3. Use a tool like `pip-audit` to check your current dependencies for known vulnerabilities:\n   ```bash\n   pip install pip-audit\n   pip-audit\n   ```\n\n4. For your GitHub Actions workflows, add a scheduled job that runs pip-audit weekly and opens an issue if vulnerabilities are found. This gives you a heads-up without blocking your daily work.\n\n5. Consider adding a manual review step before upgrading any package that touches API credentials or processes external data. This is where Mario's 'slow down' advice applies \u2014 not to code generation, but to dependency updates that could compromise your entire system.", "status": "pending", "date_added": "2026-03-26", "date_adopted": null, "date_archived": null, "days_pending": 14}, {"id": "aee0c2de60d5", "title": "We Rewrote JSONata with AI in a Day, Saved $500K/Year", "source_url": "https://simonwillison.net/2026/Mar/27/vine-porting-jsonata/#atom-everything", "tier": "WORTH_YOUR_TIME", "layer": 2, "expandable_implement": "To try this pattern on a smaller scale:\n\n1. Pick a slow or clunky component in your current stack \u2014 maybe a Python script that processes data slowly, or a module that would be simpler in a different language.\n\n2. Write a comprehensive test suite first if you don't have one. Export sample inputs and outputs, edge cases, error conditions. The tests are what make this whole approach work.\n\n3. Feed the tests and the original code to Claude and ask it to rewrite in your target language (Go for speed, TypeScript for web integration, whatever fits). Let it iterate against the test failures.\n\n4. Once tests pass, run both versions in parallel on real data for a few days. Log any discrepancies. This is your safety net.\n\n5. Only after confirming identical behavior do you switch over. This de-risks the migration completely.\n\nStart small \u2014 a single utility function or data transformer. Build confidence before attempting something like the entire inspector scheduler.", "status": "pending", "date_added": "2026-03-27", "date_adopted": null, "date_archived": null, "days_pending": 13}, {"id": "58ffcf300589", "title": "Vibe coding SwiftUI apps is a lot of fun", "source_url": "https://simonwillison.net/2026/Mar/27/vibe-coding-swiftui/#atom-everything", "tier": "WORTH_YOUR_TIME", "layer": 2, "expandable_implement": "Start with a single-file approach like Simon did. Create a project directory and ask Claude to write a complete SwiftUI app in one file that does one specific thing you've been wanting\u2014maybe a menu bar app that shows you today's STR occupancy across properties, or a simple window that monitors your GitHub Actions minutes usage. The key moves: (1) Ask Claude to suggest features rather than trying to spec everything upfront\u2014it knows what's possible in SwiftUI better than you do. (2) Use git from the start so you can roll back when e \u2014 it signals that AI systems are entering a phase where they can autonomously discover non-obvious failure modes in complex systems. The direct implication for you: the same reasoning pattern (agent explores a system, identifies structural weaknesses, surfaces findings) applies to operational fragility in your own stack. An operator who learns to direct this kind of adversarial probing at his own workflows \u2014 'where are the failure modes no one has thought to look for?' \u2014 builds more robust systems faster than anyone running purely constructive builds.", "first_step": "In your next Claude Code session, after shipping a feature, run a dedicated adversarial pass: prompt Claude to act as an attacker or failure investigator and enumerate every way the system could break, be abused, or produce silent errors. Treat this as standard post-build protocol.", "time_investment": "30 minutes to establish the protocol, then 10-15 minutes per build as a habit", "days_on_leaderboard": 2}];

let activeLayer = 0;
let activeTier = 'all';
let searchQuery = '';

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

// Render leaderboard
function renderLeaderboard() {
  const el = document.getElementById('leaderboard-list');
  if (!leaderboardEntries.length) {
    el.innerHTML = '<div class="empty">No leaderboard yet.</div>';
    return;
  }
  const catColors = {
    NEW_CAPABILITY:'#2563eb', SKILL_GAP:'#7c3aed', BLOCKED_PROJECT:'#dc2626',
    STRATEGIC_MOVE:'#0d9488', PARADIGM_SHIFT:'#ea580c', APPLIED_PATTERN:'#ca8a04'
  };
  el.innerHTML = leaderboardEntries.map(e => `
    <div class="lb-entry">
      <div class="lb-rank">${e.rank}</div>
      <div>
        <div class="lb-title">${esc(e.title)}
          <span class="cat-badge" style="background:${catColors[e.category]||'#6b7280'};margin-left:6px;">
            ${e.category}</span>
        </div>
        <div class="lb-rationale">${esc(e.rationale||'')}</div>
        <div class="lb-meta">
          First step: ${esc(e.first_step||'')} · Time: ${esc(e.time_investment||'')}
          · On board: ${e.days_on_leaderboard||0}d
        </div>
      </div>
    </div>
  `).join('');
}

// Render briefings
function renderBriefings() {
  const el = document.getElementById('briefings-list');
  let allItems = [];
  briefings.forEach(b => {
    (b.items||[]).forEach(item => {
      allItems.push({...item, date: b.date});
    });
  });

  // Apply filters
  if (activeLayer > 0) allItems = allItems.filter(i => i.layer === activeLayer);
  if (activeTier !== 'all') allItems = allItems.filter(i => i.tier === activeTier);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    allItems = allItems.filter(i =>
      (i.title||'').toLowerCase().includes(q) ||
      (i.what_it_is||'').toLowerCase().includes(q) ||
      (i.why_it_matters||'').toLowerCase().includes(q) ||
      (i.summary||'').toLowerCase().includes(q)
    );
  }

  if (!allItems.length) {
    el.innerHTML = '<div class="empty">No items match your filters.</div>';
    return;
  }

  el.innerHTML = allItems.map(item => {
    const badgeClass = item.tier==='GAME_CHANGER'?'badge-gc':item.tier==='WORTH_YOUR_TIME'?'badge-wyt':'badge-noted';
    const layerName = {1:'Anthropic',2:'Practitioner',3:'Industry'}[item.layer]||'';
    let expandable = '';
    if (item.expandable_implement) {
      expandable += `<details><summary>Let me walk you through this</summary>
        <div class="expand-content"><pre>${esc(item.expandable_implement)}</pre></div></details>`;
    }
    if (item.expandable_learn) {
      expandable += `<details><summary>Here's what you need to know</summary>
        <div class="expand-content"><p>${esc(item.expandable_learn)}</p></div></details>`;
    }
    return `<div class="card">
      <div class="card-date">${item.date} · ${esc(item.source_name||'')} · ${layerName}</div>
      <span class="badge ${badgeClass}">${item.tier}</span>
      <h3 style="margin:6px 0 4px;font-size:15px;">
        <a href="${esc(item.url||'')}" style="color:#0f172a;text-decoration:none;" target="_blank">
          ${esc(item.title||'')}</a></h3>
      <p style="font-size:13px;color:#475569;margin-bottom:4px;">${esc(item.what_it_is||item.summary||'')}</p>
      <p style="font-size:14px;color:#334155;line-height:1.6;">${esc(item.why_it_matters||'')}</p>
      ${expandable}
    </div>`;
  }).join('');
}

// Backlog localStorage helpers
const BACKLOG_PREFIX = 'backlog_completed_';
function isBacklogCompleted(id) { return localStorage.getItem(BACKLOG_PREFIX + id) === '1'; }
function setBacklogCompleted(id, done) {
  if (done) localStorage.setItem(BACKLOG_PREFIX + id, '1');
  else localStorage.removeItem(BACKLOG_PREFIX + id);
}
function pruneBacklogStorage(validIds) {
  const idSet = new Set(validIds);
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const key = localStorage.key(i);
    if (key && key.startsWith(BACKLOG_PREFIX)) {
      const id = key.slice(BACKLOG_PREFIX.length);
      if (!idSet.has(id)) localStorage.removeItem(key);
    }
  }
}
function toggleBacklogItem(id) {
  setBacklogCompleted(id, !isBacklogCompleted(id));
  renderBacklog();
}
function clearCompleted() {
  const pending = backlogItems.filter(i => i.status === 'pending');
  pending.forEach(item => { if (isBacklogCompleted(item.id)) setBacklogCompleted(item.id, false); });
  renderBacklog();
}

// Render backlog
function renderBacklog() {
  const el = document.getElementById('backlog-list');
  const completedEl = document.getElementById('backlog-completed-section');
  const counterEl = document.getElementById('backlog-counter');
  const clearBtn = document.getElementById('clear-completed-btn');
  const pending = backlogItems.filter(i => i.status === 'pending')
    .sort((a,b) => (a.date_added||'').localeCompare(b.date_added||''));

  // Prune orphaned localStorage keys for items no longer in the backlog
  pruneBacklogStorage(pending.map(i => i.id));

  if (!pending.length) {
    el.innerHTML = '<div class="empty">No pending items. You\'re caught up!</div>';
    completedEl.innerHTML = '';
    counterEl.textContent = '';
    clearBtn.style.display = 'none';
    return;
  }

  const uncompleted = pending.filter(i => !isBacklogCompleted(i.id));
  const completed = pending.filter(i => isBacklogCompleted(i.id));

  // Update counter
  counterEl.textContent = completed.length > 0
    ? `${completed.length} of ${pending.length} items completed`
    : `${pending.length} pending items`;
  clearBtn.style.display = completed.length > 0 ? 'inline-block' : 'none';

  function renderItem(item) {
    const badgeClass = item.tier==='GAME_CHANGER'?'badge-gc':'badge-wyt';
    const done = isBacklogCompleted(item.id);
    const cls = done ? 'backlog-item completed' : 'backlog-item';
    return `<div class="${cls}">
      <label>
        <input type="checkbox" ${done?'checked':''}
               onchange="toggleBacklogItem('${item.id}')" />
        <span class="badge ${badgeClass}">${item.tier}</span>
        <strong>${esc(item.title||'')}</strong>
        <span class="backlog-age">${item.days_pending||0}d pending · ${item.id}</span>
      </label>
    </div>`;
  }

  el.innerHTML = uncompleted.map(renderItem).join('');

  if (completed.length) {
    completedEl.innerHTML = '<p style="margin:16px 0 8px;font-size:12px;font-weight:600;'
      + 'color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;">Completed</p>'
      + completed.map(renderItem).join('');
  } else {
    completedEl.innerHTML = '';
  }
}

// Render trend chart
function renderTrend() {
  const last30 = briefings.slice(0, 30).reverse();
  const labels = last30.map(b => b.date);
  const gcData = last30.map(b => (b.items||[]).filter(i => i.tier==='GAME_CHANGER').length);
  const wytData = last30.map(b => (b.items||[]).filter(i => i.tier==='WORTH_YOUR_TIME').length);
  const notedData = last30.map(b => (b.items||[]).filter(i => i.tier==='NOTED').length);

  new Chart(document.getElementById('trendChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Game Changer', data:gcData, backgroundColor:'#ea580c' },
        { label:'Worth Your Time', data:wytData, backgroundColor:'#2563eb' },
        { label:'Noted', data:notedData, backgroundColor:'#cbd5e1' },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position:'top' } },
      scales: {
        x: { stacked:true },
        y: { stacked:true, beginAtZero:true, ticks:{ stepSize:1 } }
      }
    }
  });
}

// Filters
function filterLayer(layer, btn) {
  activeLayer = layer;
  btn.parentElement.querySelectorAll('.filter-btn').forEach((b,i) => {
    if (i < 4) b.classList.toggle('active', b === btn);
  });
  renderBriefings();
}
function filterTier(tier, btn) {
  activeTier = tier;
  btn.parentElement.querySelectorAll('.filter-btn').forEach((b,i) => {
    if (i >= 5) b.classList.toggle('active', b === btn);
  });
  renderBriefings();
}
function searchItems(q) { searchQuery = q; renderBriefings(); }

// Escape HTML
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Init
renderLeaderboard();
renderBriefings();
renderBacklog();
renderTrend();
</script>
