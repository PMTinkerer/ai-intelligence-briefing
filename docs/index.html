<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Intelligence Briefing — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background:#f1f5f9; color:#1e293b; }
  .container { max-width:900px; margin:0 auto; padding:24px 16px; }
  h1 { font-size:24px; font-weight:700; color:#0f172a; }
  .subtitle { font-size:13px; color:#94a3b8; margin-top:4px; }

  /* Tabs */
  .tabs { display:flex; gap:0; margin:24px 0 16px; border-bottom:2px solid #e2e8f0; }
  .tab { padding:10px 20px; cursor:pointer; font-size:14px; font-weight:600;
          color:#64748b; border-bottom:2px solid transparent; margin-bottom:-2px;
          transition: all 0.2s; }
  .tab:hover { color:#0f172a; }
  .tab.active { color:#0f172a; border-bottom-color:#0f172a; }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* Filters */
  .filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-btn { padding:6px 14px; border-radius:6px; border:1px solid #e2e8f0;
                 background:#fff; font-size:12px; cursor:pointer; font-weight:500; }
  .filter-btn.active { background:#0f172a; color:#fff; border-color:#0f172a; }
  .search-box { padding:8px 14px; border:1px solid #e2e8f0; border-radius:6px;
                 font-size:13px; width:100%; max-width:300px; }

  /* Cards */
  .card { background:#fff; border-radius:8px; padding:16px 20px; margin-bottom:12px;
           box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid #e2e8f0; }
  .card-date { font-size:12px; color:#94a3b8; }

  /* Tier badges */
  .badge { display:inline-block; font-size:10px; padding:3px 8px; border-radius:3px;
            font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#fff; }
  .badge-gc { background:#ea580c; }
  .badge-wyt { background:#2563eb; }
  .badge-noted { background:#6b7280; }

  /* Category badges */
  .cat-badge { display:inline-block; font-size:10px; padding:2px 6px; border-radius:3px;
                font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:#fff; }

  /* Leaderboard */
  .lb-entry { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid #f1f5f9; }
  .lb-rank { font-size:22px; font-weight:700; color:#0f172a; min-width:32px; }
  .lb-title { font-size:15px; font-weight:600; color:#0f172a; }
  .lb-rationale { font-size:13px; color:#475569; margin-top:4px; line-height:1.5; }
  .lb-meta { font-size:12px; color:#94a3b8; margin-top:4px; }

  /* Expandable */
  details { margin-top:8px; }
  details summary { cursor:pointer; font-size:13px; font-weight:600; color:#2563eb; }
  details .expand-content { margin-top:8px; padding:10px 14px; background:#f8fafc;
                             border-radius:4px; border-left:3px solid #e2e8f0; }
  pre { white-space:pre-wrap; font-size:13px; font-family:monospace; }

  /* Backlog */
  .backlog-item { padding:10px 0; border-bottom:1px solid #f1f5f9; }
  .backlog-age { font-size:12px; color:#94a3b8; }

  /* Chart */
  .chart-container { background:#fff; border-radius:8px; padding:16px;
                      box-shadow:0 1px 3px rgba(0,0,0,.06); border:1px solid #e2e8f0;
                      margin-bottom:16px; }

  .backlog-item label { display:flex; align-items:center; gap:10px; cursor:pointer; }
  .backlog-item input[type="checkbox"] { width:18px; height:18px; cursor:pointer;
    accent-color:#0f172a; flex-shrink:0; }
  .backlog-item.completed { opacity:0.5; }
  .backlog-item.completed strong { text-decoration:line-through; }

  .empty { text-align:center; padding:40px; color:#94a3b8; }
</style>
</head>
<body>
<div class="container">
  <h1>AI Intelligence Briefing</h1>
  <p class="subtitle">Last updated: 2026-04-09 10:12 UTC</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('leaderboard')">Leaderboard</div>
    <div class="tab" onclick="switchTab('briefings')">Briefings</div>
    <div class="tab" onclick="switchTab('backlog')">Backlog</div>
    <div class="tab" onclick="switchTab('trend')">Trend</div>
  </div>

  <!-- Leaderboard Tab -->
  <div id="tab-leaderboard" class="tab-content active">
    <div id="leaderboard-list"></div>
  </div>

  <!-- Briefings Tab -->
  <div id="tab-briefings" class="tab-content">
    <div class="filters">
      <button class="filter-btn active" onclick="filterLayer(0, this)">All</button>
      <button class="filter-btn" onclick="filterLayer(1, this)">Anthropic</button>
      <button class="filter-btn" onclick="filterLayer(2, this)">Practitioner</button>
      <button class="filter-btn" onclick="filterLayer(3, this)">Industry</button>
      <span style="width:8px"></span>
      <button class="filter-btn active" onclick="filterTier('all', this)">All Tiers</button>
      <button class="filter-btn" onclick="filterTier('GAME_CHANGER', this)">Game Changer</button>
      <button class="filter-btn" onclick="filterTier('WORTH_YOUR_TIME', this)">Worth Your Time</button>
      <button class="filter-btn" onclick="filterTier('NOTED', this)">Noted</button>
    </div>
    <input type="text" class="search-box" placeholder="Search titles and content..."
           oninput="searchItems(this.value)">
    <div id="briefings-list" style="margin-top:12px;"></div>
  </div>

  <!-- Backlog Tab -->
  <div id="tab-backlog" class="tab-content">
    <div id="backlog-counter" style="margin-bottom:12px;font-size:13px;color:#475569;"></div>
    <div id="backlog-list"></div>
    <div id="backlog-completed-section"></div>
    <div style="margin-top:12px;display:flex;align-items:center;gap:12px;">
      <button id="clear-completed-btn" onclick="clearCompleted()"
              style="display:none;padding:6px 14px;border-radius:6px;border:1px solid #e2e8f0;
                     background:#fff;font-size:12px;cursor:pointer;font-weight:500;">
        Clear completed</button>
      <p style="margin:0;font-size:12px;color:#94a3b8;">
        These toggles save in your browser. To sync back to the repo:
        <code>python src/backlog.py --adopt &lt;id&gt;</code>
      </p>
    </div>
  </div>

  <!-- Trend Tab -->
  <div id="tab-trend" class="tab-content">
    <div class="chart-container">
      <canvas id="trendChart" height="200"></canvas>
    </div>
  </div>
</div>

<script>
const briefings = [{"date": "2026-04-09", "items": [{"title": "v2.1.97", "url": "https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md#2197", "source_name": "Claude Code Changelog", "layer": 1, "published": null, "description": "Added focus view toggle (`Ctrl+O`) in `NO_FLICKER` mode showing prompt, one-line tool summary with edit diffstats, and final response Added `refreshInterval` status line setting to re-run the status line command every N seconds Added `workspace.git_worktree` to the status line JSON input, set when the current directory is inside a linked git worktree Added `\u25cf N running` indicator in `/agents` next to agent types with live subagent instances Added syntax highlighting for Cedar policy files (`.cedar`, `.cedarpolicy`) Fixed `--dangerously-skip-permissions` being silently downgraded to accept-edits mode after approving a write to a protected path Fixed and hardened Bash tool permissions, tightening checks around env-var prefixes and network redirects, and reducing false prompts on common commands Fixed permission rules with names matching JavaScript prototype properties (e.g. `toString`) causing `settings.json` to be silently ignored Fixed managed-settings allow rules remaining active after an admin removed them until process restart Fixed `permissions.additionalDirectories` changes in settings not applying mid-session Fixed removing a directory from `settings.permissions.additionalDirectories` revoking access to the same directory passed via `--add-dir` Fixed MCP HTTP/SSE connections accumulating ~50 MB/hr of unreleased buffers when servers reconnect Fixed MCP OAuth `oauth.authServerMetadataUrl` not being honored on token refresh after restart, fixing ADFS and similar IdPs Fixed 429 retries burning all attempts in ~13 seconds when the server returns a small `Retry-After` \u2014 exponential backoff now applies as a minimum Fixed rate-limit upgrade options disappearing after context compaction Fixed several `/resume` picker issues: `--resume ` opening uneditable, Ctrl+A reload wiping search, empty list swallowing navigation, task-status text replacing conversation summary, and cross-project staleness Fixed file-edit diffs disappearing on `--resume` when the edited file was larger than 10KB Fixed `--resume` cache misses and lost mid-turn input from attachment messages not being saved to the transcript Fixed messages typed while Claude is working not being persisted to the transcript Fixed prompt-type `Stop`/`SubagentStop` hooks failing on long sessions, and hook evaluator API errors displaying \"JSON validation failed\" instead of the actual message Fixed subagents with worktree isolation or `cwd:` override leaking their working directory back to the parent session's Bash tool Fixed compaction writing duplicate multi-MB subagent transcript files on prompt-too-long retries Fixed `claude plugin update` reporting \"already at the latest version\" for git-based marketplace plugins when the remote had newer commits Fixed slash command picker breaking when a plugin's frontmatter `name` is a YAML boolean keyword Fixed copying wrapped URLs in `NO_FLICKER` mode inserting spaces at line breaks Fixed scroll rendering artifacts in `NO_FLICKER` mode when running inside zellij Fixed a crash in `NO_FLICKER` mode when hovering over MCP tool results Fixed a `NO_FLICKER` mode memory leak where API retries left stale streaming state Fixed slow mouse-wheel scrolling in `NO_FLICKER` mode on Windows Terminal Fixed custom status line not displaying in `NO_FLICKER` mode on terminals shorter than 24 rows Fixed Shift+Enter and Alt/Cmd+arrow shortcuts not working in Warp with `NO_FLICKER` mode Fixed Korean/Japanese/Unicode text becoming garbled when copied in no-flicker mode on Windows Fixed Bedrock SigV4 authentication failing when `AWS_BEARER_TOKEN_BEDROCK` or `ANTHROPIC_BEDROCK_BASE_URL` are set to empty strings (as GitHub Actions does for unset inputs) Improved Accept Edits mode to auto-approve filesystem commands prefixed with safe env vars or process wrappers (e.g. `LANG=C rm foo`, `timeout 5 mkdir out`) Improved auto mode and bypass-permissions mode to auto-approve sandbox network access prompts Improved sandbox: `sandbox.network.allowMachLookup` now takes effect on macOS Improved image handling: pasted and attached images are now compressed to the same token budget as images read via the Read tool Improved slash command and `@`-mention completion to trigger after CJK sentence punctuation, so Japanese/Chinese input no longer requires a space before `/` or `@` Improved Bridge sessions to show the local git repo, branch, and working directory on the claude.ai session card Improved footer layout: indicators (Focus, notifications) now stay on the mode-indicator row instead of wrapping below Improved context-low warning to show as a transient footer notification instead of a persistent row Improved markdown blockquotes to show a continuous left bar across wrapped lines Improved session transcript size by skipping empty hook entries and capping stored pre-edit file copies Improved transcript accuracy: per-block entries now carry the final token usage instead of the streaming placeholder Improved Bash tool OTEL tracing: subprocesses now inherit a W3C `TRACEPARENT` env var when tracing is enabled Updated `/claude-api` skill to cover Managed Agents alongside the Claude API", "id": "8f7df68a4199", "content": "Added focus view toggle (`Ctrl+O`) in `NO_FLICKER` mode showing prompt, one-line tool summary with edit diffstats, and final response Added `refreshInterval` status line setting to re-run the status line command every N seconds Added `workspace.git_worktree` to the status line JSON input, set when the current directory is inside a linked git worktree Added `\u25cf N running` indicator in `/agents` next to agent types with live subagent instances Added syntax highlighting for Cedar policy files (`.cedar`, `.cedarpolicy`) Fixed `--dangerously-skip-permissions` being silently downgraded to accept-edits mode after approving a write to a protected path Fixed and hardened Bash tool permissions, tightening checks around env-var prefixes and network redirects, and reducing false prompts on common commands Fixed permission rules with names matching JavaScript prototype properties (e.g. `toString`) causing `settings.json` to be silently ignored Fixed managed-settings allow rules remaining active after an admin removed them until process restart Fixed `permissions.additionalDirectories` changes in settings not applying mid-session Fixed removing a directory from `settings.permissions.additionalDirectories` revoking access to the same directory passed via `--add-dir` Fixed MCP HTTP/SSE connections accumulating ~50 MB/hr of unreleased buffers when servers reconnect Fixed MCP OAuth `oauth.authServerMetadataUrl` not being honored on token refresh after restart, fixing ADFS and similar IdPs Fixed 429 retries burning all attempts in ~13 seconds when the server returns a small `Retry-After` \u2014 exponential backoff now applies as a minimum Fixed rate-limit upgrade options disappearing after context compaction Fixed several `/resume` picker issues: `--resume ` opening uneditable, Ctrl+A reload wiping search, empty list swallowing navigation, task-status text replacing conversation summary, and cross-project staleness Fixed file-edit diffs disappearing on `--resume` when the edited file was la", "tier": "NOTED", "what_it_is": "Claude Code v2.1.97 is a maintenance and polish release with a mix of UI additions and bug fixes. The headline additions are a focus view toggle (Ctrl+O) that strips away clutter to show just the prompt and tool summary, a configurable status-line refresh interval, and a live subagent count in the /agents panel. The bulk of the release is fixing bugs \u2014 some significant ones around permissions, MCP memory leaks, and rate-limit retry logic.", "why_it_matters": "Two fixes here actually matter for you specifically. First, the MCP HTTP/SSE memory leak fix (50 MB/hr of unreleased buffers) is worth knowing about as you move toward MCP integrations \u2014 it means the version you pick up when you start experimenting is more stable than what shipped a week ago. Second, the exponential backoff fix for 429 rate-limit retries is quietly meaningful: if you're running longer agent loops or overnight automation, the old behavior could silently exhaust all retry attempts in 13 seconds and fail; now it backs off gracefully. The focus view toggle (Ctrl+O) is a minor quality-of-life win worth trying \u2014 cleaner view during active builds.", "expandable_implement": "The focus view is the one thing worth trying immediately. Next time you're in an active Claude Code session in NO_FLICKER mode, hit Ctrl+O. It collapses the interface down to: your prompt, a one-line summary of what tool is running plus any edit diffstats (lines added/removed), and the final response. If you find the default view noisy during long builds, this gives you a clean at-a-glance mode without losing context.", "expandable_learn": null, "unblocks_project": null}, {"title": "Meta's new model is Muse Spark, and meta.ai chat has some interesting tools", "url": "https://simonwillison.net/2026/Apr/8/muse-spark/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-04-08T23:07:44+00:00", "description": "Meta announced Muse Spark today, their first model release since Llama 4 almost exactly a year ago . It's hosted, not open weights, and the API is currently \"a private API preview to select users\", but you can try it out today on meta.ai (Facebook or Instagram login required). Meta's self-reported benchmarks show it competitive with Opus 4.6, Gemini 3.1 Pro, and GPT 5.4 on selected benchmarks, though notably behind on Terminal-Bench 2.0. Meta themselves say they \"continue to invest in areas with current performance gaps, such as long-horizon agentic systems and coding workflows\". The model is exposed as two different modes on meta.ai - \"Instant\" and \"Thinking\". Meta promise a \"Contemplating\" mode in the future which they say will offer much longer reasoning time and should behave more like Gemini Deep Think or GPT-5.4 Pro. A couple of pelicans I prefer to run my pelican test via API to avoid being influenced by any invisible system prompts, but since that's not an option I ran it against the chat UI directly. Here's the pelican I got for \"Instant\": And this one for \"Thinking\": Both SVGs were rendered inline by the Meta AI interface. Interestingly, the Instant model output an SVG directly (with code comments) whereas the Thinking model wrapped it in a thin HTML shell with some unused Playables SDK v1.0.0 JavaScript libraries. Which got me curious... Poking around with tools Clearly Meta's chat harness has some tools wired up to it - at the very least it can render SVG and HTML as embedded frames, Claude Artifacts style. But what else can it do? I asked it: what tools do you have access to? And then: I want the exact tool names, parameter names and tool descriptions, in the original format It spat out detailed descriptions of 16 different tools. You can see the full list I got back here - credit to Meta for not telling their bot to hide these, since it's far less frustrating if I can get them out without having to mess around with jailbreaks. Here are highlights derived from that response: Browse and search . browser.search can run a web search through an undisclosed search engine, browser.open can load the full page from one of those search results and browser.find can run pattern matches against the returned page content. Meta content search . meta_1p.content_search can run \"Semantic search across Instagram, Threads, and Facebook posts\" - but only for posts the user has access to view which were created since 2025-01-01. This tool has some powerful looking parameters, including author_ids , key_celebrities , commented_by_user_ids , and liked_by_user_ids . \"Catalog search\" - meta_1p.meta_catalog_search can \"Search for products in Meta's product catalog\", presumably for the \"Shopping\" option in the Meta AI model selector. Image generation . media.image_gen generates images from prompts, and \"returns a CDN URL and saves the image to the sandbox\". It has modes \"artistic\" and \"realistic\" and can return \"square\", \"vertical\" or \"landscape\" images. container.python_execution - yes! It's Code Interpreter , my favourite feature of both ChatGPT and Claude. Execute Python code in a remote sandbox environment. Python 3.9 with pandas, numpy, matplotlib, plotly, scikit-learn, PyMuPDF, Pillow, OpenCV, etc. Files persist at /mnt/data/ . Python 3.9 is EOL these days but the library collection looks useful. I prompted \"use python code to confirm sqlite version and python version\" and got back Python 3.9.25 and SQLite 3.34.1 (from January 2021 ). container.create_web_artifact - we saw this earlier with the HTML wrapper around the pelican: Meta AI can create HTML+JavaScript files in its container which can then be served up as secure sandboxed iframe interactives. \"Set kind to html for websites/apps or svg for vector graphics.\" container.download_meta_1p_media is interesting: \"Download media from Meta 1P sources into the sandbox. Use post_id for Instagram/Facebook/Threads posts, or catalog_search_citation_id for catalog product images\". So it looks like you can pull in content from other parts of Meta and then do fun Code Interpreter things to it in the sandbox. container.file_search - \"Search uploaded files in this conversation and return relevant excerpts\" - I guess for digging through PDFs and similar? Tools for editing files in the container - container.view , container.insert (with new_str and insert_line ), container.str_replace . These look similar to Claude's text editor tool commands - these are becoming a common pattern across any file-equipped agent harness. container.visual_grounding - see below, this one is fun . subagents.spawn_agent - the sub-agent as a tool pattern. \"Spawn an independent sub-agent for research, analysis, or delegation. It returns its final text response.\" third_party.link_third_party_account - \"Initiate account linking for a third-party service\", currently Google Calendar, Outlook Calendar, Gmail, or Outlook. Image analysis in the container Let's talk about that container.visual_grounding one. Here's the description in full: Description: Visual grounding tool that analyzes the image, identifies and labels objects, locates regions, or counts objects. Parameters: object_names (array, required) image_path (string, default \"\") format_type (\"bbox\"|\"point\"|\"count\"|null, default \"bbox\") title (string|null)[string] So it can take an image path, optional object names and return things in format bbox , point or count . Sounds to me like Meta's Segment Anything . I decided to take it for a spin. Prompt : generate a photo of a raccoon sitting on a trash can wearing trash as a hat Response : Here you go \u2014 king of the alley, in full regalia: Coffee cup crown, banana peel brim, newspaper feather. Peak raccoon fashion. Want me to make a wilder version \u2014 maybe night-vision, or wearing sunglasses too? My guess is that image generation in Meta AI is powered by their Emu model , or an updated version of it. This is the same pattern as ChatGPT and Gemini image generation, where images are generated by a tool call (here that's media.image_gen ). The image_gen tool description said that it \"saves the image to the sandbox\", so my guess was that I'd then be able to run Python code against it. I tried: use python OpenCV to analyze that image and find out neat things about it Annoyingly it did not show me the code it ran, but it did create this image: Pretty neat! We can both generate images and then use them with Python tools. Next, the visual_grounding tool. Knowing the names of the tools makes it easy to refer to them in prompts: Now try the container.visual_grounding tool The response ( full response here ): Done \u2014 visual_grounding pinpointed every piece of the outfit with pixel-level precision: [...] Want me to run it in bbox mode next to draw boxes around the fur texture, or count mode to see how many individual whiskers it can detect? Once again, Meta AI wrapped the results from the tool in a custom HTML visualization. That's clearly point mode, but how about the others? I prompted: yes draw bounding boxes, can it do masks too? Response: Yes \u2014 bounding boxes work great. Masks? Not directly in visual_grounding ; it only returns three formats: point, bbox, and count. No pixel-level segmentation masks. Here's the bbox output: What you\u2019re seeing: raccoon : big box from (270,240) to (892,845) \u2014 covers 62% of the width, basically the whole animal coffee cup : (424,115)-(610,273) \u2014 sits highest, 158px tall in the 0-1000 space banana peel : (472,215)-(667,291) \u2014 overlaps the cup's base, confirming it's draped over the side newspaper : (305,223)-(548,315) \u2014 left ear coverage trash can lid : (107,800)-(1000,998) \u2014 spans almost the full image width at the bottom face : (305,283)-(750,537) \u2014 tight crop around the mask eyes : both ~40\u00d737 pixel boxes, perfectly level at y=379 Notice how the boxes nest: face is inside raccoon, eyes inside face, hat pieces overlap each other but stay above the face box. The tool is doing real object localization, not just guessing centers. About masks: since visual_grounding doesn't output them, I can fake them with OpenCV in the container. Two quick options: GrabCut \u2014 I give it the raccoon bbox, it iteratively segments fur from background and returns a binary mask SAM-style color threshold \u2014 use the bbox plus k-means to isolate the coffee cup or banana peel Want me to generate an actual alpha mask for the raccoon (cut it out from the alley), or for the trash hat pieces separately? Takes about 10 seconds and I can give you a transparent PNG. Here's the HTML for that bbox visualization . Finally I had it dump out the raw JSON for point mode, bbox mode and count mode. You can see that all here . The count mode is particularly interesting - here's that in full: [\n  { \"object_name\" : \" raccoon whisker \" , \"points\" : [\n      { \"x\" : 403 , \"y\" : 445 },\n      { \"x\" : 397 , \"y\" : 458 },\n      { \"x\" : 392 , \"y\" : 472 },\n      { \"x\" : 391 , \"y\" : 485 },\n      { \"x\" : 398 , \"y\" : 497 },\n      { \"x\" : 415 , \"y\" : 512 },\n      { \"x\" : 618 , \"y\" : 446 },\n      { \"x\" : 622 , \"y\" : 461 },\n      { \"x\" : 625 , \"y\" : 475 },\n      { \"x\" : 628 , \"y\" : 488 },\n      { \"x\" : 635 , \"y\" : 501 },\n      { \"x\" : 651 , \"y\" : 518 }\n    ], \"count\" : 12 },\n  { \"object_name\" : \" raccoon paw claw \" , \"points\" : [\n      { \"x\" : 406 , \"y\" : 845 },\n      { \"x\" : 424 , \"y\" : 847 },\n      { \"x\" : 441 , \"y\" : 842 },\n      { \"x\" : 473 , \"y\" : 833 },\n      { \"x\" : 596 , \"y\" : 830 },\n      { \"x\" : 635 , \"y\" : 844 },\n      { \"x\" : 660 , \"y\" : 843 },\n      { \"x\" : 679 , \"y\" : 838 }\n    ], \"count\" : 8 },\n  { \"object_name\" : \" trash item on head \" , \"points\" : [\n      { \"x\" : 514 , \"y\" : 191 },\n      { \"x\" : 568 , \"y\" : 263 },\n      { \"x\" : 392 , \"y\" : 274 }\n    ], \"count\" : 3 },\n  { \"object_name\" : \" eye \" , \"points\" : [\n      { \"x\" : 462 , \"y\" : 395 },\n      { \"x\" : 582 , \"y\" : 398 }\n    ], \"count\" : 2 },\n  { \"object_name\" : \" ear \" , \"points\" : [\n      { \"x\" : 359 , \"y\" : 313 },\n      { \"x\" : 680 , \"y\" : 294 }\n    ], \"count\" : 2 }\n] So Meta AI has the ability to count a raccoon's whiskers baked into the default set of tools. Which means... it can count pelicans too! Here's that overlay exported as HTML . Update : Meta's Jack Wu confirms that these tools are part of the new harness they launched alongside the new model. Maybe open weights in the future? On Twitter Alexandr Wang said : this is step one. bigger models are already in development with infrastructure scaling to match. private api preview open to select partners today, with plans to open-source future versions. I really hope they do go back to open-sourcing their models. Llama 3.1/3.2/3.3 were excellent laptop-scale model families, and the introductory blog post for Muse Spark had this to say about efficiency: [...] we can reach the same capabilities with over an order of magnitude less compute than our previous model, Llama 4 Maverick. This improvement also makes Muse Spark significantly more efficient than the leading base models available for comparison. So are Meta back in the frontier model game? Artificial Analysis think so - they scored Meta Spark at 52, \"behind only Gemini 3.1 Pro, GPT-5.4, and Claude Opus 4.6\". Last year's Llama 4 Maverick and Scout scored 18 and 13 respectively. I'm waiting for API access - while the tool collection on meta.ai is quite strong the real test of a model like this is still what we can build on top of it. Tags: facebook , ai , generative-ai , llms , code-interpreter , llm-tool-use , meta , pelican-riding-a-bicycle , llm-reasoning , llm-release", "id": "e5c84393ed08", "content": "Meta announced Muse Spark today, their first model release since Llama 4 almost exactly a year ago . It's hosted, not open weights, and the API is currently \"a private API preview to select users\", but you can try it out today on meta.ai (Facebook or Instagram login required). Meta's self-reported benchmarks show it competitive with Opus 4.6, Gemini 3.1 Pro, and GPT 5.4 on selected benchmarks, though notably behind on Terminal-Bench 2.0. Meta themselves say they \"continue to invest in areas with current performance gaps, such as long-horizon agentic systems and coding workflows\". The model is exposed as two different modes on meta.ai - \"Instant\" and \"Thinking\". Meta promise a \"Contemplating\" mode in the future which they say will offer much longer reasoning time and should behave more like Gemini Deep Think or GPT-5.4 Pro. A couple of pelicans I prefer to run my pelican test via API to avoid being influenced by any invisible system prompts, but since that's not an option I ran it against the chat UI directly. Here's the pelican I got for \"Instant\": And this one for \"Thinking\": Both SVGs were rendered inline by the Meta AI interface. Interestingly, the Instant model output an SVG directly (with code comments) whereas the Thinking model wrapped it in a thin HTML shell with some unused Playables SDK v1.0.0 JavaScript libraries. Which got me curious... Poking around with tools Clearly Meta's chat harness has some tools wired up to it - at the very least it can render SVG and HTML as embedded frames, Claude Artifacts style. But what else can it do? I asked it: what tools do you have access to? And then: I want the exact tool names, parameter names and tool descriptions, in the original format It spat out detailed descriptions of 16 different tools. You can see the full list I got back here - credit to Meta for not telling their bot to hide these, since it's far less frustrating if I can get them out without having to mess around with jailbreaks. Here are highlights deriv", "tier": "NOTED", "what_it_is": "Simon Willison explores Meta's new Muse Spark model \u2014 a closed, hosted model (not open weights) that's currently invitation-only on the API but accessible via meta.ai. He digs into the 16 tools wired into Meta's chat interface, including SVG/HTML rendering similar to Claude Artifacts.", "why_it_matters": "You're already deep in the Anthropic ecosystem, and Muse Spark's API isn't publicly available yet. Meta explicitly acknowledges gaps in 'long-horizon agentic systems and coding workflows' \u2014 exactly the capabilities that matter most for your STR automation work. Nothing here changes your stack today.", "expandable_implement": null, "expandable_learn": null, "unblocks_project": null}, {"title": "Poke makes using AI agents as easy as sending a text", "url": "https://techcrunch.com/2026/04/08/poke-makes-ai-agents-as-easy-as-sending-a-text/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T21:05:13+00:00", "description": "Poke brings AI agents to everyday users via text message by handling tasks and automations without complex setup, apps, or technical know-how.", "id": "d58abd0d4928", "content": "Poke brings AI agents to everyday users via text message by handling tasks and automations without complex setup, apps, or technical know-how.", "tier": "WORTH_YOUR_TIME", "summary": "Poke lets anyone trigger AI agents just by sending a text message \u2014 no apps, no setup, no technical knowledge needed. The significance here isn't the consumer angle, it's the distribution model: SMS as an interface layer for agents dramatically lowers the barrier for deploying automation to non-technical end users or clients.", "rank": 5}, {"title": "AWS boss explains why investing billions in both Anthropic and OpenAI is an OK conflict", "url": "https://techcrunch.com/2026/04/08/aws-boss-explains-why-investing-billions-in-both-anthropic-and-openai-is-an-ok-conflict/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T20:09:14+00:00", "description": "AWS has an ingrained culture of handling competition, he explained, because the cloud giant also competes with its partners.", "id": "7452a177d911", "content": "AWS has an ingrained culture of handling competition, he explained, because the cloud giant also competes with its partners.", "tier": "NOTED", "summary": "AWS is defending its simultaneous multi-billion dollar investments in both Anthropic and OpenAI by pointing to its existing culture of competing with cloud partners. Strategically, it confirms AWS is betting on being the neutral infrastructure layer regardless of which model wins \u2014 useful to know if you're deciding where to build.", "rank": 10}, {"title": "Tubi is the first streamer to launch a native app within ChatGPT", "url": "https://techcrunch.com/2026/04/08/tubi-is-the-first-streamer-to-launch-a-native-app-within-chatgpt/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T18:23:06+00:00", "description": "Tubi becomes the first streaming service to offer an app integration within ChatGPT, the AI chatbot that millions of users turn to for answers.", "id": "9f007a62d848", "content": "Tubi becomes the first streaming service to offer an app integration within ChatGPT, the AI chatbot that millions of users turn to for answers.", "tier": "NOTED", "summary": "Tubi became the first streaming service with a native app inside ChatGPT. More interesting as a pattern than the specific product \u2014 it's the first example of a media company embedding inside ChatGPT as a distribution channel rather than just competing with it. Watch for more of this.", "rank": 7}, {"title": "Astropad\u2019s Workbench reimagines remote desktop for AI agents, not IT support", "url": "https://techcrunch.com/2026/04/08/astropads-workbench-reimagines-remote-desktop-for-ai-agents-not-it-support/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T16:01:09+00:00", "description": "Astropad\u2019s Workbench lets users remotely monitor and control AI agents on Mac Minis from iPhone or iPad, with low-latency streaming and mobile access.", "id": "a54a610d3c61", "content": "Astropad\u2019s Workbench lets users remotely monitor and control AI agents on Mac Minis from iPhone or iPad, with low-latency streaming and mobile access.", "tier": "WORTH_YOUR_TIME", "summary": "Astropad's Workbench lets you remotely monitor and control AI agents running on Mac Minis from your iPhone or iPad with low latency. This is infrastructure for small operators running local AI agent workflows \u2014 you can deploy a headless Mac Mini as an agent workstation and supervise it from anywhere. Practical for anyone building always-on automation without cloud costs.", "rank": 4}, {"title": "Databricks co-founder wins prestigious ACM award, says \u2018AGI is here already\u2019", "url": "https://techcrunch.com/2026/04/08/databricks-matei-zaharia-wins-acm-computing-prize-agi/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T15:00:00+00:00", "description": "Matei Zaharia has won the top honor from the Association for Computing Machinery. Now he's working on AI for research and says AGI is simply misunderstood.", "id": "cb1c20bdeec2", "content": "Matei Zaharia has won the top honor from the Association for Computing Machinery. Now he's working on AI for research and says AGI is simply misunderstood.", "tier": "WORTH_YOUR_TIME", "summary": "Databricks co-founder Matei Zaharia won the ACM's top computing prize and made a pointed claim: AGI is already here, just misunderstood. Coming from someone who built core data infrastructure used by most serious AI teams, this isn't hype \u2014 it's a signal about how practitioners at the frontier are framing the current capability level. Worth calibrating your own mental model accordingly.", "rank": 6}, {"title": "Atlassian launches visual\u00a0AI tools\u00a0and third-party agents\u00a0in Confluence", "url": "https://techcrunch.com/2026/04/08/atlassian-confluence-visual-ai-tools-agents/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T13:00:00+00:00", "description": "Confluence users can now create visual assets within the software in addition to new third-party agents working with Lovable, Replit, and Gamma.", "id": "9449b66e74b9", "content": "Confluence users can now create visual assets within the software in addition to new third-party agents working with Lovable, Replit, and Gamma.", "tier": "WORTH_YOUR_TIME", "summary": "Atlassian's Confluence now supports third-party AI agents from Lovable, Replit, and Gamma, plus visual AI asset creation. If your team runs on Confluence, this means AI agents can now act inside your knowledge base and project documentation \u2014 not just read it. Worth watching as a signal that productivity suites are becoming agent orchestration layers.", "rank": 3}, {"title": "Gemini gets notebooks to help you organize projects", "url": "https://www.theverge.com/tech/909031/google-gemini-notebooks-notebooklm", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-09T00:06:12+00:00", "description": "Google's Gemini is getting a feature called \"notebooks\" to help you organize things about certain topics in a single place while using the AI chatbot, the company announced on Wednesday. You can pull in things like files, past conversations, and custom instructions into notebooks that Gemini can then use as context while you're talking with [\u2026]", "id": "f51dc84725df", "content": "Google's Gemini is getting a feature called \"notebooks\" to help you organize things about certain topics in a single place while using the AI chatbot, the company announced on Wednesday. You can pull in things like files, past conversations, and custom instructions into notebooks that Gemini can then use as context while you're talking with [\u2026]", "tier": "WORTH_YOUR_TIME", "summary": "Google Gemini is adding 'notebooks' \u2014 persistent workspaces where you can pin files, past conversations, and custom instructions so the AI always has your full context. Think of it as NotebookLM-style organization baked directly into Gemini. For operators building repeatable AI workflows, persistent context management is a big deal and this closes a real gap.", "rank": 2}, {"title": "Meta is reentering the AI race with a new model called Muse Spark", "url": "https://www.theverge.com/tech/908769/meta-muse-spark-ai-model-launch-rollout", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-08T16:12:54+00:00", "description": "Meta Superintelligence Labs is launching its first model since Mark Zuckerberg spent billions overhauling the company's AI efforts. Called Muse Spark, the model now powers the Meta AI app and the Meta AI website in the US, per the company's announcement. In the coming weeks, Meta says, it will appear in WhatsApp, Instagram, Facebook, Messenger, [\u2026]", "id": "f1ceb5de3757", "content": "Meta Superintelligence Labs is launching its first model since Mark Zuckerberg spent billions overhauling the company's AI efforts. Called Muse Spark, the model now powers the Meta AI app and the Meta AI website in the US, per the company's announcement. In the coming weeks, Meta says, it will appear in WhatsApp, Instagram, Facebook, Messenger, [\u2026]", "tier": "GAME_CHANGER", "summary": "Meta just launched Muse Spark, their first model out of the newly formed Meta Superintelligence Labs \u2014 this is Mark Zuckerberg's big bet after spending billions overhauling Meta's AI division. It's already powering the Meta AI app and rolling out across WhatsApp, Instagram, Facebook, and Messenger in coming weeks. That's billions of users getting exposed to a new frontier model, which changes the competitive landscape significantly.", "rank": 1}, {"title": "The vibes are off at OpenAI", "url": "https://www.theverge.com/ai-artificial-intelligence/908513/the-vibes-are-off-at-openai", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-08T13:47:38+00:00", "description": "OpenAI is in a relatively precarious position. The company is and has been a funding behemoth - just over a week ago, it closed $122 billion in funding at a post-money valuation of $852 billion. It's potentially planning for an IPO later this year. ChatGPT's longtime lead in consumer-facing AI led it to name-brand status [\u2026]", "id": "c7409d03ad52", "content": "OpenAI is in a relatively precarious position. The company is and has been a funding behemoth - just over a week ago, it closed $122 billion in funding at a post-money valuation of $852 billion. It's potentially planning for an IPO later this year. ChatGPT's longtime lead in consumer-facing AI led it to name-brand status [\u2026]", "tier": "NOTED", "summary": "A detailed look at the internal and external tensions at OpenAI \u2014 talent churn, culture drift, and competitive pressure despite the $852B valuation and $122B funding round. Not operationally urgent, but useful context for understanding whether OpenAI remains a reliable foundation to build on long-term.", "rank": 8}, {"title": "Unionized ProPublica staff are on strike over AI, layoffs, and wages", "url": "https://www.theverge.com/news/908401/propublica-union-strike-negotiations-ai-layoffs", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-08T11:53:28+00:00", "description": "Unionized staff at ProPublica, one of the country's leading nonprofit newsrooms, are walking off the job for 24 hours beginning Wednesday and asking the public to honor a digital picket line. The roughly 150 members of the ProPublica Guild are in the midst of negotiating a collective bargaining agreement after unionizing in 2023. The union [\u2026]", "id": "2725b7be2675", "content": "Unionized staff at ProPublica, one of the country's leading nonprofit newsrooms, are walking off the job for 24 hours beginning Wednesday and asking the public to honor a digital picket line. The roughly 150 members of the ProPublica Guild are in the midst of negotiating a collective bargaining agreement after unionizing in 2023. The union [\u2026]", "tier": "NOTED", "summary": "ProPublica's union is striking partly over AI usage policies \u2014 one of the first high-profile cases of organized labor drawing a line on AI in a knowledge work context. This is a preview of workforce negotiations you'll eventually encounter if you're deploying AI automation in any organization with employees.", "rank": 9}], "leaderboard": [{"rank": 1, "title": "Build autonomous optimization loops using scoring functions", "category": "PARADIGM_SHIFT", "rationale": "The autoresearch pattern (define a scoring function, let an agent explore overnight, review improvements) is how Anthropic trained Claude to be exceptional at structured tasks. This same pattern applies to ANY system where quality can be scored: prompt optimization, scraper tuning, route efficiency, pricing models. Mastering this unlocks compound improvements across every future system you build. The Shopify CEO example proves it works on production code, not just ML training.", "first_step": "Take the inspector scheduling scoring function (route efficiency, time windows, priority) and set up a 4-hour overnight loop that generates alternative schedules, scores them, and surfaces the top 3 by morning.", "time_investment": "2-3 sessions to internalize the pattern, then reusable forever", "days_on_leaderboard": 14}, {"rank": 2, "title": "Learn when to slow agents down and demand understanding before proceeding", "category": "PARADIGM_SHIFT", "rationale": "Auto mode is powerful, but cognitive debt is real. The discipline of stopping when you don't understand what the agent built \u2014 even if it works \u2014 is what separates operators who ship sustainably from those who accumulate unmaintainable black boxes. This isn't a Claude Code habit; it's an operator discipline that applies to every automated system you'll ever delegate to.", "first_step": "Next Claude Code session: when the agent finishes a complex multi-file change, stop before testing. Read each changed file and articulate what changed and why. If you can't, don't proceed until you can.", "time_investment": "Immediate practice \u2014 adds 10-15 minutes per complex build, but prevents hours of debugging later", "days_on_leaderboard": 12}, {"rank": 3, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works \u2014 what triggers review vs auto-approval \u2014 teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature; it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 13}, {"rank": 4, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features \u2014 it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice \u2014 every failure is a training session", "days_on_leaderboard": 14}, {"rank": 5, "title": "Anthropic's Mythos cybersecurity model: understand what autonomous vulnerability discovery means for operators", "category": "STRATEGIC_MOVE", "rationale": "Anthropic debuting a model that found security problems in every major OS and browser isn't just a capability milestone \u2014 it signals that AI systems are entering a phase where they can autonomously discover non-obvious failure modes in complex systems. The direct implication for you: the same reasoning pattern (agent explores a system, identifies structural weaknesses, surfaces findings) applies to operational fragility in your own stack. An operator who learns to direct this kind of adversarial probing at his own workflows \u2014 'where are the failure modes no one has thought to look for?' \u2014 builds more robust systems faster than anyone running purely constructive builds.", "first_step": "In your next Claude Code session, after shipping a feature, run a dedicated adversarial pass: prompt Claude to act as an attacker or failure investigator and enumerate every way the system could break, be abused, or produce silent errors. Treat this as standard post-build protocol.", "time_investment": "30 minutes to establish the protocol, then 10-15 minutes per build as a habit", "days_on_leaderboard": 2}], "backlog_summary": {"total_pending": 12, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 0, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 15}, {"title": "Auto mode for Claude Code", "days_pending": 15}, {"title": "Package Managers Need to Cool Down", "days_pending": 15}]}, "dropped_counts": {"layer_1": 0, "layer_2": 1, "layer_3": 5}, "total_fetched": 71}, {"date": "2026-04-08", "items": [{"title": "v2.1.94", "url": "https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md#2194", "source_name": "Claude Code Changelog", "layer": 1, "published": null, "description": "Added support for Amazon Bedrock powered by Mantle, set `CLAUDE_CODE_USE_MANTLE=1` Changed default effort level from medium to high for API-key, Bedrock/Vertex/Foundry, Team, and Enterprise users (control this with `/effort`) Added compact `Slacked #channel` header with a clickable channel link for Slack MCP send-message tool calls Added `keep-coding-instructions` frontmatter field support for plugin output styles Added `hookSpecificOutput.sessionTitle` to `UserPromptSubmit` hooks for setting the session title Plugin skills declared via `\"skills\": [\"./\"]` now use the skill's frontmatter `name` for the invocation name instead of the directory basename, giving a stable name across install methods Fixed agents appearing stuck after a 429 rate-limit response with a long Retry-After header \u2014 the error now surfaces immediately instead of silently waiting Fixed Console login on macOS silently failing with \"Not logged in\" when the login keychain is locked or its password is out of sync \u2014 the error is now surfaced and `claude doctor` diagnoses the fix Fixed plugin skill hooks defined in YAML frontmatter being silently ignored Fixed plugin hooks failing with \"No such file or directory\" when `CLAUDE_PLUGIN_ROOT` was not set Fixed `${CLAUDE_PLUGIN_ROOT}` resolving to the marketplace source directory instead of the installed cache for local-marketplace plugins on startup Fixed scrollback showing the same diff repeated and blank pages in long-running sessions Fixed multiline user prompts in the transcript indenting wrapped lines under the `\u276f` caret instead of under the text Fixed Shift+Space inserting the literal word \"space\" instead of a space character in search inputs Fixed hyperlinks opening two browser tabs when clicked inside tmux running in an xterm.js-based terminal (VS Code, Hyper, Tabby) Fixed an alt-screen rendering bug where content height changes mid-scroll could leave compounding ghost lines Fixed `FORCE_HYPERLINK` environment variable being ignored when set via `settings.json` `env` Fixed native terminal cursor not tracking the selected tab in dialogs, so screen readers and magnifiers can follow tab navigation Fixed Bedrock invocation of Sonnet 3.5 v2 by using the `us.` inference profile ID Fixed SDK/print mode not preserving the partial assistant response in conversation history when interrupted mid-stream Improved `--resume` to resume sessions from other worktrees of the same repo directly instead of printing a `cd` command Fixed CJK and other multibyte text being corrupted with U+FFFD in stream-json input/output when chunk boundaries split a UTF-8 sequence [VSCode] Reduced cold-open subprocess work on starting a session [VSCode] Fixed dropdown menus selecting the wrong item when the mouse was over the list while typing or using arrow keys [VSCode] Added a warning banner when `settings.json` files fail to parse, so users know their permission rules are not being applied", "id": "a7ffb32f8421", "content": "Added support for Amazon Bedrock powered by Mantle, set `CLAUDE_CODE_USE_MANTLE=1` Changed default effort level from medium to high for API-key, Bedrock/Vertex/Foundry, Team, and Enterprise users (control this with `/effort`) Added compact `Slacked #channel` header with a clickable channel link for Slack MCP send-message tool calls Added `keep-coding-instructions` frontmatter field support for plugin output styles Added `hookSpecificOutput.sessionTitle` to `UserPromptSubmit` hooks for setting the session title Plugin skills declared via `\"skills\": [\"./\"]` now use the skill's frontmatter `name` for the invocation name instead of the directory basename, giving a stable name across install methods Fixed agents appearing stuck after a 429 rate-limit response with a long Retry-After header \u2014 the error now surfaces immediately instead of silently waiting Fixed Console login on macOS silently failing with \"Not logged in\" when the login keychain is locked or its password is out of sync \u2014 the error is now surfaced and `claude doctor` diagnoses the fix Fixed plugin skill hooks defined in YAML frontmatter being silently ignored Fixed plugin hooks failing with \"No such file or directory\" when `CLAUDE_PLUGIN_ROOT` was not set Fixed `${CLAUDE_PLUGIN_ROOT}` resolving to the marketplace source directory instead of the installed cache for local-marketplace plugins on startup Fixed scrollback showing the same diff repeated and blank pages in long-running sessions Fixed multiline user prompts in the transcript indenting wrapped lines under the `\u276f` caret instead of under the text Fixed Shift+Space inserting the literal word \"space\" instead of a space character in search inputs Fixed hyperlinks opening two browser tabs when clicked inside tmux running in an xterm.js-based terminal (VS Code, Hyper, Tabby) Fixed an alt-screen rendering bug where content height changes mid-scroll could leave compounding ghost lines Fixed `FORCE_HYPERLINK` environment variable being ignored when set via `se", "tier": "WORTH_YOUR_TIME", "what_it_is": "Claude Code v2.1.94 is a substantial release with one meaningful behavioral change buried among bug fixes: the default effort level for API-key users just got bumped from medium to high. Everything else is polish \u2014 Bedrock infrastructure additions, plugin/skill naming improvements, and a pile of UI fixes for things like duplicate browser tabs and ghost lines in long sessions.", "why_it_matters": "The effort level change is the one that affects you directly and silently. Your production tools \u2014 the STR Daily Briefing, any GitHub Actions workflows hitting the API \u2014 are now running at higher effort by default, which means better output quality but also potentially higher token costs per call. You didn't ask for this change, it just happened. Worth checking your Anthropic usage dashboard after a few days to see if costs ticked up. If they did, you can lock effort explicitly with `/effort medium` in sessions or tune it per-call in your API workflows. The plugin/skill naming fix (stable names across install methods) matters once you start extracting reusable Claude Code Skills from your project patterns \u2014 that's a Stage 4 gap you're building toward.", "expandable_implement": "To check and control effort level explicitly:\n\n1. **In a Claude Code session**: Type `/effort` to see current setting. Type `/effort medium` to dial it back if you want to conserve tokens on lighter tasks. `/effort high` is now the default.\n\n2. **In your API calls** (STR Briefing, GitHub Actions): The effort level is controlled by the `thinking` budget or model parameters depending on how your scripts are structured. Pull up your briefing script and search for where you call `anthropic.messages.create()`. If you're using Haiku, this change may not apply \u2014 Haiku runs its own effort profile. But if you've upgraded any workflow to Sonnet or Opus, keep an eye on it.\n\n3. **To monitor cost impact**: Log into console.anthropic.com \u2192 Usage. Compare this week's token burn to last week's. If it's up 10-20% with no change in volume, the effort bump is the likely cause.\n\nNo action required immediately \u2014 just stay aware and check your usage in 3-5 days.", "expandable_learn": "\"Effort level\" in Claude Code is essentially how hard the model tries before responding \u2014 it controls how much internal reasoning (sometimes called chain-of-thought or extended thinking) the model does before giving you an answer. Higher effort = more thorough reasoning = better output on complex problems, but more tokens consumed and slightly slower responses.\n\nThink of it like asking a contractor to give you a quick verbal estimate versus sitting down and doing a full written scope. Same contractor, same knowledge \u2014 but the second one catches more edge cases and produces a better result, at the cost of more of their time (and yours, and your money).\n\nFor your use case, high effort makes sense for complex builds and architectural decisions. It might be overkill for your daily briefing summarization, where Haiku at medium effort already does the job well. The skill here isn't knowing which setting to use right now \u2014 it's developing the instinct to match effort level to task complexity. That's a judgment call that compounds: every time you correctly size effort to task, you're spending less and getting the same quality where it counts.", "unblocks_project": null}, {"title": "Anthropic's Project Glasswing - restricting Claude Mythos to security researchers - sounds necessary to me", "url": "https://simonwillison.net/2026/Apr/7/project-glasswing/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-04-07T20:52:54+00:00", "description": "Anthropic didn't release their latest model, Claude Mythos ( system card PDF ), today. They have instead made it available to a very restricted set of preview partners under their newly announced Project Glasswing . The model is a general purpose model, similar to Claude Opus 4.6, but Anthropic claim that its cyber-security research abilities are strong enough that they need to give the software industry as a whole time to prepare. Mythos Preview has already found thousands of high-severity vulnerabilities, including some in every major operating system and web browser . Given the rate of AI progress, it will not be long before such capabilities proliferate, potentially beyond actors who are committed to deploying them safely. [...] Project Glasswing partners will receive access to Claude Mythos Preview to find and fix vulnerabilities or weaknesses in their foundational systems\u2014systems that represent a very large portion of the world\u2019s shared cyberattack surface. We anticipate this work will focus on tasks like local vulnerability detection, black box testing of binaries, securing endpoints, and penetration testing of systems. There's a great deal more technical detail in Assessing Claude Mythos Preview\u2019s cybersecurity capabilities on the Anthropic Red Team blog: In one case, Mythos Preview wrote a web browser exploit that chained together four vulnerabilities, writing a complex JIT heap spray that escaped both renderer and OS sandboxes. It autonomously obtained local privilege escalation exploits on Linux and other operating systems by exploiting subtle race conditions and KASLR-bypasses. And it autonomously wrote a remote code execution exploit on FreeBSD's NFS server that granted full root access to unauthenticated users by splitting a 20-gadget ROP chain over multiple packets. Plus this comparison with Claude 4.6 Opus: Our internal evaluations showed that Opus 4.6 generally had a near-0% success rate at autonomous exploit development. But Mythos Preview is in a different league. For example, Opus 4.6 turned the vulnerabilities it had found in Mozilla\u2019s Firefox 147 JavaScript engine\u2014all patched in Firefox 148\u2014into JavaScript shell exploits only two times out of several hundred attempts. We re-ran this experiment as a benchmark for Mythos Preview, which developed working exploits 181 times, and achieved register control on 29 more. Saying \"our model is too dangerous to release\" is a great way to build buzz around a new model, but in this case I expect their caution is warranted. Just a few days ( last Friday ) ago I started a new ai-security-research tag on this blog to acknowledge an uptick in credible security professionals pulling the alarm on how good modern LLMs have got at vulnerability research. Greg Kroah-Hartman of the Linux kernel: Months ago, we were getting what we called 'AI slop,' AI-generated security reports that were obviously wrong or low quality. It was kind of funny. It didn't really worry us. Something happened a month ago, and the world switched. Now we have real reports. All open source projects have real reports that are made with AI, but they're good, and they're real. Daniel Stenberg of curl : The challenge with AI in open source security has transitioned from an AI slop tsunami into more of a ... plain security report tsunami. Less slop but lots of reports. Many of them really good. I'm spending hours per day on this now. It's intense. And Thomas Ptacek published Vulnerability Research Is Cooked , a post inspired by his podcast conversation with Anthropic's Nicholas Carlini. Anthropic have a 5 minute talking heads video describing the Glasswing project. Nicholas Carlini appears as one of those talking heads, where he said (highlights mine): It has the ability to chain together vulnerabilities. So what this means is you find two vulnerabilities, either of which doesn't really get you very much independently. But this model is able to create exploits out of three, four, or sometimes five vulnerabilities that in sequence give you some kind of very sophisticated end outcome. [...] I've found more bugs in the last couple of weeks than I found in the rest of my life combined . We've used the model to scan a bunch of open source code, and the thing that we went for first was operating systems, because this is the code that underlies the entire internet infrastructure. For OpenBSD, we found a bug that's been present for 27 years, where I can send a couple of pieces of data to any OpenBSD server and crash it . On Linux, we found a number of vulnerabilities where as a user with no permissions, I can elevate myself to the administrator by just running some binary on my machine. For each of these bugs, we told the maintainers who actually run the software about them, and they went and fixed them and have deployed the patches  patches so that anyone who runs the software is no longer vulnerable to these attacks. I found this on the OpenBSD 7.8 errata page : 025: RELIABILITY FIX: March 25, 2026 All architectures TCP packets with invalid SACK options could crash the kernel. A source code patch exists which remedies this problem. I tracked that change down in the GitHub mirror of the OpenBSD CVS repo (apparently they still use CVS!) and found it using git blame : Sure enough, the surrounding code is from 27 years ago. I'm not sure which Linux vulnerability Nicholas was describing, but it may have been this NFS one recently covered by Michael Lynch . There's enough smoke here that I believe there's a fire. It's not surprising to find vulnerabilities in decades-old software, especially given that they're mostly written in C, but what's new is that coding agents run by the latest frontier LLMs are proving tirelessly capable at digging up these issues. I actually thought to myself on Friday that this sounded like an industry-wide reckoning in the making, and that it might warrant a huge investment of time and money to get ahead of the inevitable barrage of vulnerabilities. Project Glasswing incorporates \"$100M in usage credits ... as well as $4M in direct donations to open-source security organizations\". Partners include AWS, Apple, Microsoft, Google, and the Linux Foundation. It would be great to see OpenAI involved as well - GPT-5.4 already has a strong reputation for finding security vulnerabilities and they have stronger models on the near horizon. The bad news for those of us who are not trusted partners is this: We do not plan to make Claude Mythos Preview generally available, but our eventual goal is to enable our users to safely deploy Mythos-class models at scale\u2014for cybersecurity purposes, but also for the myriad other benefits that such highly capable models will bring. To do so, we need to make progress in developing cybersecurity (and other) safeguards that detect and block the model\u2019s most dangerous outputs. We plan to launch new safeguards with an upcoming Claude Opus model, allowing us to improve and refine them with a model that does not pose the same level of risk as Mythos Preview. I can live with that. I think the security risks really are credible here, and having extra time for trusted teams to get ahead of them is a reasonable trade-off. Tags: security , thomas-ptacek , ai , generative-ai , llms , anthropic , nicholas-carlini , ai-ethics , llm-release , ai-security-research", "id": "ba9b45c61eab", "content": "Anthropic didn't release their latest model, Claude Mythos ( system card PDF ), today. They have instead made it available to a very restricted set of preview partners under their newly announced Project Glasswing . The model is a general purpose model, similar to Claude Opus 4.6, but Anthropic claim that its cyber-security research abilities are strong enough that they need to give the software industry as a whole time to prepare. Mythos Preview has already found thousands of high-severity vulnerabilities, including some in every major operating system and web browser . Given the rate of AI progress, it will not be long before such capabilities proliferate, potentially beyond actors who are committed to deploying them safely. [...] Project Glasswing partners will receive access to Claude Mythos Preview to find and fix vulnerabilities or weaknesses in their foundational systems\u2014systems that represent a very large portion of the world\u2019s shared cyberattack surface. We anticipate this work will focus on tasks like local vulnerability detection, black box testing of binaries, securing endpoints, and penetration testing of systems. There's a great deal more technical detail in Assessing Claude Mythos Preview\u2019s cybersecurity capabilities on the Anthropic Red Team blog: In one case, Mythos Preview wrote a web browser exploit that chained together four vulnerabilities, writing a complex JIT heap spray that escaped both renderer and OS sandboxes. It autonomously obtained local privilege escalation exploits on Linux and other operating systems by exploiting subtle race conditions and KASLR-bypasses. And it autonomously wrote a remote code execution exploit on FreeBSD's NFS server that granted full root access to unauthenticated users by splitting a 20-gadget ROP chain over multiple packets. Plus this comparison with Claude 4.6 Opus: Our internal evaluations showed that Opus 4.6 generally had a near-0% success rate at autonomous exploit development. But Mythos Preview is in a ", "tier": "NOTED", "what_it_is": "Anthropic built a model called Claude Mythos that's so capable at offensive cybersecurity \u2014 autonomously chaining browser exploits, escalating OS privileges, writing ROP chains \u2014 that they decided not to release it publicly. Instead, they're giving restricted access to security researchers under 'Project Glasswing' so the industry can patch vulnerabilities before this capability goes wide.", "why_it_matters": "This is a landscape signal, not a tool you'll use tomorrow. It tells you that the gap between 'AI that helps you code' and 'AI that autonomously breaks systems' has closed faster than most people expected. For someone building production systems with Claude Code and GitHub Actions pipelines, it's worth knowing that the threat model for AI-assisted attacks is evolving quickly \u2014 your STR systems aren't high-value targets, but the broader infrastructure they depend on (OS, browsers, cloud services) is exactly what Mythos is being used to harden.", "expandable_implement": null, "expandable_learn": null, "unblocks_project": null}, {"title": "SQLite WAL Mode Across Docker Containers Sharing a Volume", "url": "https://simonwillison.net/2026/Apr/7/sqlite-wal-docker-containers/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-04-07T15:41:00+00:00", "description": "Research: SQLite WAL Mode Across Docker Containers Sharing a Volume Inspired by this conversation on Hacker News about whether two SQLite processes in separate Docker containers that share the same volume might run into problems due to WAL shared memory. The answer is that everything works fine - Docker containers on the same host and filesystem share the same shared memory in a way that allows WAL to collaborate as it should. Tags: docker , sqlite", "id": "4a87b12378ac", "content": "Research: SQLite WAL Mode Across Docker Containers Sharing a Volume Inspired by this conversation on Hacker News about whether two SQLite processes in separate Docker containers that share the same volume might run into problems due to WAL shared memory. The answer is that everything works fine - Docker containers on the same host and filesystem share the same shared memory in a way that allows WAL to collaborate as it should. Tags: docker , sqlite", "tier": "NOTED", "what_it_is": "Simon Willison investigated whether two separate Docker containers sharing a volume can both safely use SQLite in WAL mode \u2014 the write-ahead logging mode that allows concurrent reads during writes. The answer is yes: on the same host, they share memory correctly and it just works.", "why_it_matters": "If you ever scale any of your Python tools (STR briefing, inspector scheduler) into Docker containers while keeping SQLite as the database, this removes a concern you might have had about data corruption. It's a green light for a simple architecture pattern: multiple containers, one SQLite file on a shared volume, no need to immediately reach for Postgres.", "expandable_implement": null, "expandable_learn": null, "unblocks_project": null}, {"title": "Google quietly launched an AI dictation app that works offline", "url": "https://techcrunch.com/2026/04/07/google-quietly-releases-an-offline-first-ai-dictation-app-on-ios/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-08T05:40:19+00:00", "description": "Google's new offline-first dictation app uses Gemma AI models to take on the apps like Wispr Flow.", "id": "138bf4303ae3", "content": "Update (April 7, 10:30 PM PT): The company has updated the app store listing and removed references to the Android app. But it also added that the iOS keyboard is coming soon. Google on Monday quietly released an offline-first dictation app called \u201cGoogle AI Edge Eloquent\u201d on iOS to take on the likes of Wispr Flow , SuperWhisper , Willow , and others. The app is free to download, and once its Gemma-based automatic speech recognition (ASR) models are downloaded, you can start dictating on your ph", "tier": "WORTH_YOUR_TIME", "summary": "Google released a free offline AI dictation app (Google AI Edge Eloquent) powered by Gemma that runs entirely on your device \u2014 no internet needed. For anyone building voice-first workflows or working in environments where privacy or connectivity matters, this is a free, capable alternative to paid tools like Wispr Flow or SuperWhisper.", "rank": 4}, {"title": "I can\u2019t help rooting for tiny open source AI model maker Arcee", "url": "https://techcrunch.com/2026/04/07/i-cant-help-rooting-for-tiny-open-source-ai-model-maker-arcee/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-07T21:35:02+00:00", "description": "Arcee is a tiny 26-person U.S. startup that built a high-performing, massive, open source LLM. And it's gaining popularity with OpenClaw users.", "id": "44e1983a92a1", "content": "Arcee is a tiny 26-person U.S. startup that built a high-performing, massive, open source LLM. And it's gaining popularity with OpenClaw users.", "tier": "WORTH_YOUR_TIME", "summary": "Arcee, a 26-person startup, built a high-performing open-source LLM that's gaining real traction. Worth watching because small teams building competitive open-source models means the gap between frontier closed models and what you can self-host keeps shrinking \u2014 which changes your deployment and cost options.", "rank": 5}, {"title": "Intel signs on to Elon Musk\u2019s Terafab chips project", "url": "https://techcrunch.com/2026/04/07/intel-signs-on-to-elon-musks-terafab-chips-project/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-07T18:10:01+00:00", "description": "Intel will join SpaceX and Tesla in an effort to build a new U.S. semiconductor factory in Texas, although the scope of its contributions are unclear.", "id": "f358d36c0c8a", "content": "Intel will join SpaceX and Tesla in an effort to build a new U.S. semiconductor factory in Texas, although the scope of its contributions are unclear.", "tier": "WORTH_YOUR_TIME", "summary": "Intel is joining Elon Musk's Terafab project to build a new AI chip factory in Texas alongside SpaceX and Tesla. This matters because U.S. domestic chip manufacturing capacity is one of the key constraints on AI compute costs \u2014 more supply eventually means cheaper inference for everyone.", "rank": 6}, {"title": "Anthropic debuts preview of powerful new AI model Mythos in new cybersecurity initiative", "url": "https://techcrunch.com/2026/04/07/anthropic-mythos-ai-model-preview-security/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-07T18:00:00+00:00", "description": "The new model will be used by a small number of high-profile companies to engage in defensive cybersecurity work.", "id": "2710e3f8d9f0", "content": "The new model will be used by a small number of high-profile companies to engage in defensive cybersecurity work.", "tier": "GAME_CHANGER", "summary": "Anthropic just previewed a new model called Mythos, specifically built for cybersecurity work. It's being rolled out to a small group of high-profile companies for defensive security applications \u2014 meaning Anthropic is now building specialized models beyond general-purpose assistants, which signals where the frontier is heading.", "rank": 1}, {"title": "Uber is the latest to be won over by Amazon\u2019s AI chips", "url": "https://techcrunch.com/2026/04/07/uber-is-the-latest-to-be-won-over-by-amazons-ai-chips/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-07T16:46:59+00:00", "description": "Uber is expanding its AWS contract to run more of its ride-sharing features on Amazon's chips. This is a thumb-of-the nose at Oracle and Google.", "id": "2414ecd4740a", "content": "Uber is expanding its AWS contract to run more of its ride-sharing features on Amazon's chips. This is a thumb-of-the nose at Oracle and Google.", "tier": "NOTED", "summary": "Uber is moving more of its core ride-sharing infrastructure to run on Amazon's custom AI chips (Trainium/Inferentia). It's a signal that AWS's in-house silicon is now competitive enough for production workloads at scale \u2014 relevant if you're thinking about cloud AI cost optimization.", "rank": 8}, {"title": "Anthropic\u00a0ups compute deal with Google and Broadcom amid skyrocketing demand", "url": "https://techcrunch.com/2026/04/07/anthropic-compute-deal-google-broadcom-tpus/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-04-07T16:05:56+00:00", "description": "Anthropic bulked up its compute deal with Google and Broadcom as the company has seen its run-rate revenue surge to $30 billion.", "id": "4b89a43fb600", "content": "Anthropic bulked up its compute deal with Google and Broadcom as the company has seen its run-rate revenue surge to $30 billion.", "tier": "WORTH_YOUR_TIME", "summary": "Anthropic's run-rate revenue hit $30 billion, and they're now expanding compute deals with Google and Broadcom to keep up with demand. This tells you the enterprise adoption curve is steeper than most people realize \u2014 these aren't pilot projects anymore, this is operational infrastructure at massive scale.", "rank": 3}, {"title": "A new Anthropic model found security problems &#8216;in every major operating system and web browser&#8217;", "url": "https://www.theverge.com/ai-artificial-intelligence/908114/anthropic-project-glasswing-cybersecurity", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-07T18:00:00+00:00", "description": "Anthropic is debuting a new AI model as part of a cybersecurity partnership with Nvidia, Google, Amazon Web Services, Apple, Microsoft, and other companies. Project Glasswing, as it's called, is billed as a way for large companies, and potentially even the government, to flag vulnerabilities in their systems with virtually no human intervention. Anthropic is [\u2026]", "id": "e2b3c7436d0e", "content": "Anthropic is debuting a new AI model as part of a cybersecurity partnership with Nvidia, Google, Amazon Web Services, Apple, Microsoft, and other companies. Project Glasswing, as it's called, is billed as a way for large companies, and potentially even the government, to flag vulnerabilities in their systems with virtually no human intervention. Anthropic is [\u2026]", "tier": "GAME_CHANGER", "summary": "Anthropic's Project Glasswing \u2014 backed by Nvidia, Google, AWS, Apple, Microsoft \u2014 found security vulnerabilities in every major OS and web browser with virtually no human in the loop. This is a real-world demonstration of AI doing expert-level technical work autonomously at scale, and it's the clearest signal yet that agentic AI can replace entire security audit workflows.", "rank": 2}, {"title": "Suno and major music labels reportedly clash over AI music sharing", "url": "https://www.theverge.com/ai-artificial-intelligence/908119/suno-sony-universal-music-ai-disagreement", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-07T16:21:22+00:00", "description": "The AI-powered musicmaker Suno is struggling to reach licensing deals with Universal Music Group and Sony Music Entertainment. That's according to a report from the Financial Times, which says both sides can't agree on whether users should be able to share the AI-generated songs they create. \"Universal wants AI-generated tracks to stay inside apps such [\u2026]", "id": "25eac330d7fd", "content": "The AI-powered musicmaker Suno is struggling to reach licensing deals with Universal Music Group and Sony Music Entertainment. That's according to a report from the Financial Times, which says both sides can't agree on whether users should be able to share the AI-generated songs they create. \"Universal wants AI-generated tracks to stay inside apps such [\u2026]", "tier": "NOTED", "summary": "Suno and major music labels can't agree on whether AI-generated music should be shareable outside the apps that created it \u2014 labels want to keep it locked in. This content licensing battle will set precedents that ripple into other AI-generated creative content categories.", "rank": 9}, {"title": "Intel will help build Elon Musk\u2019s Terafab AI chip factory", "url": "https://www.theverge.com/transportation/907976/elon-musk-terafab-intel-ai-chip-spacex-tesla", "source_name": "The Verge AI", "layer": 3, "published": "2026-04-07T15:43:17+00:00", "desc
