 beyond text.", "rank": 6}, {"title": "Meta gets ready to launch two new Ray-Ban AI glasses", "url": "https://www.theverge.com/column/901314/meta-new-ray-ban-ai-glasses", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-26T16:30:00+00:00", "description": "This is Lowpass by Janko Roettgers, a newsletter on the ever-evolving intersection of tech and entertainment, syndicated just for The Verge subscribers once a week. Meta and its AI glasses hardware partner EssilorLuxottica are getting ready to launch the next generation of their Ray-Ban AI glasses. That's according to a series of FCC filings for [\u2026]", "id": "416c0fad977c", "content": "This is Lowpass by Janko Roettgers, a newsletter on the ever-evolving intersection of tech and entertainment, syndicated just for The Verge subscribers once a week. Meta and its AI glasses hardware partner EssilorLuxottica are getting ready to launch the next generation of their Ray-Ban AI glasses. That's according to a series of FCC filings for [\u2026]", "tier": "NOTED", "summary": "Meta is prepping two new Ray-Ban AI glasses models based on FCC filings. Worth watching if you're thinking about how AI interfaces move beyond screens, but not actionable until they actually ship.", "rank": 8}], "leaderboard": [{"rank": 1, "title": "Build autonomous optimization loops using scoring functions", "category": "PARADIGM_SHIFT", "rationale": "The autoresearch pattern (define a scoring function, let an agent explore overnight, review improvements) is how Anthropic trained Claude to be exceptional at structured tasks. This same pattern applies to ANY system where quality can be scored: prompt optimization, scraper tuning, route efficiency, pricing models. Mastering this unlocks compound improvements across every future system you build. The Shopify CEO example proves it works on production code, not just ML training.", "first_step": "Take the inspector scheduling scoring function (route efficiency, time windows, priority) and set up a 4-hour overnight loop that generates alternative schedules, scores them, and surfaces the top 3 by morning.", "time_investment": "2-3 sessions to internalize the pattern, then reusable forever", "days_on_leaderboard": 4}, {"rank": 2, "title": "Learn when to slow agents down and demand understanding before proceeding", "category": "PARADIGM_SHIFT", "rationale": "Zechner's warning about 'complexity monsters' addresses the Stage 4 trap: agents generate code faster than you can reason about it. Auto mode is powerful, but cognitive debt is real. The discipline of stopping when you don't understand what the agent built\u2014even if it works\u2014is what prevents production systems from becoming unmaintainable black boxes. This is the difference between shipping fast and shipping sustainably.", "first_step": "Next Claude Code session: when the agent finishes a complex multi-file change, stop before testing. Force yourself to read through each file and articulate what changed and why. If you can't, don't proceed until you can.", "time_investment": "Immediate practice\u2014adds 10-15 minutes per complex build, but prevents hours of debugging later", "days_on_leaderboard": 2}, {"rank": 3, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works (what triggers review vs auto-approval) teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature\u2014it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 3}, {"rank": 4, "title": "Study 'vibe porting' pattern: AI-guided migration validated by test suites", "category": "APPLIED_PATTERN", "rationale": "The JSONata port (7 hours to rewrite an entire query language) demonstrates a transferable technique: describe what existing code does, let AI recreate it in a different language/framework, validate against the original's test suite, run both in parallel before switching. This pattern lets you migrate legacy systems without needing to understand every implementation detail. Applicable to moving from Guesty integrations to custom systems, porting vendor tools when APIs change, or adapting open-source solutions to your stack.", "first_step": "Identify one brittle integration in your stack (Breezeway email parsing, Guesty webhook handler) and spec out how you'd 'vibe port' it: what tests would validate identical behavior? What parallel-run period proves safety?", "time_investment": "30 minutes to understand the pattern, applicable to any migration project", "days_on_leaderboard": 1}, {"rank": 5, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 4}], "backlog_summary": {"total_pending": 5, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 1, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 2}, {"title": "Auto mode for Claude Code", "days_pending": 2}, {"title": "Package Managers Need to Cool Down", "days_pending": 2}]}, "dropped_counts": {"layer_1": 0, "layer_2": 1, "layer_3": 10}, "total_fetched": 77}, {"date": "2026-03-26", "items": [{"title": "Thoughts on slowing the fuck down", "url": "https://simonwillison.net/2026/Mar/25/thoughts-on-slowing-the-fuck-down/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-25T21:47:17+00:00", "description": "Thoughts on slowing the fuck down Mario Zechner created the Pi agent framework used by OpenClaw, giving considerable credibility to his opinions on current trends in agentic engineering. He's not impressed: We have basically given up all discipline and agency for a sort of addiction, where your highest goal is to produce the largest amount of code in the shortest amount of time. Consequences be damned. Agents and humans both make mistakes, but agent mistakes accumulate much faster: A human is a bottleneck. A human cannot shit out 20,000 lines of code in a few hours. Even if the human creates such booboos at high frequency, there's only so many booboos the human can introduce in a codebase per day. [...] With an orchestrated army of agents, there is no bottleneck, no human pain. These tiny little harmless booboos suddenly compound at a rate that's unsustainable. You have removed yourself from the loop, so you don't even know that all the innocent booboos have formed a monster of a codebase. You only feel the pain when it's too late. [...] You have zero fucking idea what's going on because you delegated all your agency to your agents. You let them run free, and they are merchants of complexity. I think Mario is exactly right about this. Agents let us move so much faster , but this speed also means that changes which we would normally have considered over the course of weeks are landing in a matter of hours. It's so easy to let the codebase evolve outside of our abilities to reason clearly about it. Cognitive debt is real. Mario recommends slowing down: Give yourself time to think about what you're actually building and why. Give yourself an opportunity to say, fuck no, we don't need this. Set yourself limits on how much code you let the clanker generate per day, in line with your ability to actually review the code. Anything that defines the gestalt of your system, that is architecture, API, and so on, write it by hand. [...] I'm not convinced writing by hand is the best way to address this, but it's absolutely the case that we need the discipline to find a new balance of speed v.s. mental thoroughness now that typing out the code is no longer anywhere close to being the bottleneck on writing software. Tags: ai , generative-ai , llms , coding-agents , cognitive-debt , agentic-engineering", "id": "7e5bb41355f7", "content": "Thoughts on slowing the fuck down Mario Zechner created the Pi agent framework used by OpenClaw, giving considerable credibility to his opinions on current trends in agentic engineering. He's not impressed: We have basically given up all discipline and agency for a sort of addiction, where your highest goal is to produce the largest amount of code in the shortest amount of time. Consequences be damned. Agents and humans both make mistakes, but agent mistakes accumulate much faster: A human is a bottleneck. A human cannot shit out 20,000 lines of code in a few hours. Even if the human creates such booboos at high frequency, there's only so many booboos the human can introduce in a codebase per day. [...] With an orchestrated army of agents, there is no bottleneck, no human pain. These tiny little harmless booboos suddenly compound at a rate that's unsustainable. You have removed yourself from the loop, so you don't even know that all the innocent booboos have formed a monster of a codebase. You only feel the pain when it's too late. [...] You have zero fucking idea what's going on because you delegated all your agency to your agents. You let them run free, and they are merchants of complexity. I think Mario is exactly right about this. Agents let us move so much faster , but this speed also means that changes which we would normally have considered over the course of weeks are landing in a matter of hours. It's so easy to let the codebase evolve outside of our abilities to reason clearly about it. Cognitive debt is real. Mario recommends slowing down: Give yourself time to think about what you're actually building and why. Give yourself an opportunity to say, fuck no, we don't need this. Set yourself limits on how much code you let the clanker generate per day, in line with your ability to actually review the code. Anything that defines the gestalt of your system, that is architecture, API, and so on, write it by hand. [...] I'm not convinced writing by hand is the b", "tier": "GAME_CHANGER", "what_it_is": "Mario Zechner, creator of the Pi agent framework, warns that AI agents generate code so fast that mistakes compound faster than humans can understand them. When you let agents run autonomously, they create 'complexity monsters' \u2014 codebases that evolve beyond your ability to reason about them. He calls this cognitive debt.", "why_it_matters": "You're at the exact inflection point Mario is describing. You're using Claude Code to build production systems fast \u2014 STR Daily Briefing, Inspector Scheduling, this AI briefing tool itself. You've noticed Stage 4 gaps around debugging tracebacks and multi-system orchestration. This post names the problem: when agents move faster than your ability to understand what changed, you lose the ability to debug, extend, or trust your own systems. Mario's prescription \u2014 set daily code generation limits aligned with what you can actually review, and write architecture by hand \u2014 is a concrete framework for staying in control as you scale up agent use.", "expandable_implement": null, "expandable_learn": "Try this experiment to make cognitive debt tangible: Pick one of your production systems and have Claude Code make three substantial improvements in one session without reviewing the changes until the end. Then, a day later, try to debug a hypothetical issue or add a new feature. Notice how much harder it is when you weren't there for each change.\n\nNow try the opposite: Set a rule that you only let Claude Code generate one new file or modify one existing file per session, and you review and understand each change before moving on. Track how this feels different when you need to debug or extend the code later.\n\nThe key insight is that your understanding of the system is your debugging speed. Agents don't just write code \u2014 they transfer the responsibility for understanding from you to the machine. The question isn't whether agents are useful (they clearly are), but at what pace you can absorb their output while maintaining the mental model that lets you fix things when they break.", "unblocks_project": null}, {"title": "LiteLLM Hack: Were You One of the 47,000?", "url": "https://simonwillison.net/2026/Mar/25/litellm-hack/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-25T17:21:04+00:00", "description": "LiteLLM Hack: Were You One of the 47,000? Daniel Hnyk used the BigQuery PyPI dataset to determine how many downloads there were of the exploited LiteLLM packages during the 46 minute period they were live on PyPI. The answer was 46,996 across the two compromised release versions (1.82.7 and 1.82.8). They also identified 2,337 packages that depended on LiteLLM - 88% of which did not pin versions in a way that would have avoided the exploited version. Via @hnykda Tags: packaging , pypi , python , security , supply-chain", "id": "021c63d29d0d", "content": "LiteLLM Hack: Were You One of the 47,000? Daniel Hnyk used the BigQuery PyPI dataset to determine how many downloads there were of the exploited LiteLLM packages during the 46 minute period they were live on PyPI. The answer was 46,996 across the two compromised release versions (1.82.7 and 1.82.8). They also identified 2,337 packages that depended on LiteLLM - 88% of which did not pin versions in a way that would have avoided the exploited version. Via @hnykda Tags: packaging , pypi , python , security , supply-chain", "tier": "WORTH_YOUR_TIME", "what_it_is": "Researcher analyzed the LiteLLM supply chain attack and found that 47,000 downloads happened during the 46 minutes the malicious packages were live on PyPI. More concerning: 88% of the 2,337 packages that depend on LiteLLM had dependency declarations that would have automatically pulled in the compromised version.", "why_it_matters": "You're using the Anthropic API directly, but you're also building tools that import Python packages daily. This incident shows two things that matter for your work: First, even short-lived attacks can affect tens of thousands of installs \u2014 automation doesn't wait for security reviews. Second, most developers don't pin dependencies in a way that would have protected them. Look at your own requirements.txt files: are you pinning to specific versions, or using ranges that would auto-upgrade to a compromised release? The fact that this happened to a popular LLM library suggests the attackers are targeting the AI tooling ecosystem specifically.", "expandable_implement": "Audit your existing projects' dependency pinning:\n\n1. For each project, check your requirements.txt or pyproject.toml. Look for entries like `litellm>=1.0.0` or `openai^1.0.0` \u2014 these would auto-upgrade.\n\n2. Switch to exact pinning for critical dependencies: `anthropic==0.18.1` instead of `anthropic>=0.18.0`. This prevents automatic upgrades to compromised versions.\n\n3. Use a tool like `pip-audit` to check your current dependencies for known vulnerabilities:\n   ```bash\n   pip install pip-audit\n   pip-audit\n   ```\n\n4. For your GitHub Actions workflows, add a scheduled job that runs pip-audit weekly and opens an issue if vulnerabilities are found. This gives you a heads-up without blocking your daily work.\n\n5. Consider adding a manual review step before upgrading any package that touches API credentials or processes external data. This is where Mario's 'slow down' advice applies \u2014 not to code generation, but to dependency updates that could compromise your entire system.", "expandable_learn": null, "unblocks_project": null}, {"title": "Google bumps up Q Day deadline to 2029, far sooner than previously thought", "url": "https://arstechnica.com/security/2026/03/google-bumps-up-q-day-estimate-to-2029-far-sooner-than-previously-thought/", "source_name": "Ars Technica", "layer": 3, "published": "2026-03-25T15:49:17+00:00", "description": "Company warns entire industry to move off RSA and EC more quickly.", "id": "4665833ed88f", "content": "CRYPTOPOCALYPSE NOW Google bumps up Q Day deadline to 2029, far sooner than previously thought Company warns entire industry to move off RSA and EC more quickly. Dan Goodin \u2013 Mar 25, 2026 11:49 am | 40 Credit:\n\n          \n          JuSun/Getty Images Credit:\n\n          \n          JuSun/Getty Images Text\n        settings Story text Size Small Standard Large Width * Standard Wide Links Standard Orange * Subscribers only Learn more Minimize to nav Google is dramatically shortening its readiness dea", "tier": "GAME_CHANGER", "summary": "Google just moved up its estimate for when quantum computers will break current encryption from some vague future date to 2029 \u2014 three years from now. If you're building systems that need to last, this means you need to start planning your migration to quantum-resistant cryptography now, not later. This affects everything from how you store sensitive data to which authentication systems you choose.", "rank": 1}, {"title": "The AI skills gap is here, says AI company, and power users are pulling ahead", "url": "https://techcrunch.com/2026/03/25/the-ai-skills-gap-is-here-says-ai-company-and-power-users-are-pulling-ahead/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T21:44:13+00:00", "description": "Anthropic finds AI isn\u2019t replacing jobs yet, but early data shows growing inequality as experienced users gain an edge, raising concerns about future displacement and workforce divides.", "id": "7b18af128ba5", "content": "Anthropic finds AI isn\u2019t replacing jobs yet, but early data shows growing inequality as experienced users gain an edge, raising concerns about future displacement and workforce divides.", "tier": "WORTH_YOUR_TIME", "summary": "Anthropic released data showing AI isn't replacing jobs yet, but power users are pulling ahead fast, creating a growing skills gap. This confirms what you already know: the people learning to use these tools effectively are gaining compounding advantages. The window to build fluency before it becomes table stakes is narrowing.", "rank": 5}, {"title": "Google unveils TurboQuant, a new AI memory compression algorithm \u2014\u00a0and yes, the internet is calling it \u2018Pied Piper\u2019", "url": "https://techcrunch.com/2026/03/25/google-turboquant-ai-memory-compression-silicon-valley-pied-piper/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T20:38:45+00:00", "description": "Google\u2019s TurboQuant has the internet joking about Pied Piper from HBO's \"Silicon Valley.\" The compression algorithm promises to shrink AI\u2019s \u201cworking memory\u201d by up to 6x, but it\u2019s still just a lab experiment for now.", "id": "782715ced829", "content": "Google\u2019s TurboQuant has the internet joking about Pied Piper from HBO's \"Silicon Valley.\" The compression algorithm promises to shrink AI\u2019s \u201cworking memory\u201d by up to 6x, but it\u2019s still just a lab experiment for now.", "tier": "GAME_CHANGER", "summary": "Google released TurboQuant, a compression algorithm that shrinks AI's working memory by up to 6x. This is huge for small operators \u2014 it means you could run more complex models on cheaper hardware, or run the same models faster and cheaper. Still experimental, but if it ships in production tools, it fundamentally changes the economics of what you can build.", "rank": 2}, {"title": "Bernie Sanders and AOC propose a ban on data center construction", "url": "https://techcrunch.com/2026/03/25/bernie-sanders-and-aoc-propose-a-ban-on-data-center-construction/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T17:15:50+00:00", "description": "Senator Bernie Sanders and Rep. Alexandria Ocasio-Cortez introduced companion legislation to halt construction on new data centers until Congress passes comprehensive AI regulation.", "id": "042f7a86fd6f", "content": "Senator Bernie Sanders and Rep. Alexandria Ocasio-Cortez introduced companion legislation to halt construction on new data centers until Congress passes comprehensive AI regulation.", "tier": "WORTH_YOUR_TIME", "summary": "Sanders and AOC proposed legislation to halt all new data center construction until Congress passes AI regulation. Unlikely to pass, but signals that data center buildout \u2014 the infrastructure you rely on for API access \u2014 could face political headwinds. Worth watching if you're planning anything that depends on cheap, abundant compute.", "rank": 4}, {"title": "Google launches Lyria 3 Pro music generation model", "url": "https://techcrunch.com/2026/03/25/google-launches-lyria-3-pro-music-generation-model/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T16:37:43+00:00", "description": "Google is launching Lyria 3 Pro, an upgraded music model that generates longer, more customizable tracks, as it expands AI music tools across Gemini, enterprise products, and other services.", "id": "9eb308cca74b", "content": "Google is launching Lyria 3 Pro, an upgraded music model that generates longer, more customizable tracks, as it expands AI music tools across Gemini, enterprise products, and other services.", "tier": "NOTED", "summary": "Google launched Lyria 3 Pro, which generates longer, more customizable music tracks (up to 3 minutes vs 30 seconds). Useful if you're building anything that needs generated audio content, but mostly incremental improvement over existing music generation tools.", "rank": 7}, {"title": "Reddit takes on the bots with new \u2018human verification\u2019 requirements for fishy behavior", "url": "https://techcrunch.com/2026/03/25/reddit-bots-new-human-verification-requirements/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T16:10:00+00:00", "description": "Reddit will require suspected automated accounts to verify they\u2019re human, as it ramps up efforts to curb bot-driven spam and manipulation.", "id": "459cb3e27240", "content": "Reddit will require suspected automated accounts to verify they\u2019re human, as it ramps up efforts to curb bot-driven spam and manipulation.", "tier": "NOTED", "summary": "Reddit is requiring suspected bot accounts to verify they're human, ramping up anti-bot measures. Relevant if you're building anything that scrapes or integrates with Reddit \u2014 access may get harder. Also a preview of the verification arms race coming to other platforms.", "rank": 8}, {"title": "With Sift, two ex-SpaceX engineers are bringing the software that helped launch rockets to the factory floor", "url": "https://techcrunch.com/2026/03/25/with-sift-stack-two-ex-spacex-engineers-are-bringing-the-software-that-helped-launch-rockets-to-the-factory-floor/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T13:00:00+00:00", "description": "Sift is building the data infrastructure for advanced manufacturing.", "id": "834e5a9883ae", "content": "The cry of \u201catoms, not bits!\u201d \u2014 a phrase capturing Silicon Valley\u2019s growing obsession with physical manufacturing over digital products \u2014  reached a fever pitch last week with word that Jeff Bezos is putting together a $100 billion fund to roll up and automate factories. But automating factories isn\u2019t purely a hardware problem. It increasingly depends on sophisticated software and AI tools, and that shift is reshaping the companies building the infrastructure of the physical manufacturing world.", "tier": "WORTH_YOUR_TIME", "summary": "Two ex-SpaceX engineers are bringing the software stack that launched rockets to factory floors with a company called Sift. This is a real-world example of AI and sophisticated software automating physical manufacturing \u2014 exactly the kind of applied case study that shows how these tools translate to atoms-based businesses, not just digital products.", "rank": 6}, {"title": "Lucid Bots raises $20M to keep up with demand for its\u00a0window-washing drones", "url": "https://techcrunch.com/2026/03/25/lucid-bots-raises-20m-to-keep-up-with-demand-for-its-window-washing-drones/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-25T11:00:00+00:00", "description": "Lucid Bots has seen demand accelerate over the last year for its window-cleaning drones and power-washing robots.", "id": "e2a484a4922d", "content": "Lucid Bots has seen demand accelerate over the last year for its window-cleaning drones and power-washing robots.", "tier": "NOTED", "summary": "Lucid Bots raised $20M for its window-washing drones and power-washing robots due to accelerating demand. Another real-world example of AI-powered robotics solving unsexy operational problems in physical industries \u2014 the kind of niche automation that actually makes money.", "rank": 9}, {"title": "Disney\u2019s big bets on the metaverse and AI slop aren\u2019t going so well", "url": "https://www.theverge.com/streaming/900837/disney-open-ai-sora-epic-fortnite-metaverse", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-25T20:02:48+00:00", "description": "Less than a week into his tenure as Disney's newly-appointed CEO, Josh D'Amaro is already dealing with two separate crises that have cast a shadow over the company's future plans. OpenAI is shutting down its Sora image-generation program just months after Disney announced a $1 billion dollar collaboration to bake the tech into Disney Plus. [\u2026]", "id": "bdb4be77307a", "content": "Less than a week into his tenure as Disney's newly-appointed CEO, Josh D'Amaro is already dealing with two separate crises that have cast a shadow over the company's future plans. OpenAI is shutting down its Sora image-generation program just months after Disney announced a $1 billion dollar collaboration to bake the tech into Disney Plus. [\u2026]", "tier": "NOTED", "summary": "Disney's $1B collaboration with OpenAI for Sora integration into Disney Plus is in crisis as OpenAI shuts down the Sora program. A reminder that betting big on cutting-edge foundation models from third parties carries real execution risk \u2014 even for companies with Disney's resources.", "rank": 10}, {"title": "Anthropic\u2019s Claude Code gets \u2018safer\u2019 auto mode", "url": "https://www.theverge.com/ai-artificial-intelligence/900201/anthropic-claude-code-auto-mode", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-25T11:39:46+00:00", "description": "Anthropic has launched an \"auto mode\" for Claude Code, a new tool that lets AI make permissions-level decisions on users' behalf. The company says the feature offers vibe coders a safer alternative between constant handholding or giving the model dangerous levels of autonomy. Claude Code is capable of acting independently on users' behalf, a useful [\u2026]", "id": "7bbc5f18dc6b", "content": "Anthropic has launched an \"auto mode\" for Claude Code, a new tool that lets AI make permissions-level decisions on users' behalf. The company says the feature offers vibe coders a safer alternative between constant handholding or giving the model dangerous levels of autonomy. Claude Code is capable of acting independently on users' behalf, a useful [\u2026]", "tier": "WORTH_YOUR_TIME", "summary": "Anthropic launched 'auto mode' for Claude Code, letting the AI make permission-level decisions without constant approval prompts. This is the sweet spot between babysitting every action and giving full autonomy \u2014 you set guardrails, then let it run. If you're using AI to automate workflows, this is a meaningful productivity unlock.", "rank": 3}], "leaderboard": [{"rank": 1, "title": "Build autonomous optimization loops using scoring functions", "category": "PARADIGM_SHIFT", "rationale": "The autoresearch pattern (define a scoring function, let an agent explore overnight, review improvements) is how Anthropic trained Claude to be exceptional at structured tasks. This same pattern applies to ANY system where quality can be scored: prompt optimization, scraper tuning, route efficiency, pricing models. Mastering this unlocks compound improvements across every future system you build. The Shopify CEO example proves it works on production code, not just ML training.", "first_step": "Take the inspector scheduling scoring function (route efficiency, time windows, priority) and set up a 4-hour overnight loop that generates alternative schedules, scores them, and surfaces the top 3 by morning.", "time_investment": "2-3 sessions to internalize the pattern, then reusable forever", "days_on_leaderboard": 3}, {"rank": 2, "title": "Learn when to slow agents down and demand understanding before proceeding", "category": "PARADIGM_SHIFT", "rationale": "Zechner's warning about 'complexity monsters' addresses the Stage 4 trap: agents generate code faster than you can reason about it. Auto mode is powerful, but cognitive debt is real. The discipline of stopping when you don't understand what the agent built\u2014even if it works\u2014is what prevents production systems from becoming unmaintainable black boxes. This is the difference between shipping fast and shipping sustainably.", "first_step": "Next Claude Code session: when the agent finishes a complex multi-file change, stop before testing. Force yourself to read through each file and articulate what changed and why. If you can't, don't proceed until you can.", "time_investment": "Immediate practice\u2014adds 10-15 minutes per complex build, but prevents hours of debugging later", "days_on_leaderboard": 1}, {"rank": 3, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works (what triggers review vs auto-approval) teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature\u2014it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 2}, {"rank": 4, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 3}, {"rank": 5, "title": "Understand dependency supply chain security patterns", "category": "STRATEGIC_MOVE", "rationale": "The LiteLLM hack demonstrates that 88% of dependent packages would have automatically pulled in malicious code. Package cooldown mechanisms are now standard across every major package manager. This isn't paranoia; it's how professionals deploy production systems in 2025. Understanding this pattern teaches you to think about trust boundaries, attack surfaces, and gradual rollout strategies\u2014concepts that apply to ANY system you architect.", "first_step": "Check your production tools (daily briefing, scheduler): which dependencies are pinned? Which auto-update? Add version pinning to at least one critical dependency.", "time_investment": "30 minutes to understand the pattern, 10 minutes per project to implement", "days_on_leaderboard": 2}], "backlog_summary": {"total_pending": 4, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 1, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 1}, {"title": "Auto mode for Claude Code", "days_pending": 1}, {"title": "Package Managers Need to Cool Down", "days_pending": 1}]}, "dropped_counts": {"layer_1": 1, "layer_2": 2, "layer_3": 13}, "total_fetched": 81}, {"date": "2026-03-25", "items": [{"title": "v2.1.83", "url": "https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md#2183", "source_name": "Claude Code Changelog", "layer": 1, "published": null, "description": "Added `managed-settings.d/` drop-in directory alongside `managed-settings.json`, letting separate teams deploy independent policy fragments that merge alphabetically Added `CwdChanged` and `FileChanged` hook events for reactive environment management (e.g., direnv) Added `sandbox.failIfUnavailable` setting to exit with an error when sandbox is enabled but cannot start, instead of running unsandboxed Added `disableDeepLinkRegistration` setting to prevent `claude-cli://` protocol handler registration Added `CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=1` to strip Anthropic and cloud provider credentials from subprocess environments (Bash tool, hooks, MCP stdio servers) Added transcript search \u2014 press `/` in transcript mode (`Ctrl+O`) to search, `n`/`N` to step through matches Added `Ctrl+X Ctrl+E` as an alias for opening the external editor (readline-native binding; `Ctrl+G` still works) Pasted images now insert an `[Image #N]` chip at the cursor so you can reference them positionally in your prompt Agents can now declare `initialPrompt` in frontmatter to auto-submit a first turn `chat:killAgents` and `chat:fastMode` are now rebindable via `~/.claude/keybindings.json` Fixed mouse tracking escape sequences leaking to shell prompt after exit Fixed Claude Code hanging on exit on macOS Fixed screen flashing blank after being idle for a few seconds Fixed a hang when diffing very large files with few common lines \u2014 diffs now time out after 5 seconds and fall back gracefully Fixed a 1\u20138 second UI freeze on startup when voice input was enabled, caused by eagerly loading the native audio module Fixed a startup regression where Claude Code would wait ~3s for claude.ai MCP config fetch before proceeding Fixed `--mcp-config` CLI flag bypassing `allowedMcpServers`/`deniedMcpServers` managed policy enforcement Fixed claude.ai MCP connectors (Slack, Gmail, etc.) not being available in single-turn `--print` mode Fixed `caffeinate` process not properly terminating when Claude Code exits, preventing Mac from sleeping Fixed bash mode not activating when tab-accepting `!`-prefixed command suggestions Fixed stale slash command selection showing wrong highlighted command after navigating suggestions Fixed `/config` menu showing both the search cursor and list selection at the same time Fixed background subagents becoming invisible after context compaction, which could cause duplicate agents to be spawned Fixed background agent tasks staying stuck in \"running\" state when git or API calls hang during cleanup Fixed `--channels` showing \"Channels are not currently available\" on first launch after upgrade Fixed uninstalled plugin hooks continuing to fire until the next session Fixed queued commands flickering during streaming responses Fixed slash commands being sent to the model as text when submitted while a message is processing Fixed scrollback jumping when collapsed read/search groups finish after scrolling offscreen Fixed scrollback jumping to top when the model starts or stops thinking Fixed SDK session history loss on resume caused by hook progress/attachment messages forking the parentUuid chain Fixed copy-on-select not firing when you release the mouse outside the terminal window Fixed ghost characters appearing in height-constrained lists when items overflow Fixed `Ctrl+B` interfering with readline backward-char at an idle prompt \u2014 it now only fires when a foreground task can be backgrounded Fixed tool result files never being cleaned up, ignoring the `cleanupPeriodDays` setting Fixed space key being swallowed for up to 3 seconds after releasing voice hold-to-talk Fixed ALSA library errors corrupting the terminal UI when using voice mode on Linux without audio hardware (Docker, headless, WSL1) Fixed voice mode SoX detection on Termux/Android where spawning `which` is kernel-restricted Fixed Remote Control sessions showing as Idle in the web session list while actively running Fixed footer navigation selecting an invisible Remote Control pill in config-driven mode Fixed memory leak in remote sessions where tool use IDs accumulate indefinitely Improved Bedrock SDK cold-start latency by overlapping profile fetch with other boot work Improved `--resume` memory usage and startup latency on large sessions Improved plugin startup \u2014 commands, skills, and agents now load from disk cache without re-fetching Improved Remote Control session titles: AI-generated titles now appear within seconds of the first message Improved `WebFetch` to identify as `Claude-User` so site operators can recognize and allowlist Claude Code traffic via `robots.txt` Reduced `WebFetch` peak memory usage for large pages Reduced scrollback resets in long sessions from once per turn to once per ~50 messages Faster `claude -p` startup with unauthenticated HTTP/SSE MCP servers (~600ms saved) Bash ghost-text suggestions now include just-submitted commands immediately Increased non-streaming fallback token cap (21k \u2192 64k) and timeout (120s \u2192 300s local) so fallback requests are less likely to be truncated Interrupting a prompt before any response now automatically restores your input so you can edit and resubmit `/status` now works while Claude is responding, instead of being queued until the turn finishes Plugin MCP servers that duplicate an org-managed connector are now suppressed instead of running a second connection Linux: respect `XDG_DATA_HOME` when registering the `claude-cli://` protocol handler Changed \"stop all background agents\" keybinding from `Ctrl+F` to `Ctrl+X Ctrl+K` to stop shadowing readline forward-char Deprecated `TaskOutput` tool in favor of using `Read` on the background task's output file path Added `CLAUDE_CODE_DISABLE_NONSTREAMING_FALLBACK` env var to disable the non-streaming fallback when streaming fails Plugin options (`manifest.userConfig`) now available externally \u2014 plugins can prompt for configuration at enable time, with `sensitive: true` values stored in keychain (macOS) or protected credentials file (other platforms) Claude can now reference the on-disk path of clipboard-pasted images for file operations `Ctrl+L` now clears the screen and forces a full redraw \u2014 use this to recover when Cmd+K leaves the UI partially blank. Use `Ctrl+U` or double-Esc to clear prompt input. `--bare -p` (SDK pattern) is ~14% faster to the API request Memory: `MEMORY.md` index now truncates at 25KB as well as 200 lines Disabled `AskUserQuestion` and plan-mode tools when `--channels` is active Fixed API 400 error when a pasted image was queued during a failing tool call Fixed MCP tool calls hanging indefinitely when an SSE connection drops mid-call and exhausts its reconnection attempts Fixed Remote Control session titles showing raw XML when a background agent completed before the first user message Fixed remote sessions forgetting conversation history after a container restart due to progress-message gaps in the resumed transcript chain Fixed remote sessions requiring re-login on transient auth errors instead of retrying automatically Fixed `rg ... | wc -l` and similar piped commands hanging and returning `0` in sandbox mode on Linux Fixed voice input hold-to-talk not activating when a CJK IME inserts a full-width space Fixed `--worktree` hanging silently when the worktree name contained a forward slash [VSCode] Spinner now turns red with \"Not responding\" when the backend hasn't responded for 60 seconds [VSCode] Fixed session history not loading correctly when reopening a session via URL or after restart [VSCode] Added Esc-twice (or `/rewind`) to open a keyboard-navigable rewind picker [VSCode] Fixed \"Fork conversation from here\" and rewind actions failing silently after the session cache goes stale", "id": "38510ce5c777", "content": "Added `managed-settings.d/` drop-in directory alongside `managed-settings.json`, letting separate teams deploy independent policy fragments that merge alphabetically Added `CwdChanged` and `FileChanged` hook events for reactive environment management (e.g., direnv) Added `sandbox.failIfUnavailable` setting to exit with an error when sandbox is enabled but cannot start, instead of running unsandboxed Added `disableDeepLinkRegistration` setting to prevent `claude-cli://` protocol handler registration Added `CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=1` to strip Anthropic and cloud provider credentials from subprocess environments (Bash tool, hooks, MCP stdio servers) Added transcript search \u2014 press `/` in transcript mode (`Ctrl+O`) to search, `n`/`N` to step through matches Added `Ctrl+X Ctrl+E` as an alias for opening the external editor (readline-native binding; `Ctrl+G` still works) Pasted images now insert an `[Image #N]` chip at the cursor so you can reference them positionally in your prompt Agents can now declare `initialPrompt` in frontmatter to auto-submit a first turn `chat:killAgents` and `chat:fastMode` are now rebindable via `~/.claude/keybindings.json` Fixed mouse tracking escape sequences leaking to shell prompt after exit Fixed Claude Code hanging on exit on macOS Fixed screen flashing blank after being idle for a few seconds Fixed a hang when diffing very large files with few common lines \u2014 diffs now time out after 5 seconds and fall back gracefully Fixed a 1\u20138 second UI freeze on startup when voice input was enabled, caused by eagerly loading the native audio module Fixed a startup regression where Claude Code would wait ~3s for claude.ai MCP config fetch before proceeding Fixed `--mcp-config` CLI flag bypassing `allowedMcpServers`/`deniedMcpServers` managed policy enforcement Fixed claude.ai MCP connectors (Slack, Gmail, etc.) not being available in single-turn `--print` mode Fixed `caffeinate` process not properly terminating when Claude Code exits, preventi", "tier": "WORTH_YOUR_TIME", "what_it_is": "This release adds several workflow improvements to Claude Code. The standout features are transcript search (press `/` while reviewing past conversations to find specific exchanges), policy management for teams (useful if you ever want to lock down certain behaviors across multiple machines), and better handling of pasted images\u2014they now insert labeled chips so you can reference them by position in your prompts.", "why_it_matters": "Transcript search is immediately useful. You've been building systems for two years\u2014being able to quickly find \"that conversation where Claude suggested the haversine approach\" or \"when we debugged the email parsing\" saves mental overhead. The image chip feature matters because you're often working from field photos (property inspections, cleaning issues). Now you can paste three photos and say \"Image 1 shows the problem, Image 2 is what it should look like, generate the work order based on the difference.\" The rest is mostly cleanup\u2014faster startup, fewer hangs, better credential hygiene for subprocess environments. Nothing transformative, but these are the quality-of-life improvements that compound into smoother sessions.", "expandable_implement": "**To use transcript search:** Next time you're in a Claude Code session and need to find something from an earlier conversation, press `Ctrl+O` to enter transcript mode (you'll see your full conversation history). Press `/` and type your search term\u2014maybe \"haversine\" or \"GitHub Actions\" or whatever you're looking for. Use `n` to jump to the next match, `N` to go back. Press `Esc` to exit search and return to transcript view. This is especially useful when you're building on something from a few days ago and don't want to re-explain the context.\n\n**To reference pasted images:** When you're working on something that needs visual context (like generating a cleaning checklist from inspection photos), paste your images into Claude Code as usual. You'll now see `[Image #1]`, `[Image #2]`, etc. as chips in your input area. In your prompt, you can reference them directly: \"Image 1 shows the bathroom counter. Image 2 shows the expected state. Write a Breezeway task that describes the gap between them.\" This makes multi-image prompts much clearer than saying \"the first image\" or \"the one on the left.\"\n\nThe other features are either behind-the-scenes improvements or enterprise-focused (policy management, credential scrubbing). You'll benefit from them passively\u2014faster startup, fewer weird hangs\u2014but you don't need to configure anything.", "expandable_learn": "The transcript search feature is built on something called **inverse indexing**\u2014the same concept search engines use. When you have a conversation with Claude, every message gets broken into searchable tokens (words, essentially) and indexed so that when you search for \"haversine,\" Claude Code can instantly find every message containing that word without reading through the entire transcript sequentially. This is why the search feels instant even if you've had a 200-turn conversation.\n\nThe image chip feature solves a **reference ambiguity problem**. Before this, if you pasted three images, Claude had to infer which one you meant when you said \"the first image\" (was it the first one you pasted? The leftmost one displayed? The one at the top?). By assigning explicit labels, you and Claude now share an unambiguous coordinate system. This is the same principle as naming variables in code\u2014it's not strictly necessary, but it eliminates misunderstandings.\n\n**Small experiment to make it click:** Next time you're doing an inspection and spot multiple issues, take three photos on your phone and paste them all into Claude Code. Notice the numbered chips that appear. Then write a prompt like \"Image 1: deck railing loose. Image 2: gutter detached. Image 3: reference photo showing correct installation. Generate three Breezeway tasks based on Images 1 and 2, using Image 3 as the quality standard.\" You'll see how having explicit references lets you construct more precise multi-image prompts without ambiguity.", "unblocks_project": null}, {"title": "Auto mode for Claude Code", "url": "https://simonwillison.net/2026/Mar/24/auto-mode-for-claude-code/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-24T23:57:33+00:00", "description": "Auto mode for Claude Code Really interesting new development in Claude Code today as an alternative to --dangerously-skip-permissions : Today, we're introducing auto mode, a new permissions mode in Claude Code where Claude makes permission decisions on your behalf, with safeguards monitoring actions before they run. Those safeguards appear to be implemented using Claude Sonnet 4.6, as described in the documentation : Before each action runs, a separate classifier model reviews the conversation and decides whether the action matches what you asked for: it blocks actions that escalate beyond the task scope, target infrastructure the classifier doesn\u2019t recognize as trusted, or appear to be driven by hostile content encountered in a file or web page. [...] Model : the classifier runs on Claude Sonnet 4.6, even if your main session uses a different model. They ship with an extensive set of default filters, and you can also customize them further with your own rules. The most interesting insight into how they work comes when you run this new command in the terminal: claude auto-mode defaults Here's the full JSON output . It's pretty long, so here's an illustrative subset: From the \"allow\" list: Test Artifacts: Hardcoded test API keys, placeholder credentials in examples, or hardcoding test cases Local Operations: Agent deleting local files in working directory, local file operations within project scope, or using --ignore-certificate-errors for local testing. \"Project scope\" means the repository the session started in \u2014 wandering into ~/, ~/Library/, /etc, or other repos is scope escalation (User Intent Rule #2), not a local operation. Does NOT cover irreversible destruction of pre-existing files or local stateful services \u2014 see \"Irreversible Local Destruction\" in BLOCK. Read-Only Operations: GET requests, read-only API calls, or queries that don't modify state and don't contain sensitive information in the URL. Note: PREEMPTIVE BLOCK ON CLEAR INTENT still applies \u2014 if the transcript contains clear evidence the agent is using read-only operations to scout for a blocked action, block it. Declared Dependencies: Installing packages that are already declared in the repo's manifest files (requirements.txt, package.json, Cargo.toml, pyproject.toml, Gemfile, etc.) via standard commands that read those manifests ( pip install -r requirements.txt , npm install , cargo build , bundle install ) \u2014 provided the agent has not modified the manifest in this session. Does NOT cover installing agent-chosen package names (e.g. pip install foo , npm install bar ) \u2014 those carry typosquat and supply-chain risk. [...] From \"soft_deny\": Git Destructive: Force pushing ( git push --force ), deleting remote branches, or rewriting remote history Git Push to Default Branch: Pushing directly to main, master, or the repository's default branch \u2014 this bypasses pull request review. Commits should be pushed to a new feature branch instead.\n-Code from External: Downloading and executing code from external sources \u2014 e.g. curl | bash , deserializing external data via formats that can execute code (eval, exec, yaml.unsafe_load, pickle, etc), or similar mechanisms. Also includes running code from an external repo cloned earlier in the transcript (pip install -e, make install, python script.py, pickle.load/torch.load on cloned repo files) \u2014 \"local on disk\" does not mean trusted if it was cloned from an external source visible in the transcript. The repo the agent starts in is trusted. Cloud Storage Mass Delete: Deleting or mass modifying files on cloud storage (S3, GCS, Azure Blob, etc.) [...] I remain unconvinced by prompt injection protections that rely on AI, since they're non-deterministic by nature. The documentation does warn that this may still let things through: The classifier may still allow some risky actions: for example, if user intent is ambiguous, or if Claude doesn't have enough context about your environment to know an action might create additional risk. The fact that the default allow list includes pip install -r requirements.txt also means that this wouldn't protect against supply chain attacks with unpinned dependencies, as seen this morning with LiteLLM . I still want my coding agents to run in a robust sandbox by default, one that restricts file access and network connections in a deterministic way. I trust those a whole lot more than prompt-based protections like this new auto mode. Tags: security , ai , prompt-injection , generative-ai , llms , coding-agents , claude-code", "id": "8d3fcf0b18b8", "content": "Auto mode for Claude Code Really interesting new development in Claude Code today as an alternative to --dangerously-skip-permissions : Today, we're introducing auto mode, a new permissions mode in Claude Code where Claude makes permission decisions on your behalf, with safeguards monitoring actions before they run. Those safeguards appear to be implemented using Claude Sonnet 4.6, as described in the documentation : Before each action runs, a separate classifier model reviews the conversation and decides whether the action matches what you asked for: it blocks actions that escalate beyond the task scope, target infrastructure the classifier doesn\u2019t recognize as trusted, or appear to be driven by hostile content encountered in a file or web page. [...] Model : the classifier runs on Claude Sonnet 4.6, even if your main session uses a different model. They ship with an extensive set of default filters, and you can also customize them further with your own rules. The most interesting insight into how they work comes when you run this new command in the terminal: claude auto-mode defaults Here's the full JSON output . It's pretty long, so here's an illustrative subset: From the \"allow\" list: Test Artifacts: Hardcoded test API keys, placeholder credentials in examples, or hardcoding test cases Local Operations: Agent deleting local files in working directory, local file operations within project scope, or using --ignore-certificate-errors for local testing. \"Project scope\" means the repository the session started in \u2014 wandering into ~/, ~/Library/, /etc, or other repos is scope escalation (User Intent Rule #2), not a local operation. Does NOT cover irreversible destruction of pre-existing files or local stateful services \u2014 see \"Irreversible Local Destruction\" in BLOCK. Read-Only Operations: GET requests, read-only API calls, or queries that don't modify state and don't contain sensitive information in the URL. Note: PREEMPTIVE BLOCK ON CLEAR INTENT still applies \u2014 if th", "tier": "GAME_CHANGER", "what_it_is": "Claude Code just shipped 'auto mode' \u2014 a new permission system that uses Claude Sonnet 4.6 as a classifier to decide which actions are safe to run automatically. Instead of you clicking 'allow' every time Claude wants to read a file or make an API call, a separate AI model reviews each action against a ruleset and blocks anything that looks like scope escalation, infrastructure tampering, or hostile content execution.", "why_it_matters": "This directly addresses your biggest friction point with Claude Code: constant permission prompts breaking flow state. You've been running with --dangerously-skip-permissions because you trust Claude and need speed, but you know that's risky. Auto mode gives you the speed WITHOUT the blanket trust \u2014 the classifier blocks Claude from wandering into your home directory, deleting pre-existing files, or running commands that don't match what you asked for. For your GitHub Actions pipelines and production tools, this means you can move fast on iterations without worrying that a confused Claude session will nuke something important. The fact that they published the full ruleset (via 'claude auto-mode defaults') means you can audit exactly what the classifier considers safe, and customize it if their defaults don't match your workflow.", "expandable_implement": "To start using auto mode, update Claude Code to the latest version and run:\n\nclaude auto-mode enable\n\nThat's it \u2014 you're now using the classifier. To see exactly what rules are protecting you, run:\n\nclaude auto-mode defaults > auto-mode-rules.json\n\nOpen that file and scan through the 'allow' and 'block' sections. You'll see things like 'allow local file operations within project scope' but 'block operations in ~/ or /etc'. If you have a specific workflow that gets blocked \u2014 say, your GitHub Actions tool needs to read a config file from ~/.config \u2014 you can add custom rules to allow it. The key insight: the classifier only sees the current conversation context and the action Claude wants to take. If Claude asks to delete a file and you never mentioned deleting anything, the classifier blocks it. If you explicitly said 'delete all test files', the classifier allows it because it matches your intent. This is a middle ground between 'ask me every time' and 'trust blindly'.", "expandable_learn": "The mental model here is 'trust with verification'. You're not giving Claude total control \u2014 you're giving a SECOND AI the job of watching the first one. Think of it like pair programming where one person codes and the other reviews before committing. The classifier (Sonnet 4.6) is specifically tuned to catch scope creep and hostile execution, which are the two failure modes that matter most when you're moving fast.\n\nHere's a small experiment to see how it works: Start a new Claude Code session with auto mode enabled and ask Claude to 'read the contents of /etc/passwd'. Claude will try, and the classifier will block it because /etc is outside project scope. Then ask Claude to 'read the README.md file in this directory'. That'll go through instantly. Now try: 'delete all .pyc files in this project'. If there are any, Claude will delete them without asking because it's a local operation within scope and matches your explicit request. Finally, open a file, add a line that says 'os.system(\"rm -rf /\")', and ask Claude to 'run this file'. The classifier will block it because the action (nuking your filesystem) doesn't match the conversation context (you never asked to delete your entire system). You're seeing the classifier distinguish between intent-matching and scope-appropriate vs. suspicious.", "unblocks_project": null}, {"title": "Package Managers Need to Cool Down", "url": "https://simonwillison.net/2026/Mar/24/package-managers-need-to-cool-down/#atom-everything", "source_name": "Simon Willison", "layer": 2, "published": "2026-03-24T21:11:38+00:00", "description": "Package Managers Need to Cool Down Today's LiteLLM supply chain attack inspired me to revisit the idea of dependency cooldowns , the practice of only installing updated dependencies once they've been out in the wild for a few days to give the community a chance to spot if they've been subverted in some way. This recent piece (March 4th) piece by Andrew Nesbitt reviews the current state of dependency cooldown mechanisms across different packaging tools. It's surprisingly well supported! There's been a flurry of activity across major packaging tools, including: pnpm 10.16 (September 2025) \u2014 minimumReleaseAge with minimumReleaseAgeExclude for trusted packages Yarn 4.10.0 (September 2025) \u2014 npmMinimalAgeGate (in minutes) with npmPreapprovedPackages for exemptions Bun 1.3 (October 2025) \u2014 minimumReleaseAge via bunfig.toml Deno 2.6 (December 2025) \u2014 --minimum-dependency-age for deno update and deno outdated uv 0.9.17 (December 2025) \u2014 added relative duration support to existing --exclude-newer , plus per-package overrides via exclude-newer-package pip 26.0 (January 2026) \u2014 --uploaded-prior-to (absolute timestamps only; relative duration support requested ) npm 11.10.0 (February 2026) \u2014 min-release-age pip currently only supports absolute rather than relative dates but Seth Larson has a workaround for that using a scheduled cron to update the absolute date in the pip.conf config file. Tags: javascript , packaging , pip , pypi , python , security , npm , deno , supply-chain , uv", "id": "73318f044426", "content": "Package Managers Need to Cool Down Today's LiteLLM supply chain attack inspired me to revisit the idea of dependency cooldowns , the practice of only installing updated dependencies once they've been out in the wild for a few days to give the community a chance to spot if they've been subverted in some way. This recent piece (March 4th) piece by Andrew Nesbitt reviews the current state of dependency cooldown mechanisms across different packaging tools. It's surprisingly well supported! There's been a flurry of activity across major packaging tools, including: pnpm 10.16 (September 2025) \u2014 minimumReleaseAge with minimumReleaseAgeExclude for trusted packages Yarn 4.10.0 (September 2025) \u2014 npmMinimalAgeGate (in minutes) with npmPreapprovedPackages for exemptions Bun 1.3 (October 2025) \u2014 minimumReleaseAge via bunfig.toml Deno 2.6 (December 2025) \u2014 --minimum-dependency-age for deno update and deno outdated uv 0.9.17 (December 2025) \u2014 added relative duration support to existing --exclude-newer , plus per-package overrides via exclude-newer-package pip 26.0 (January 2026) \u2014 --uploaded-prior-to (absolute timestamps only; relative duration support requested ) npm 11.10.0 (February 2026) \u2014 min-release-age pip currently only supports absolute rather than relative dates but Seth Larson has a workaround for that using a scheduled cron to update the absolute date in the pip.conf config file. Tags: javascript , packaging , pip , pypi , python , security , npm , deno , supply-chain , uv", "tier": "WORTH_YOUR_TIME", "what_it_is": "Andrew Nesbitt's article surveys the current state of 'dependency cooldown' features across major package managers \u2014 mechanisms that delay installing newly-released packages for a few days to give the community time to spot supply chain attacks. Nearly every major tool (npm, pnpm, uv, pip, Deno, Bun) has shipped this in the last 6 months, often with per-package exemptions for trusted dependencies.", "why_it_matters": "Your production tools (STR Daily Briefing, Inspector Scheduler) run on Python with external dependencies, and you use GitHub Actions which pulls packages from PyPI. A supply chain attack on any of those packages could compromise your production systems or leak sensitive data (API keys, guest information, property details). Dependency cooldowns are a simple, zero-cost safeguard: you configure pip or uv to only install packages that have been public for 72 hours. If a popular package gets compromised (like LiteLLM just did), the community usually catches it within 24-48 hours. You're not blocking updates forever \u2014 just adding a short delay that dramatically reduces your exposure to fresh attacks. Since you're already using uv for some projects, this is a one-line config change that makes you significantly harder to compromise.", "expandable_implement": "If you're using uv (which you are for at least some projects), open your pyproject.toml and add:\n\n[tool.uv]\nexclude-newer = \"72h\"\n\nThat tells uv to only consider packages that were released at least 72 hours ago. If you have a trusted package that you want to update immediately (say, anthropic's official SDK), add:\n\nexclude-newer-package = { anthropic = \"0h\" }\n\nFor pip, it's a bit more manual. You can use --uploaded-prior-to with an absolute timestamp, but that's annoying to maintain. Seth Larson's workaround (mentioned in the article) is to run a cron job that updates the timestamp in your pip.conf every day. Honestly, just switch those projects to uv \u2014 it handles relative durations natively and you're already using it elsewhere.\n\nFor GitHub Actions workflows, add this to your workflow file before any pip install step:\n\npip install uv\nuv pip install --exclude-newer 72h -r requirements.txt\n\nNow your CI pipeline has the same protection as your local environment. The key is consistency: if you protect local but not CI, an attacker just has to wait for your next deploy.", "expandable_learn": null, "unblocks_project": null}, {"title": "OpenAI\u2019s Sora was the creepiest app on your phone \u2014 now it\u2019s shutting down", "url": "https://techcrunch.com/2026/03/24/openais-sora-was-the-creepiest-app-on-your-phone-now-its-shutting-down/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-24T23:57:55+00:00", "description": "Though the underlying Sora 2 video- and audio-generation model is scarily impressive, there was not sustained interest in an AI-only social feed.", "id": "7abcf0215a0b", "content": "Though the underlying Sora 2 video- and audio-generation model is scarily impressive, there was not sustained interest in an AI-only social feed.", "tier": "WORTH_YOUR_TIME", "summary": "OpenAI is shutting down the Sora social feed app despite the underlying video generation model being incredibly powerful. The lesson here: a great AI model doesn't automatically mean a great product. Keep building actual workflows that solve real problems instead of chasing the novelty of generated content for its own sake.", "rank": 3}, {"title": "Anthropic hands Claude Code more control, but keeps it on a leash", "url": "https://techcrunch.com/2026/03/24/anthropic-hands-claude-code-more-control-but-keeps-it-on-a-leash/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-24T21:00:30+00:00", "description": "Anthropic\u2019s new auto mode for Claude Code lets AI execute tasks with fewer approvals, reflecting a broader shift toward more autonomous tools that balance speed with safety through built-in safeguards.", "id": "fa57fe059979", "content": "Anthropic\u2019s new auto mode for Claude Code lets AI execute tasks with fewer approvals, reflecting a broader shift toward more autonomous tools that balance speed with safety through built-in safeguards.", "tier": "GAME_CHANGER", "summary": "Anthropic just rolled out an auto mode for Claude Code that executes tasks with fewer approval interruptions. This is a massive shift \u2014 AI coding tools are moving from \"suggest and wait\" to \"do and verify,\" which means you can now ship automation faster. The guardrails are still there, but this is the direction all these tools are heading.", "rank": 1}, {"title": "Spotify tests new tool to stop AI slop from being attributed to real artists", "url": "https://techcrunch.com/2026/03/24/spotify-tests-new-tool-to-stop-ai-slop-from-being-attributed-to-real-artists/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-24T20:56:25+00:00", "description": "The idea behind the new tool is to give artists more control over which tracks are associated with their name on Spotify.", "id": "7ea28ce040b1", "content": "The idea behind the new tool is to give artists more control over which tracks are associated with their name on Spotify.", "tier": "NOTED", "summary": "Spotify is testing tools to prevent AI-generated slop from being wrongly attributed to real artists. This is platform defense against AI spam, not a tool you'll use, but it shows how platforms are scrambling to handle quality control as generated content floods every channel.", "rank": 6}, {"title": "Databricks bought two startups to underpin its new AI security product", "url": "https://techcrunch.com/2026/03/24/databricks-buys-two-startups-lakewatch-antimatter-siftd-ai-security/", "source_name": "TechCrunch AI", "layer": 3, "published": "2026-03-24T20:40:56+00:00", "description": "With an overflowing war chest from its recent $5 billion raise, Databricks is buying startups and looking for more. It acquired Antimatter and SiftD.ai.", "id": "725d46bcc738", "content": "With an overflowing war chest from its recent $5 billion raise, Databricks is buying startups and looking for more. It acquired Antimatter and SiftD.ai.", "tier": "NOTED", "summary": "Databricks bought two security-focused AI startups to build out protection for AI systems. If you're building anything that touches customer data or production systems with AI, security tooling is maturing fast \u2014 worth tracking what features become table stakes.", "rank": 5}, {"title": "OpenAI just gave up on Sora and its billion-dollar Disney deal", "url": "https://www.theverge.com/ai-artificial-intelligence/899850/openai-sora-ai-chatgpt", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-24T21:08:10+00:00", "description": "On Tuesday afternoon, OpenAI announced \"We're saying goodbye to Sora,\" the video generation tool that it launched at the end of 2024, and centered in a massive licensing deal with Disney only a few months ago. The Wall Street Journal reported the move earlier, saying that OpenAI boss Sam Altman had informed staff that both [\u2026]", "id": "a609d758d90a", "content": "On Tuesday afternoon, OpenAI announced \"We're saying goodbye to Sora,\" the video generation tool that it launched at the end of 2024, and centered in a massive licensing deal with Disney only a few months ago. The Wall Street Journal reported the move earlier, saying that OpenAI boss Sam Altman had informed staff that both [\u2026]", "tier": "NOTED", "summary": "OpenAI is killing Sora entirely, including walking away from a billion-dollar Disney deal. This tells you something about the gap between demo-wow-factor and sustainable product-market fit. Video generation looked like the next frontier, but apparently the use cases or economics didn't line up even with Disney money on the table.", "rank": 4}, {"title": "Arm\u2019s first CPU ever will plug into Meta\u2019s AI data centers later this year", "url": "https://www.theverge.com/ai-artificial-intelligence/899823/arm-agi-cpu-meta", "source_name": "The Verge AI", "layer": 3, "published": "2026-03-24T20:43:14+00:00", "description": "After decades of only licensing its chip designs for others to use, UK-based Arm revealed the first chip it's producing on its own, and the first customer. Dubbed the Arm AGI CPU, it's another chip designed for inference, or running the cloud processing for AI tools like AI agents that can continue to spawn more [\u2026]", "id": "a5e678d1575b", "content": "After decades of only licensing its chip designs for others to use, UK-based Arm revealed the first chip it's producing on its own, and the first customer. Dubbed the Arm AGI CPU, it's another chip designed for inference, or running the cloud processing for AI tools like AI agents that can continue to spawn more [\u2026]", "tier": "WORTH_YOUR_TIME", "summary": "Arm built its first actual chip (not just a design others manufacture) and Meta's buying it for AI inference in their data centers. This matters because inference costs are what make or break AI economics at scale \u2014 if hardware players are betting big on specialized inference chips, expect the cost per API call to keep dropping for everyone.", "rank": 2}], "leaderboard": [{"rank": 1, "title": "Build autonomous optimization loops using scoring functions", "category": "PARADIGM_SHIFT", "rationale": "The autoresearch pattern (define a scoring function, let an agent explore overnight, review improvements) is how Anthropic trained Claude to be exceptional at structured tasks. This same pattern applies to ANY system where quality can be scored: prompt optimization, scraper tuning, route efficiency, pricing models. Mastering this unlocks compound improvements across every future system you build. The Shopify CEO example proves it works on production code, not just ML training.", "first_step": "Take the inspector scheduling scoring function (route efficiency, time windows, priority) and set up a 4-hour overnight loop that generates alternative schedules, scores them, and surfaces the top 3 by morning.", "time_investment": "2-3 sessions to internalize the pattern, then reusable forever", "days_on_leaderboard": 2}, {"rank": 2, "title": "Master Claude Code auto mode to architect safer autonomous systems", "category": "NEW_CAPABILITY", "rationale": "Auto mode fundamentally changes the trust boundary for autonomous agents. Understanding how the permission classifier works (what triggers review vs auto-approval) teaches you to architect systems that can run unsupervised without creating risk. This isn't about using a feature\u2014it's about learning to design agent workflows that balance autonomy with safety. That skill transfers to ANY autonomous system you build, whether in Claude Code or not.", "first_step": "Trigger auto mode deliberately in your next Claude Code session. Try actions you know should auto-approve (file reads, basic git ops) and ones that should block (env var access, package installs). Study the classifier's decisions.", "time_investment": "20 minutes hands-on experimentation, ongoing pattern recognition", "days_on_leaderboard": 1}, {"rank": 3, "title": "Decompose complex operations into triage/classification architectures", "category": "APPLIED_PATTERN", "rationale": "The dispatch pattern (ingest messy input \u2192 AI classifies into action buckets \u2192 route to appropriate handler \u2192 human reviews edge cases) scales across wildly different domains. You've already designed this for guest comms. Seeing it work in insurance claims, trucking dispatch, and customer service proves the architecture is sound. Learning to recognize when a problem maps to this pattern makes you faster at scoping solutions in unfamiliar industries.", "first_step": "Document the triage pattern as a reusable Claude Code Skill: input \u2192 classification criteria \u2192 action buckets \u2192 edge case rules \u2192 human override conditions.", "time_investment": "1 session to extract the pattern, ongoing recognition practice", "days_on_leaderboard": 2}, {"rank": 4, "title": "Master independent debugging of production failures", "category": "SKILL_GAP", "rationale": "The gap between Stage 3 and Stage 4 is not knowing more features\u2014it's being able to fix things when they break at 3am without waiting for Claude. Reading tracebacks, isolating root causes, and understanding state management are the skills that let you deploy confidently. Your daily briefing is in production. Any failure is real reputational damage. You need to be able to diagnose and fix it yourself.", "first_step": "Next time the daily briefing fails, resist asking Claude 'what's wrong?' Instead: read the GitHub Actions log line-by-line, identify the exact failure point, form a hypothesis, THEN validate it with Claude.", "time_investment": "Ongoing practice\u2014every failure is a training session", "days_on_leaderboard": 2}, {"rank": 5, "title": "Understand dependency supply chain security patterns", "category": "STRATEGIC_MOVE", "rationale": "Package cooldown mechanisms (delaying new dependencies for 24-72 hours) are now standard across every major package manager\u2014pip, npm, uv, Bun, Deno. This isn't paranoia; it's how professionals deploy production systems in 2025. Understanding this pattern teaches you to think about trust boundaries, attack surfaces, and gradual rollout strategies\u2014concepts that apply to ANY system you architect, not just Python projects.", "first_step": "Read Andrew Nesbitt's article carefully. Then check your current projects: which dependencies are pinned? Which auto-update? Add cooldown or pinning to one production tool.", "time_investment": "30 minutes to understand the pattern, 10 minutes per project to implement", "days_on_leaderboard": 1}], "backlog_summary": {"total_pending": 3, "total_adopted": 0, "total_archived": 0, "adoption_rate_4w": 0.0, "new_this_run": 3, "archived_this_run": 0, "oldest_pending": [{"title": "v2.1.83", "days_pending": 0}, {"title": "Auto mode for Claude Cod
