name: Daily Briefing

on:
  schedule:
    # 4:00 AM EST / 5:00 AM EDT = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Required to push state files and dashboard back to the repo

concurrency:
  group: ai-intel-daily
  cancel-in-progress: false

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for vulnerabilities
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run daily briefing
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: IT@scmaine.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEFING_RECIPIENTS: ${{ secrets.BRIEFING_RECIPIENTS }}
          DASHBOARD_URL: https://pmtinkerer.github.io/ai-intelligence-briefing/
          HEALTHCHECK_PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python3 -m src.main

      - name: Commit updated state and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/index.html
          if git diff --staged --quiet; then
            echo "No state changes — nothing to commit"
          else
            git commit -m "chore: update briefing state [skip ci]"
            git push
          fi
