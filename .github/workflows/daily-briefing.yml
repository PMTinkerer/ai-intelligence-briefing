name: Daily Briefing

on:
  schedule:
    # 4:00 AM EST / 5:00 AM EDT = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Required to push state files and dashboard back to the repo

concurrency:
  group: ai-intel-daily
  cancel-in-progress: false

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for vulnerabilities
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Decode Gmail credentials
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          echo "$GMAIL_CREDENTIALS_JSON" | base64 -d > credentials.json
          echo "$GMAIL_TOKEN_JSON"        | base64 -d > token.json

      - name: Run daily briefing
        env:
          GMAIL_CREDENTIALS_PATH: credentials.json
          GMAIL_TOKEN_PATH: token.json
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEFING_RECIPIENTS: ${{ secrets.BRIEFING_RECIPIENTS }}
          DASHBOARD_URL: https://pmtinkerer.github.io/ai-intelligence-briefing/
        run: python3 -m src.main

      - name: Commit updated state and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/index.html
          if git diff --staged --quiet; then
            echo "No state changes — nothing to commit"
          else
            git commit -m "chore: update briefing state [skip ci]"
            git push
          fi

      - name: Persist refreshed token to GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not configured — skipping token refresh persistence"
            exit 0
          fi
          NEW_TOKEN=$(base64 -w 0 token.json)
          gh secret set GMAIL_TOKEN_JSON --body "$NEW_TOKEN" \
            --repo ${{ github.repository }}
