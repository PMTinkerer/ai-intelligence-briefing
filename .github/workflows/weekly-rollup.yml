name: Weekly Rollup

on:
  schedule:
    # 9:00 AM ET Saturday = 14:00 UTC (EST/UTC-5); in EDT (UTC-4) this fires at 10:00 AM
    - cron: "0 14 * * 6"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: ai-intel-weekly
  cancel-in-progress: false

jobs:
  send-rollup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for vulnerabilities
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Run weekly rollup
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: IT@scmaine.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEFING_RECIPIENTS: ${{ secrets.BRIEFING_RECIPIENTS }}
          DASHBOARD_URL: https://pmtinkerer.github.io/ai-intelligence-briefing/
          HEALTHCHECK_PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python3 -m src.weekly
