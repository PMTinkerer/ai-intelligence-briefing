name: Weekly Rollup

on:
  schedule:
    # 9:00 AM ET Saturday = 14:00 UTC (EST/UTC-5); in EDT (UTC-4) this fires at 10:00 AM
    - cron: "0 14 * * 6"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ai-intel-weekly
  cancel-in-progress: false

jobs:
  send-rollup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Audit dependencies for vulnerabilities
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Decode Gmail credentials
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          echo "$GMAIL_CREDENTIALS_JSON" | base64 -d > credentials.json
          echo "$GMAIL_TOKEN_JSON"        | base64 -d > token.json

      - name: Run weekly rollup
        env:
          GMAIL_CREDENTIALS_PATH: credentials.json
          GMAIL_TOKEN_PATH: token.json
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEFING_RECIPIENTS: ${{ secrets.BRIEFING_RECIPIENTS }}
          DASHBOARD_URL: https://pmtinkerer.github.io/ai-intelligence-briefing/
        run: python3 -m src.weekly

      - name: Persist refreshed token to GitHub Secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_PAT not configured — skipping token refresh persistence"
            exit 0
          fi
          NEW_TOKEN=$(base64 -w 0 token.json)
          gh secret set GMAIL_TOKEN_JSON --body "$NEW_TOKEN" \
            --repo ${{ github.repository }}
